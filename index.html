    ectx.fillStyle='rgba(30,60,10,0.6)';ectx.fillRect(0,0,W,H);
    for(const g of e.gasParticles){
      ectx.globalAlpha=g.life*0.3;ectx.fillStyle=g.col+g.life*0.4+')';
      ectx.beginPath();ectx.arc(g.x,g.y,g.sz,0,Math.PI*2);ectx.fill();
    }
    ectx.globalAlpha=1;
    const shk=Math.sin(e.t*0.8)*3;
    if(e.t<120){
      // 우주복 벗는 장면 (우주비행사가 흔들리면서)
      ectx.save();ectx.translate(W/2,H/2);ectx.rotate(Math.sin(e.t*0.3)*0.15);

      // 우주복 파편 흩뿌리기
      if(e.t>60){
        for(let i=0;i<3;i++){
          const px=W/2-20+Math.random()*40+shk,py=H/2-10+Math.random()*20;
          ectx.fillStyle='rgba(200,200,200,'+(0.6-e.t*0.003)+')';
          ectx.fillRect(px,py,5+Math.random()*8,4+Math.random()*6);
        }
      }
    }else if(e.t<250){
      // 변이 중 - 몸이 녹색으로 변함
      const morphProg=Math.min((e.t-120)/130,1);
      ectx.fillStyle='#0a0a1a';ectx.fillRect(0,0,W,H);
      ectx.fillStyle=`rgba(30,60,10,0.5)`;ectx.fillRect(0,0,W,H);

      const glowR=40+morphProg*30;

      ectx.beginPath();ectx.arc(W/2,H/2,glowR,0,Math.PI*2);ectx.fill();
      // 우주비행사 → 좀비 전환 (알파 블렌딩)
      if(morphProg<0.5){
        ectx.globalAlpha=1-morphProg*2;
        CHARS.astronaut.draw(ectx,W/2-11+shk,H/2-16,1,0,35000,true,0);
        ectx.globalAlpha=1;
      }
      if(morphProg>0.3){
        ectx.globalAlpha=Math.min(1,(morphProg-0.3)/0.7);

      if(morphProg>0.5){ectx.fillStyle='#44aa22';ectx.font='10px "Press Start 2P",monospace';ectx.fillText('...몸이 변하고 있다',W/2,65);}
    }else{
      // 완전한 좀비
      ectx.fillStyle='#0a0a1a';ectx.fillRect(0,0,W,H);

      ectx.fillStyle='rgba(80,200,40,0.2)';ectx.beginPath();ectx.arc(W/2,H/2,50,0,Math.PI*2);ectx.fill();

  }else if(e.scene===3){
    // 좀비가 천천히 걸어나옴

    ectx.fillStyle='#3a3010';ectx.fillRect(0,H*0.7,W,H*0.3);
    // 좀비 워킹
    const zx=W*0.3+Math.min(e.t*0.3,W*0.4);

    CHARS.zombie.draw(ectx,zx,H*0.55+wobble,1,Math.floor(e.t/15)%2,35000,true,0);

    ectx.font='13px "Press Start 2P",monospace';ectx.fillStyle='#66cc33';
    if(e.t<150)ectx.fillText('좀비: 크르르르...',W/2,40);
    else ectx.fillText('좀비: ...배고파.',W/2,40);
    ectx.font='10px "Press Start 2P",monospace';ectx.fillStyle='#888';
    if(e.t>200)ectx.fillText('독성 가스가 모든 것을 바꿔놓았다.',W/2,65);
    if(e.t>300)ectx.fillText('하지만... 이 몸도 나쁘지 않아.',W/2,85);
  }else if(e.scene===4){
    ectx.fillStyle='#0a0a1a';ectx.fillRect(0,0,W,H);
    ectx.fillStyle='rgba(30,60,10,0.2)';ectx.fillRect(0,0,W,H);
    // 좀비 캐릭터 전시
    CHARS.zombie.draw(ectx,W/2-11,H/2-30,1,Math.floor(e.t/15)%2,35000,true,0);

    ectx.fillText('🧟 좀비 캐릭터 해금!',W/2,H/2+30);

    ectx.fillText('가스에 중독된 우주비행사의 최후',W/2,H/2+55);
  }
  ectx.textAlign='left';
}

//  일시정지
// ══════════════════════════════════════════════════════
function togglePause(){
  if(!game)return;
  if(game.paused){resumeGame();}
  else{pauseGame();}
}
function pauseGame(){
  game.paused=true;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1 style="font-size:24px;color:#ffe066">일시정지</h1>
    <p style="margin-top:12px;color:#aaa;font-size:14px">높이: ${Math.floor(game.height).toLocaleString()}m</p>
    <button class="btn" onclick="resumeGame()">▶ 계속하기</button>
    <button class="btn" onclick="showSettingsInGame()" style="background:#8888cc;border-color:#555599">⚙️ 설정</button>
    <button class="btn-sm" onclick="quitToMenu()">메뉴로 나가기</button>
  `;
}

function showSettingsInGame(){
  const bgmV=Math.round(BGM.getVol()/BGM_MAX*100);
  const sfxV=Math.round(SFX.getVol()*100);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="font-size:22px;margin-bottom:16px">⚙️ 설정</h1>
    <div style="display:flex;flex-direction:column;gap:18px;align-items:center;margin-bottom:20px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <label style="font-size:12px;color:#ffe066">🎵 배경음악 <span id="bgm-label">${bgmV}%</span></label>
        <input id="bgm-slider" type="range" min="0" max="100" value="${bgmV}" style="width:260px">
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <label style="font-size:12px;color:#ffe066">🔊 효과음 <span id="sfx-label">${sfxV}%</span></label>
        <input id="sfx-slider" type="range" min="0" max="100" value="${sfxV}" style="width:260px">
      </div>
    </div>
    <button class="btn-sm" onclick="pauseGame()">← 뒤로가기</button>
  `;
  const bSl=document.getElementById('bgm-slider'),sSl=document.getElementById('sfx-slider');
  const bLbl=document.getElementById('bgm-label'),sLbl=document.getElementById('sfx-label');
  bSl.addEventListener('input',()=>{
    const pct=+bSl.value;bLbl.textContent=pct+'%';
    const v=pct/100*BGM_MAX;BGM.setVol(v);localStorage.setItem('sc_bgm_vol',v.toFixed(4));
  });
  sSl.addEventListener('input',()=>{
    const pct=+sSl.value;sLbl.textContent=pct+'%';
    const v=pct/100;SFX.setVol(v);localStorage.setItem('sc_sfx_vol',v.toFixed(3));
  });
}
function resumeGame(){
  if(!game)return;
  game.paused=false;
  const ov=document.getElementById('overlay');
  ov.style.display='none';
}
function quitToMenu(){
  if(game)game.paused=false;
  stopLoop();
  showStageSelect();
}

// ══════════════════════════════════════════════════════
//  입력
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  // ESC 일시정지 메뉴
  if(e.code==='Escape'&&btlRunning&&btl&&btl.state!=='ended'){
    e.preventDefault();
    if(btl.online){if(ws){ws.close();ws=null;}onlineRole=null;onlineRoomInfo=null;pendingInputs=[null,null,null,null];}
    btlStopLoop();btl=null;keys={};showBattleMenu();return;
  }
  if(e.code==='Escape'&&running&&!game.ended){
    e.preventDefault();
    togglePause();
    return;
  }
  if(game&&game.paused)return;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'||e.code==='KeyT'||e.code==='Numpad8')&&(running||btlRunning)){
    e.preventDefault();
    if(!running)return;
    const p=game.p;const char=game.char;
    if(selectedChar==='cockroach'){
        // cockroach: flight handled in update, not here
      }else if(p.jumps>0){
      if(game.char.crouchTime&&p.onGround&&!p.crouching){
        p.crouching=true;p.crouchTimer=0;
      }else if(game.char.crouchTime&&p.crouching){
      }else if(game.char.crouchTime&&!p.onGround){
        p.vy=(char.airJumpForce||char.jumpForce);p.jumps--;SFX.jump(p.jumps,p.maxJumps);
        spawnPt(p.x+p.w/2,p.worldY+p.h-game.camY,'#d4c4a0',10);
      }else{
        p.vy=char.jumpForce;p.jumps--;SFX.jump(p.jumps,p.maxJumps);
        if(!p.onGround)spawnPt(p.x+p.w/2,p.worldY+p.h-game.camY,'#7ef',10);
      }
    }
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
let txStart=0;
canvas.addEventListener('touchstart',e=>{txStart=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txStart;
  if(Math.abs(dx)<25){
    if(running&&game.p.jumps>0){
      const p=game.p;const char=game.char;
      if(selectedChar==='cockroach'){
        // handled in update
      }else if(game.char.crouchTime&&p.onGround&&!p.crouching){
        p.crouching=true;p.crouchTimer=0;
      }else if(game.char.crouchTime&&!p.onGround){
        p.vy=(char.airJumpForce||char.jumpForce);p.jumps--;SFX.jump(p.jumps,p.maxJumps);
      }else if(!game.char.crouchTime){
        p.vy=char.jumpForce;p.jumps--;SFX.jump(p.jumps,p.maxJumps);
      }
    }
  }
  else{keys['ArrowLeft']=dx<0;keys['ArrowRight']=dx>0;setTimeout(()=>{keys['ArrowLeft']=false;keys['ArrowRight']=false;},300);}
},{passive:false});

const PC={

  moon_surface:['#c8b878','#e0d090','#b0a060'],

function drawPlatform(x,y,w,h,type){
  const c=PC[type]||PC.rock;
  ctx.fillStyle=c[0];ctx.fillRect(x,y,w,h);
  ctx.fillStyle=c[1];ctx.fillRect(x,y,w,4);
  ctx.fillStyle=c[2];ctx.fillRect(x,y+h-3,w,3);
  if(type==='grass'){ctx.fillStyle='#7ec850';for(let i=0;i<w;i+=8){ctx.fillRect(x+i,y-2,4,3);ctx.fillRect(x+i+2,y-4,2,3);}}
  if(type==='cloud'){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(x+2,y+2,w-4,5);}
  if(type==='star'){ctx.fillStyle='rgba(255,255,200,0.5)';for(let i=0;i<w;i+=12)ctx.fillRect(x+i+3,y+2,3,3);}
  if(type==='moon_surface'||type==='moon_surface_s2'){
    ctx.fillStyle='#c8b878';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#e0d090';ctx.fillRect(x,y,w,5);
    ctx.fillStyle='#b0a060';ctx.fillRect(x,y+h-4,w,4);
    for(let i=30;i<w-30;i+=90){ctx.fillStyle='#a89858';ctx.beginPath();ctx.arc(x+i,y+h/2,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c0b070';ctx.beginPath();ctx.arc(x+i,y+h/2,5,0,Math.PI*2);ctx.fill();}
    if(type==='moon_surface'){ctx.fillStyle='rgba(180,160,80,0.6)';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText('🌕 달 표면 — 10,000m 달성!',w/2,y+h/2+3);ctx.textAlign='left';}
  }
  if(type==='mars_rock'||type==='mars_dust'){
    ctx.fillStyle=c[0];ctx.fillRect(x,y,w,h);
    ctx.fillStyle=c[1];ctx.fillRect(x,y,w,5);
    ctx.fillStyle=c[2];ctx.fillRect(x,y+h-3,w,3);
    if(type==='mars_dust'){ctx.fillStyle='rgba(200,80,0,0.3)';for(let i=0;i<w;i+=16)ctx.fillRect(x+i,y-2,8,3);}
  }
  if(type==='crumble_moon'){
    ctx.fillStyle='#8a8a7a';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#a0a090';ctx.fillRect(x,y,w,4);
    ctx.fillStyle='#6a6a5a';ctx.fillRect(x,y+h-3,w,3);
    for(let i=8;i<w-8;i+=18){ctx.fillStyle='#7a7a6a';ctx.beginPath();ctx.arc(x+i,y+h/2,3,0,Math.PI*2);ctx.fill();}
    ctx.strokeStyle='rgba(90,90,70,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+w*0.25,y);ctx.lineTo(x+w*0.45,y+h);ctx.moveTo(x+w*0.7,y);ctx.lineTo(x+w*0.55,y+h);ctx.stroke();
  }
  if(type==='ice_asteroid'){
    ctx.fillStyle='#88bbdd';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#aaddff';ctx.fillRect(x,y,w,4);
    ctx.fillStyle='#6699bb';ctx.fillRect(x,y+h-3,w,3);
    ctx.fillStyle='rgba(200,240,255,0.4)';for(let i=0;i<w;i+=10)ctx.fillRect(x+i+2,y+3,3,3);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(x+4,y+1,w*0.3,2);
  }
  if(type==='blink'){
    ctx.fillStyle='#cc66ff';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#dd88ff';ctx.fillRect(x,y,w,4);
    ctx.fillStyle='#9944cc';ctx.fillRect(x,y+h-3,w,3);
    ctx.fillStyle='rgba(255,255,255,0.3)';for(let i=0;i<w;i+=8)ctx.fillRect(x+i+2,y+5,2,4);
  }
  if(type==='asteroid'||type==='asteroid_dark'){
    const c2=PC[type];
    ctx.fillStyle=c2[0];ctx.fillRect(x,y,w,h);
    ctx.fillStyle=c2[1];ctx.fillRect(x,y,w,4);
    ctx.fillStyle=c2[2];ctx.fillRect(x,y+h-3,w,3);
    for(let i=6;i<w-6;i+=14){ctx.fillStyle=c2[2];ctx.beginPath();ctx.arc(x+i,y+h/2,2,0,Math.PI*2);ctx.fill();}
  }
  if(type==='jupiter_rock'||type==='jupiter_gas'){
    const c2=PC[type];
    ctx.fillStyle=c2[0];ctx.fillRect(x,y,w,h);
    ctx.fillStyle=c2[1];ctx.fillRect(x,y,w,4);
    ctx.fillStyle=c2[2];ctx.fillRect(x,y+h-3,w,3);
    if(type==='jupiter_gas'){ctx.fillStyle='rgba(255,200,100,0.3)';for(let i=0;i<w;i+=12)ctx.fillRect(x+i,y+4,8,2);}
  }
  if(type==='gold'){
    const shimmer=Math.sin(Date.now()*0.005)*0.15+0.85;
    ctx.fillStyle=`rgba(255,215,0,${shimmer})`;ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#fff176';ctx.fillRect(x,y,w,4);
    ctx.fillStyle='#b8860b';ctx.fillRect(x,y+h-3,w,3);
    ctx.fillStyle='rgba(255,255,200,0.5)';for(let i=0;i<w;i+=10)ctx.fillRect(x+i+3,y+4,3,3);
    ctx.fillStyle='#ffe066';ctx.font='bold 10px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('🚀',x+w/2,y-4);ctx.textAlign='left';
  }
}
function drawCloud(x,y,w){
  ctx.fillStyle='#dff';ctx.fillRect(x,y+10,w,14);ctx.fillRect(x+w*0.1,y+4,w*0.4,10);ctx.fillRect(x+w*0.45,y,w*0.35,12);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(x+2,y+10,w-4,4);
}
function getPlatformColor(t){
  return {rock:'#ccc',dirt:'#8c4',grass:'#8e6',cloud:'#cef',ice:'#adf',purple:'#b7e',metal:'#9ab',star:'#fd5',ground:'#b85',moon_surface:'#d4c890',moon_surface_s2:'#c0b070',mars_rock:'#cc4422',mars_dust:'#dd6633',crumble_moon:'#9a9a8a',asteroid:'#8a7878',asteroid_dark:'#5a4858',ice_asteroid:'#aaddff',blink:'#cc66ff',jupiter_rock:'#aa7840',jupiter_gas:'#ddaa66'}[t]||'#fff';
}
function lerp(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ri=Math.round(((ah>>16)&0xff)+(((bh>>16)&0xff)-((ah>>16)&0xff))*t);
  const gi=Math.round(((ah>>8)&0xff)+(((bh>>8)&0xff)-((ah>>8)&0xff))*t);
  const bi=Math.round((ah&0xff)+((bh&0xff)-(ah&0xff))*t);
  return `#${ri.toString(16).padStart(2,'0')}${gi.toString(16).padStart(2,'0')}${bi.toString(16).padStart(2,'0')}`;
}

  const getSkin=(i)=>[btlP1Skin,btlP2Skin,btlP3Skin,btlP4Skin][i];
  const makeSkinRow=(charId,skinVar)=>{
    if(!SKINS[charId])return '';
    const skins=SKINS[charId].filter(sk=>sk.id==='default'||SAVE.hasSkin(sk.id));
    if(skins.length<=1)return '';

    ).join('')+'</div>';
  };
  const makeCards=(sel,prefix,skinVar)=>allChars.map(c=>{
    const cls=sel===c.id?'selected':'unlocked';
    return `<div class="char-card ${cls}" style="width:72px;height:${SKINS[c.id]?'110':'95'}px;padding:4px" onclick="${prefix}='${c.id}';${skinVar}='default';showBattleCharSelect(${btl_testMode})">

  }).join('');

    {sel:btlP1Char,prefix:'btlP1Char',skinVar:'btlP1Skin',label:'P1',color:'#7ef',ctrl:'←→↑ 좌클릭'},
    {sel:btlP2Char,prefix:'btlP2Char',skinVar:'btlP2Skin',label:'P2',color:'#f88',ctrl:'A/D/W 우클릭'},

    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;max-height:70vh;overflow-y:auto">${cols}</div>

}

    _teleportUsed:false,  // 해골 한번 순간이동 사용했는지
    bindTimer:0,          // 속박 (인절미 떡)
    confuseTimer:0,       // 혼란 (좌우 반전) — 일루미나티 영혼
    _spHeld:false,        // 우클릭 누름 상태 (좀비 차지용)
    skin:skin||'default',
    bs,charId,charDef:c,label,color,_jumpHeld:false};
}

const BTL_PLAT_TYPES=['rock','dirt','grass','cloud','ice','purple','metal','star','asteroid','moon_surface'];
function btlGetPlatType(r){return BTL_PLAT_TYPES[Math.floor(r*BTL_PLAT_TYPES.length)];}

function startBattle(testMode){
  keys={};
  ov.style.display='none';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  const seed=Math.floor(Math.random()*999999);
  const spawnXs=[W*0.2,W*0.8,W*0.4,W*0.6];
  const spawnFacings=[1,-1,1,-1];
  const pLabels=['P1','P2','P3','P4'];
  const pColors=['#7ef','#f88','#8f8','#fb4'];
  const pChars=[btlP1Char,btlP2Char,btlP3Char,btlP4Char];
  const pSkins=[btlP1Skin,btlP2Skin,btlP3Skin,btlP4Skin];
  const players=[];
  for(let i=0;i<btlPlayerCount;i++){
    players.push(btlMakePlayer(pChars[i],spawnXs[i],spawnFacings[i],pLabels[i],pColors[i],pSkins[i]));
  }
  btl={
    camY:-H/2,scrollSpeed:testMode?0:1.0,time:0,online:false,seed:seed,platIdx:0,testMode:!!testMode,
    height:0,ship:null,shipSpawned:false,
    platforms:[],particles:[],projectiles:[],whirlwindZones:[],traps:[],satellites:[],clones:[],
    stars:Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.02+Math.random()*0.04})),
    players,
    get p1(){return this.players[0];},
    get p2(){return this.players[1];},
    playerCount:btlPlayerCount,
    state:'countdown',countdown:180,winner:null,hitStop:0,_endBound:false
  };
  btl.platforms.push({x:0,worldY:0,w:W,h:20,type:'ground'});
  if(testMode){
    btl.platforms.push({x:W*0.1,worldY:-100,w:120,h:14,type:'rock'});
    btl.platforms.push({x:W*0.5,worldY:-100,w:120,h:14,type:'rock'});
    btl.platforms.push({x:W*0.3,worldY:-200,w:140,h:14,type:'rock'});
    btl.platforms.push({x:W*0.05,worldY:-300,w:100,h:14,type:'rock'});
    btl.platforms.push({x:W*0.6,worldY:-300,w:100,h:14,type:'rock'});
    btl.platforms.push({x:W*0.3,worldY:-400,w:160,h:14,type:'rock'});
  }else{
    let wy=-60;
    while(wy>-H*2){
      btl.platIdx++;
      const r1=btlHash(seed,btl.platIdx*3),r2=btlHash(seed,btl.platIdx*3+1),r3=btlHash(seed,btl.platIdx*3+2),r4=btlHash(seed,btl.platIdx*3+77);
      wy-=70+r1*50;const pw=70+r2*80;
      btl.platforms.push({x:r3*(W-pw),worldY:wy,w:pw,h:14,type:btlGetPlatType(r4)});
    }
  }
  btlRunning=true;btlLastTime=performance.now();BGM.battle();
  btlLoopId=requestAnimationFrame(btlLoop);
}

function btlStopLoop(){btlRunning=false;if(btlLoopId){cancelAnimationFrame(btlLoopId);btlLoopId=null;}BGM.stop();}
