function btlLoop(ts){
  if(!btlRunning)return;
  const raw=ts-btlLastTime;
  btlLastTime=ts;
  const dt=Math.min(raw/16.667,2.5);
  btlUpdate(dt);btlRender();
  btlLoopId=requestAnimationFrame(btlLoop);
}

function btlUpdate(dt){
  if(!btl||btl.state==='ended')return;
  btl.time+=dt;
  for(const s of btl.stars)s.tw+=s.spd*dt;

  // ─── 온라인 게스트: 상태 수신 + 입력 전송만 ───
  if(btl.online&&onlineRole==='guest'){
    if(btl._pendingState)applyHostState(btl._pendingState);
    sendOnlineInput();
    // 파티클/스파크 로컬 애니메이션
    for(const pt of btl.particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.1*dt;pt.life-=pt.decay*dt;}
    btl.particles=btl.particles.filter(pt=>pt.life>0);
    // 회오리장 파티클 (게스트 로컬)
    for(const wz of btl.whirlwindZones){
      if(Math.random()<0.4){
        const a=Math.random()*Math.PI*2,r=Math.random()*wz.radius;
        btl.particles.push({x:wz.x+Math.cos(a)*r,y:wz.worldY+Math.sin(a)*r-btl.camY,
          vx:Math.cos(a+1.5)*2,vy:Math.sin(a+1.5)*2-1,life:0.8,decay:0.06,sz:2+Math.random()*2,col:'rgba(130,170,220,0.7)'});
      }
    }
    return;
  }

  // ─── 로컬 / 온라인 호스트 ───
  if(btl.hitStop>0){btl.hitStop-=dt;return;}
  if(btl.state==='countdown'){btl.countdown-=dt;if(btl.countdown<=0)btl.state='playing';if(btl.online&&onlineRole==='host')sendOnlineState();return;}
  if(!btl.testMode){
    if(!btl.shipSpawned){
      if(btl.online){btl.scrollSpeed=Math.min(2.0,1.0+btl.time*0.0003);}
      else{btl.scrollSpeed=Math.min(2.0,1.0+btl.time*0.0003);}
    }else{
      btl.scrollSpeed=0;
    }
    btl.camY-=btl.scrollSpeed*dt;
    btl.height+=btl.scrollSpeed*dt*0.8;
  }

  // 우주선 시스템: 10000m → 스크롤 정지 → 5초 카운트다운 → 황금 발판 생성 → 우주선 착륙 → 탑승 가능
  if(!btl.testMode&&btl.height>=10000&&!btl.shipSpawned){
    btl.shipSpawned=true;
    btl.scrollSpeed=0;
    const padX=80+Math.random()*(W-260);
    const padWY=btl.camY+H*0.35;
    btl.platforms.push({x:padX,worldY:padWY,w:140,h:16,type:'gold',isShipPad:true});
    btl.ship={
      x:padX+70,w:80,h:100,
      worldY:btl.camY-200,
      targetWY:padWY-100,
      phase:'countdown',countdownTimer:0,
      boarded:null,boardedIdx:-1,boardTimer:0,
      launching:false,launchVy:0,
      padY:padWY
    };
  }
  if(btl.ship){
    const s=btl.ship;
    if(s.phase==='countdown'){
      s.countdownTimer+=dt;
      if(s.countdownTimer>=300){s.phase='descending';}
    }else if(s.phase==='descending'){
      s.worldY+=3.0*dt;
      if(s.worldY>=s.targetWY){s.worldY=s.targetWY;s.phase='ready';}
    }else if(s.phase==='ready'){
      for(let pi=0;pi<btl.players.length;pi++){
        const p=btl.players[pi];
        if(p.hp<=0)continue;
        const px=p.x+p.w/2,py=p.worldY+p.h;
        if(Math.abs(px-s.x)<50&&py>=s.worldY+s.h-30&&py<=s.worldY+s.h+15&&p.onGround){
          s.boarded=p;s.boardedIdx=pi;s.phase='boarded';s.boardTimer=0;p.vx=0;p.vy=0;break;
        }
      }
    }else if(s.phase==='boarded'){
      const bp=s.boarded;
      bp.x=s.x-bp.w/2;bp.worldY=s.worldY+20;bp.vx=0;bp.vy=0;
      s.boardTimer+=dt;
      if(s.boardTimer>=300){s.phase='launching';s.launchVy=0;}
    }else if(s.phase==='launching'){
      const bp=s.boarded;
      s.launchVy-=0.15*dt;s.worldY+=s.launchVy*dt;
      bp.x=s.x-bp.w/2;bp.worldY=s.worldY+20;
      for(let i=0;i<3;i++){btl.particles.push({x:s.x-15+Math.random()*30,y:s.worldY+s.h-btl.camY+Math.random()*10,vx:(Math.random()-0.5)*3,vy:3+Math.random()*4,life:1,decay:0.06+Math.random()*0.04,sz:4+Math.random()*4,col:i%2?'#ff6633':'#ffe066'});}
      if(s.worldY-btl.camY<-200){btl.state='ended';btl.winner=s.boarded.label;if(btl.online&&onlineRole==='host')sendOnlineState();}
    }
  }

  // 플레이어 업데이트
  const pKeys=[
    ['ArrowLeft','ArrowRight','ArrowUp',null],
    ['KeyA','KeyD','KeyW',null],
    ['KeyF','KeyH','KeyT','KeyZ'],
    ['Numpad4','Numpad6','Numpad8','Numpad5'],
  ];
  for(let i=0;i<btl.players.length;i++){
    if(btl.online&&onlineRole==='host'&&i>0){
      applyGuestInput(btl.players[i],i,dt);
    }else if(btl.online&&i===0){
      // 호스트: 화살표 + WASD + Space 모두 사용
      keys['_hL']=keys['ArrowLeft']||keys['KeyA'];
      keys['_hR']=keys['ArrowRight']||keys['KeyD'];
      keys['_hJ']=keys['ArrowUp']||keys['KeyW']||keys['Space'];
      btlUpdatePlayer(btl.players[0],dt,'_hL','_hR','_hJ',null);
      delete keys['_hL'];delete keys['_hR'];delete keys['_hJ'];
    }else{
      const k=pKeys[i];
      btlUpdatePlayer(btl.players[i],dt,k[0],k[1],k[2],k[3]);
    }
  }
  // 공격 판정 (모든 플레이어 조합)
  for(let i=0;i<btl.players.length;i++){
    for(let j=0;j<btl.players.length;j++){
      if(i!==j)btlCheckHit(btl.players[i],btl.players[j]);
    }
  }
  for(const p of btl.players)btlCheckFall(p);
  // 생존자 확인
  const alive=btl.players.filter(p=>p.hp>0);
  if(alive.length===1){btl.state='ended';btl.winner=alive[0].label;SFX.ko();if(btl.online&&onlineRole==='host')sendOnlineState();return;}
  if(alive.length===0){btl.state='ended';btl.winner='DRAW';SFX.ko();if(btl.online&&onlineRole==='host')sendOnlineState();return;}

  // 발판 생성
  if(!btl.testMode&&!btl.shipSpawned){
    let topWY=Math.min(...btl.platforms.map(p=>p.worldY));
    while(topWY>btl.camY-H*1.5){
      btl.platIdx++;
      const r1=btlHash(btl.seed,btl.platIdx*3),r2=btlHash(btl.seed,btl.platIdx*3+1),r3=btlHash(btl.seed,btl.platIdx*3+2),r4=btlHash(btl.seed,btl.platIdx*3+77);
      const gap=70+r1*50;topWY-=gap;const pw=70+r2*80;
      btl.platforms.push({x:r3*(W-pw),worldY:topWY,w:pw,h:14,type:btlGetPlatType(r4)});
    }
  }
  if(!btl.testMode){btl.platforms=btl.platforms.filter(p=>p.isShipPad||p.worldY-btl.camY<H+200);}
  for(const pt of btl.particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.1*dt;pt.life-=pt.decay*dt;}
  btl.particles=btl.particles.filter(pt=>pt.life>0);
  btlUpdateProjectiles(dt);
  for(const p of btl.players){if(p.slowTimer>0)p.slowTimer-=dt;if(p.floatTimer>0)p.floatTimer-=dt;}
  if(btl.online&&onlineRole==='host')sendOnlineState();
}

// 시드 기반 해시 (0~1 반환, 결정론적)
function btlHash(seed,idx){
  let h=(seed*2654435761+idx*2246822519)>>>0;
  h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;
  return(h&0x7fffffff)/0x7fffffff;
}

function btlAutoAimAttack(p){
  let nearest=null,nearestD=Infinity;
  for(const op of btl.players){
    if(op===p||op.hp<=0)continue;
    const dx=op.x+op.w/2-(p.x+p.w/2),dy=op.worldY+op.h/2-(p.worldY+p.h/2);
    const d=dx*dx+dy*dy;
    if(d<nearestD){nearestD=d;nearest=op;}
  }
  if(nearest){
    const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
    btlTriggerAttack(p,nearest.x+nearest.w/2,nearest.worldY+nearest.h/2-btl.camY);
  }
}

function btlUpdatePlayer(p,dt,kL,kR,kJ,kAtk){
  // 사망 또는 우주선 탑승 중이면 스킵
  if(p.hp<=0)return;
  if(btl.ship&&btl.ship.boarded===p)return;
  const hasCrouch=p.crouchTime>0;
  const isCockroach=p.charId==='cockroach';
  const isIlluminati=p.charId==='illuminati';
  const isFlyChar=isCockroach||isIlluminati;
  const isProtein=p.charId==='protein_stick';

  // 기절 타이머
  if(p.stunTimer>0){
    p.stunTimer-=dt;
    // 기절 중에도 물리만 적용 (조작 불가)
    if(p.floatTimer>0){p.vy=Math.min(p.vy+0.08*dt,3);}
    else if(isFlyChar&&!p.onGround){p.vy=Math.min(p.vy+0.35*dt,10);}
    else if(p.charId==='storm'&&!p.onGround&&p.vy>0){p.vy=Math.min(p.vy+0.25*dt,6);}
    else{p.vy=Math.min(p.vy+0.55*dt,18);}
    p.vx*=0.95; // 넉백 감속
    p.x+=p.vx*dt;p.worldY+=p.vy*dt;
    if(p.worldY<btl.camY){p.worldY=btl.camY;if(p.vy<0)p.vy=0;}
    if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;
    // 기절 중 착지 체크
    p.onGround=false;
    for(const pl of btl.platforms){
      if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
      const pBot=p.worldY+p.h,pBotPrev=pBot-p.vy*dt;
      if(pBotPrev<=pl.worldY+2&&pBot>=pl.worldY&&p.vy>0){
        p.worldY=pl.worldY-p.h;p.vy=0;p.onGround=true;
      }
    }
    return;
  }

  // 특수능력 타이머 진행
  if(p.specialCooldown>0)p.specialCooldown-=dt;
  if(p.buffTimer>0)p.buffTimer-=dt;
  if(p.invulTimer>0)p.invulTimer-=dt;
  if(p.bindTimer>0)p.bindTimer-=dt;
  if(p.confuseTimer>0)p.confuseTimer-=dt;

  // ─ 준비운동 (단백질 스틱): 완전 정지 (피해 받으면 캔슬 — 무적 아님) ─
  if(p.warmupTimer>0){
    p.warmupTimer-=dt;
    p.vx=0;p.vy=0;
    // 바닥에 가깝게 유지 (떠있지 않도록)
    p.onGround=false;
    for(const pl of btl.platforms){
      if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
      if(Math.abs((p.worldY+p.h)-pl.worldY)<4){p.worldY=pl.worldY-p.h;p.onGround=true;break;}
    }
    if(p.warmupTimer<=0){
      // 완료 → 콤보 스택 부여
      const maxStack=Math.floor((p.bs.maxComboKb-p.bs.kb)/p.bs.comboKbGrow);
      p.comboCount=Math.min(maxStack,(p.comboCount||0)+(p.bs.warmupStacks||5));
      btlSpawnPt(p.x+p.w/2,p.worldY+p.h/2-btl.camY,'#ffe066',30);
    }
    return; // 준비운동 중엔 모든 조작 무시
  }

  // ─ 구르기 (탐험가) / 파도타기 (물고기): 이동 오버라이드 ─
  if(p.dodgeTimer>0){
    p.dodgeTimer-=dt;
    p.vx=p.dodgeVx;p.vy=0;
    p.x+=p.vx*dt;
    if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;
    if(p.dodgeTimer<=0){p.dodgeVx=0;}
    // 구르기는 중력/충돌을 거의 무시하지만 바닥에는 닿음
    p.onGround=false;
    for(const pl of btl.platforms){
      if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
      if(Math.abs((p.worldY+p.h)-pl.worldY)<6){p.worldY=pl.worldY-p.h;p.onGround=true;break;}
    }
    // 파티클 트레일
    if(Math.random()<0.5)btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,'#7ef',2);
    return;
  }
  if(p.dashTimer>0){
    p.dashTimer-=dt;
    p.vx=p.dashVx;p.vy=p.dashVy;
    p.x+=p.vx*dt;p.worldY+=p.vy*dt;
    if(p.worldY<btl.camY){p.worldY=btl.camY;if(p.vy<0)p.vy=0;}
    if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;
    // 물 파티클 트레일
    if(Math.random()<0.8)btlSpawnPt(p.x+p.w/2,p.worldY+p.h/2-btl.camY,'#4488ff',2);
    return;
  }

  // 이동 (웅크림 중엔 느리게, 슬로우 적용, 버프 시 가속)
  // 속박(bindTimer)중이면 입력 무시, 마찰 강하게
  // 혼란(confuseTimer)중이면 좌우 반전
  const buffMul=p.buffTimer>0?1.3:1;
  const spdMult=(p.slowTimer>0?0.5:1)*buffMul;
  const confused=p.confuseTimer>0;
  const effL=confused?kR:kL,effR=confused?kL:kR;
  if(p.bindTimer>0){
    p.vx*=0.7;
  }else if(keys[effL]){if(!p.crouching){p.vx=-p.speed*spdMult;p.facing=-1;}}
  else if(keys[effR]){if(!p.crouching){p.vx=p.speed*spdMult;p.facing=1;}}
  else p.vx*=p.friction;

  // 웅크림 점프 (인절미, 단백질 스틱)
  if(hasCrouch&&p.crouching){
    p.vx*=0.5;
    p.crouchTimer+=dt;
    if(!p.onGround){p.crouching=false;}
    else if(p.crouchTimer>=p.crouchTime){
      p.crouching=false;
      p.vy=p.jumpForce;p.jumps--;SFX.crouchRelease();
      btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,'#d4c4a0',15);
    }
  }

  // 바퀴벌레 비행 (회오리장 안이면 비행 불가)
  if(isFlyChar&&p.floatTimer<=0&&!p.inWhirlwind){
    const flyKey=keys[kJ];
    if(flyKey&&p.flyTimer<p.maxFlyTime){
      p.vy=Math.max(p.vy-1.0*dt,-7);
      p.flyTimer+=dt;p.flying=true;SFX.fly();
    }else{p.flying=false;}
    if(p.onGround){p.flyTimer=0;p.flying=false;}
  }else if(isFlyChar&&p.inWhirlwind){p.flying=false;}

  // 점프 (캐릭터별 분기) — 회오리장 안이면 점프 불가 (폭풍 제외)
  // floatTimer 중에는 점프력 30%로 제한
  const floatJmpMul=p.floatTimer>0?0.3:1;
  if(keys[kJ]&&!p._jumpHeld&&!p.inWhirlwind&&p.bindTimer<=0){
    if(isFlyChar){
      // 바퀴벌레/일루미나티: 점프 없음, 비행은 위에서 처리
    }else if(hasCrouch){
      if(p.onGround&&!p.crouching&&!p.knocked){p.crouching=true;p.crouchTimer=0;p._jumpHeld=true;}
      else if(!p.onGround&&p.jumps>0){p.vy=p.airJumpForce*floatJmpMul;p.jumps--;p._jumpHeld=true;SFX.jump(p.jumps,p.maxJumps);btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,'#d4c4a0',10);}
      else if(p.onGround&&p.knocked&&p.jumps>0){
        p.vy=p.airJumpForce*floatJmpMul;p.jumps--;p._jumpHeld=true;SFX.jump(p.jumps,p.maxJumps);btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,6);
      }
    }else{
      if(p.jumps>0){p.vy=p.jumpForce*floatJmpMul;p.jumps--;p._jumpHeld=true;SFX.jump(p.jumps,p.maxJumps);
        if(!p.onGround)btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,10);
        else btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,6);
      }
    }
  }
  if(!keys[kJ])p._jumpHeld=false;

  // 실명 타이머
  if(p.blindTimer>0)p.blindTimer-=dt;
  // 공격 (마우스 클릭으로 트리거됨) — 토끼 신체강화 시 쿨 감소 2배
  if(p.attackCooldown>0)p.attackCooldown-=dt*(p.buffTimer>0?2:1);
  if(p.attacking){p.attackTimer-=dt;if(p.attackTimer<=0)p.attacking=false;}
  // 물고기 물기둥 (연속 빔)
  if(p.streamTimer>0){
    p.streamTimer-=dt;
    // 마우스 방향 실시간 추적
    if(btl.online&&onlineRole==='host'){
      if(p===btl.players[0]){
        const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
        p.streamAngle=Math.atan2(btlMouseY-cy,btlMouseX-cx);
      }else{
        const inp=pendingInputs[btl.players.indexOf(p)];
        if(inp)p.streamAngle=inp.mg||0;
      }
    }else if(!btl.online){
      if(p===btl.players[0]||p===btl.players[1]){
        const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
        p.streamAngle=Math.atan2(btlMouseY-cy,btlMouseX-cx);
      }
    }
    // 빔 히트 판정 (매 tickRate 프레임마다)
    p._streamTickT=(p._streamTickT||0)+dt;
    if(p._streamTickT>=(p.bs.streamTickRate||3)){
      p._streamTickT=0;
      const bs=p.bs;const range=bs.streamRange||190;
      const cx=p.x+p.w/2,cy=p.worldY+p.h/2;
      const cosA=Math.cos(p.streamAngle),sinA=Math.sin(p.streamAngle);
      for(const tgt of btl.players){
        if(tgt===p||tgt.hp<=0||tgt.stunTimer>0)continue;
        const tx=tgt.x+tgt.w/2,ty=tgt.worldY+tgt.h/2;
        const dx=tx-cx,dy=ty-cy;
        const proj=dx*cosA+dy*sinA;
        if(proj<0||proj>range)continue;
        const perp=Math.abs(-dx*sinA+dy*cosA);
        if(perp<20){
          btlApplyHit(tgt,p.streamAngle,bs.kb,bs.stun);
          btlSpawnPt(tx,ty-btl.camY,'#4488ff',6);
        }
      }
    }
  }
  // 공격: 마우스(P1/P2) 또는 키보드 자동조준(P3/P4)
  if(!p.attacking&&p.attackCooldown<=0&&p.stunTimer<=0){
    if(p._mouseHeld){btlTriggerAttack(p,btlMouseX,btlMouseY);}
    if(kAtk&&keys[kAtk]){btlAutoAimAttack(p);}
  }

  // 좀비 자폭 차지 진행 (우클릭 누르고 있는 동안 누적)
  if(p.charging){
    if(p.stunTimer>0||p.bindTimer>0){
      p.charging=false;p.chargeTimer=0;
    }else if(!p._spHeld){
      // 떼었을 때 최소 차지 충족 시 폭발, 미달이면 취소
      if(p.chargeTimer>=(p.bs.chargeMin||300)){
        btlDetonateZombie(p);
        p.specialCooldown=p.bs.specialCooldown;
      }
      p.charging=false;p.chargeTimer=0;
    }else{
      p.chargeTimer+=dt;
      // 최대 차지 도달 시 자동 폭발
      if(p.chargeTimer>=(p.bs.chargeMax||600)){
        btlDetonateZombie(p);
        p.specialCooldown=p.bs.specialCooldown;
        p.charging=false;p.chargeTimer=0;
      }
    }
  }

  // 중력 (바퀴벌레/우주비행사/폭풍은 느린 낙하, floatTimer=무중력)
  if(p.floatTimer>0){
    p.vy=Math.min(p.vy+0.08*dt,3);
  }else if(isFlyChar&&!p.onGround&&!p.flying){
    p.vy=Math.min(p.vy+0.35*dt,10);
  }else if(p.charId==='astronaut'&&!p.onGround&&p.vy>0){
    p.vy=Math.min(p.vy+0.3*dt,8);
  }else if(p.charId==='storm'&&!p.onGround&&p.vy>0){
    p.vy=Math.min(p.vy+0.25*dt,6);
  }else{
    p.vy=Math.min(p.vy+0.55*dt,18);
  }
  // 물고기 탱탱볼 바운스 (배틀)
  if(p.charId==='fish'&&p.onGround&&!keys[kJ]){
    p.vy=-6;p.onGround=false;p._fishLanded=true;
  }

  p.x+=p.vx*dt;p.worldY+=p.vy*dt;
  if(p.worldY<btl.camY){p.worldY=btl.camY;if(p.vy<0)p.vy=0;}
  if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;

  // 충돌
  p.onGround=false;
  for(const pl of btl.platforms){
    if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
    const pBot=p.worldY+p.h,pBotPrev=pBot-p.vy*dt;
    if(pBotPrev<=pl.worldY+2&&pBot>=pl.worldY&&p.vy>0){
      p.worldY=pl.worldY-p.h;p.vy=0;p.onGround=true;
      // 착지하면 넉백 해제 + 점프 완전 회복
      if(p.knocked){p.knocked=false;p.flyTimer=0;}
      p.jumps=p.maxJumps;
      if(p.freezesPlatforms&&pl.moving&&!pl.frozen){
        pl.frozen=true;pl.moving=false;pl.moveSpeed=0;
        btlSpawnPt(p.x+p.w/2,pl.worldY-btl.camY,'#aaddff',12);
      }
    }
  }

  // 캐릭터 간 겹침 방지 (살짝 밀어내기)
  if(p.stunTimer<=0){
    for(const op of btl.players){
      if(op===p||op.hp<=0)continue;
      const dx=(p.x+p.w/2)-(op.x+op.w/2);
      const dy=(p.worldY+p.h/2)-(op.worldY+op.h/2);
      const minDist=p.w*0.9;
      if(Math.abs(dx)<minDist&&Math.abs(dy)<p.h*0.8){
        const push=(minDist-Math.abs(dx))*0.15;
        p.x+=dx>0?push:-push;
      }
    }
  }

  // 단백질 스틱 공중 회전
  if(isProtein&&!p.onGround){p.spinAngle+=0.25*dt;}
  else{p.spinAngle=0;}

  if(Math.abs(p.vx)>0.5){p.ft+=dt;if(p.ft>7){p.ft=0;p.frame=(p.frame+1)%4;}}else p.frame=0;
}

function btlCheckHit(atk,tgt){
  const bs=atk.bs;
  // 펀치 계열 (human, rabbit, protein_stick)
  if(bs.atkType==='punch'||bs.atkType==='rapidPunch'||bs.atkType==='comboPunch'){
    if(!atk.attacking||atk.attackTimer<1)return;
    if(tgt.stunTimer>0)return;
    if(tgt.invulTimer>0)return;
    const cx=atk.x+atk.w/2,cy=atk.worldY+atk.h/2;
    const maxT=bs.atkType==='rapidPunch'?8:bs.atkType==='comboPunch'?10:12;
    const prog=atk.attackTimer/maxT;
    const ext=Math.sin(prog*Math.PI)*90;
    const fistX=cx+Math.cos(atk.attackAngle)*ext;
    const fistY=cy+Math.sin(atk.attackAngle)*ext;
    const dx=(tgt.x+tgt.w/2)-fistX,dy=(tgt.worldY+tgt.h/2)-fistY;
    if(Math.sqrt(dx*dx+dy*dy)<36){
      let kb=bs.kb;
      if(bs.atkType==='comboPunch'){atk.comboCount++;kb=Math.min(bs.maxComboKb,bs.kb+atk.comboCount*bs.comboKbGrow);}
      // 토끼 신체강화 버프
      if(atk.buffTimer>0&&bs.atkType==='rapidPunch')kb=kb*(bs.buffKbMul||1);
      btlApplyHit(tgt,atk.attackAngle,kb,bs.stun);
      atk.attacking=false;btl.hitStop=bs.atkType==='rapidPunch'?2:5;
    }
  }
  // 좀비 할퀴기 (양쪽 광역 근접)
  else if(bs.atkType==='claw'){
    if(!atk.attacking||atk.attackTimer<2)return;
    if(tgt.stunTimer>0)return;
    if(tgt.invulTimer>0)return;
    const cx=atk.x+atk.w/2,cy=atk.worldY+atk.h/2;
    const tx=tgt.x+tgt.w/2,ty=tgt.worldY+tgt.h/2;
    const dx=tx-cx,dy=ty-cy;
    // 양옆 공격: 수평 거리 clawRange, 수직 ±16
    if(Math.abs(dx)<(bs.clawRange||48)&&Math.abs(dy)<22){
      const angle=dx>=0?0:Math.PI; // 좌우 방향으로 넉백
      btlApplyHit(tgt,angle,bs.clawKb||15,bs.clawStun||45);
      atk.attacking=false;btl.hitStop=4;
    }
  }
  // 물고기 파도타기 접촉 타격
  if(atk.dashTimer>0&&tgt.stunTimer<=0&&tgt.invulTimer<=0){
    const dx=(tgt.x+tgt.w/2)-(atk.x+atk.w/2);
    const dy=(tgt.worldY+tgt.h/2)-(atk.worldY+atk.h/2);
    if(Math.abs(dx)<24&&Math.abs(dy)<26){
      const angle=Math.atan2(atk.dashVy,atk.dashVx);
      btlApplyHit(tgt,angle,atk._dashKb||25,atk._dashStun||60);
      btl.hitStop=5;
      atk.dashTimer=0; // 한 번 맞히고 돌진 종료
    }
  }
  // 인절미 grab arm은 btlUpdateProjectiles에서 처리
}

function btlApplyHit(tgt,angle,kb,stun){
  if(tgt.invulTimer>0)return; // 무적 프레임 — 피해 무시
  SFX.punchHit();
  tgt.vx=Math.cos(angle)*kb;tgt.vy=Math.sin(angle)*kb;
  tgt.stunTimer=stun;tgt.crouching=false;tgt.crouchTimer=0;tgt.flying=false;
  tgt.knocked=true;
  // 준비운동 상태도 공격 맞으면 캔슬 (스택 못 받음)
  if(tgt.warmupTimer>0){tgt.warmupTimer=0;}
  if(tgt.charId==='cockroach'||tgt.charId==='illuminati'){tgt.flyTimer=tgt.maxFlyTime*0.5;tgt.jumps=0;}
  else if(tgt.charId==='rabbit'){tgt.jumps=2;}
  else{tgt.jumps=1;}
  const hx=tgt.x+tgt.w/2,hy=tgt.worldY+tgt.h/2-btl.camY;
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    btl.particles.push({x:hx,y:hy,vx:Math.cos(angle)*s*1.5+Math.cos(a)*s*0.5,vy:Math.sin(angle)*s*1.5+Math.sin(a)*s*0.5,life:1,decay:0.05+Math.random()*0.04,sz:3+Math.random()*3,col:'#ffe066'});}
}

// ─── 일루미나티 분신 시스템 ───────────────────────────
function btlCloneDestroyed(cl,attacker){
  // 영혼 투사체 생성 — 공격자를 향해 유도
  const target=(attacker&&attacker.hp>0)?attacker:null;
  btl.projectiles.push({
    type:'soul',owner:cl.owner,
    x:cl.x+cl.w/2,y:cl.worldY+cl.h/2,
    vx:0,vy:0,dist:0,maxDist:900,
    confuseDur:(cl.owner.bs&&cl.owner.bs.confuseDuration)||120,
    target,speed:9,life:240
  });
  // 소멸 파티클
  const scx=cl.x+cl.w/2,sy=cl.worldY+cl.h/2-btl.camY;
  for(let k=0;k<18;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    btl.particles.push({x:scx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04,sz:3,col:k%2?'#ffd700':'#aaa'});}
  SFX.eyeBeamLaunch&&SFX.eyeBeamLaunch();
}
function btlUpdateClones(dt){
  if(!btl.clones)btl.clones=[];
  const remove=[];
  for(let i=0;i<btl.clones.length;i++){
    const cl=btl.clones[i];
    if(!cl.owner||cl.owner.hp<=0){remove.push(i);continue;}
    // 물리 (중력 + 일루미나티 느린 낙하)
    cl.vy=Math.min(cl.vy+0.35*dt,10);
    // 카메라 뒤처짐 방지 (공중부양)
    if(cl.worldY-btl.camY>H-80){cl.vy=Math.min(cl.vy,-1.5);}
    cl.x+=cl.vx*dt;cl.worldY+=cl.vy*dt;
    // 발판 충돌
    cl.onGround=false;
    for(const pl of btl.platforms){
      if(cl.x+cl.w<=pl.x||cl.x>=pl.x+pl.w)continue;
      if(cl.vy>=0&&cl.worldY+cl.h>=pl.worldY&&cl.worldY+cl.h<=pl.worldY+pl.h+6){
        cl.worldY=pl.worldY-cl.h;cl.vy=0;cl.onGround=true;break;
      }
    }
    // 화면 밖 소멸
    if(cl.worldY-btl.camY>H+80){remove.push(i);continue;}
    if(cl.x<-cl.w)cl.x=W;if(cl.x>W)cl.x=-cl.w;
    // 마찰
    cl.vx*=0.92;
    // 공격 타이머 감소 (btlTriggerAttack에서 설정됨)
    if(cl.attacking){
      cl.attackTimer-=dt;
      if(cl.attackTimer<=0)cl.attacking=false;
    }
    // 피격 판정: 적 투사체
    let destroyedBy=null;
    for(const pr of btl.projectiles){
      if(pr.type==='soul')continue;
      if(!pr.owner||pr.owner===cl.owner)continue;
      const dx=pr.x-(cl.x+cl.w/2),dy=pr.y-(cl.worldY+cl.h/2);
      if(Math.abs(dx)<cl.w/2+8&&Math.abs(dy)<cl.h/2+10){
        destroyedBy=pr.owner;
        // 투사체도 제거 (관통형은 유지)
        if(pr.type!=='head'&&pr.type!=='whirlwind'){
          const pi=btl.projectiles.indexOf(pr);
          if(pi>=0)btl.projectiles.splice(pi,1);
        }
        break;
      }
    }
    // 피격 판정: 근접 공격
    if(!destroyedBy){
      for(const atk of btl.players){
        if(atk===cl.owner||atk.hp<=0||!atk.attacking)continue;
        if(atk.bs.atkType!=='punch'&&atk.bs.atkType!=='rapidPunch'&&atk.bs.atkType!=='comboPunch'&&atk.bs.atkType!=='claw')continue;
        const prog=atk.attackTimer/12;
        const ext=Math.sin(prog*Math.PI)*(atk.bs.atkType==='claw'?(atk.bs.clawRange||48):90);
        const ax=atk.x+atk.w/2+Math.cos(atk.attackAngle||0)*ext;
        const ay=atk.worldY+atk.h/2+Math.sin(atk.attackAngle||0)*ext;
        const dx=ax-(cl.x+cl.w/2),dy=ay-(cl.worldY+cl.h/2);
        if(Math.abs(dx)<14&&Math.abs(dy)<18){destroyedBy=atk;break;}
      }
    }
    if(destroyedBy){btlCloneDestroyed(cl,destroyedBy);remove.push(i);continue;}
  }
  for(let i=remove.length-1;i>=0;i--)btl.clones.splice(remove[i],1);
}

// ─── 투사체 시스템 ───────────────────────────
function btlUpdateProjectiles(dt){
  const remove=[];
  for(let i=0;i<btl.projectiles.length;i++){
    const pr=btl.projectiles[i];
    if(pr.type==='bomb'){
      if(!pr.landed){
        pr.vy+=pr.gravity*dt;
        pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
        // 바닥/발판 충돌
        for(const pl of btl.platforms){
          if(pr.x>pl.x&&pr.x<pl.x+pl.w&&pr.y>=pl.worldY-6&&pr.y<=pl.worldY+pl.h+4){
            pr.landed=true;pr.vx=0;pr.vy=0;pr.y=pl.worldY-6;pr.landedPlat=pl;pr.fuse=pr.fuse>120?120:pr.fuse;break;}
        }
        // 직접 적중 → 즉시 폭발
        if(!pr.landed){
          for(const tgt of btl.players){
            if(tgt===pr.owner||tgt.hp<=0)continue;
            if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
              btlExplode(pr);remove.push(i);break;
            }
          }
          if(remove.includes(i))continue;
        }
      }
      pr.fuse-=dt;
      if(pr.fuse<=0){btlExplode(pr);remove.push(i);continue;}
      if(pr.y-btl.camY>H+100){remove.push(i);continue;}
    }
    else if(pr.type==='shard'){
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist){remove.push(i);continue;}
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          tgt.slowTimer=pr.slowDur;
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#aaddff',10);
          hit=true;break;
        }
      }
      if(hit){remove.push(i);continue;}
    }
    else if(pr.type==='laser'){
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist){remove.push(i);continue;}
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          tgt.floatTimer=pr.slowDur;
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#ff4444',12);
          hit=true;break;
        }
      }
      if(hit){remove.push(i);continue;}
    }
    else if(pr.type==='bone'){
      pr.vy+=pr.gravity*dt;
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.abs(pr.vx)*dt;
      if(pr.dist>=pr.maxDist||pr.y-btl.camY>H+50){remove.push(i);continue;}
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#f0f0f0',10);
          hit=true;break;
        }
      }
      if(hit){remove.push(i);continue;}
    }
    else if(pr.type==='eye_beam'){
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist){remove.push(i);continue;}
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<16&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<18){
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          tgt.blindTimer=pr.blindDur||120;
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#FFD700',15);
          hit=true;break;
        }
      }
      if(hit){remove.push(i);continue;}
    }
    else if(pr.type==='big_ice'){
      // 얼음 특수: 거대 얼음 (포물선, 강한 단발)
      pr.vy+=pr.gravity*dt;
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist||pr.y-btl.camY>H+50){remove.push(i);continue;}
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0||tgt.invulTimer>0)continue;
        const dx=pr.x-(tgt.x+tgt.w/2),dy=pr.y-(tgt.worldY+tgt.h/2);
        if(Math.sqrt(dx*dx+dy*dy)<pr.radius){
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          tgt.slowTimer=pr.slowDur;
          for(let k=0;k<16;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
            btl.particles.push({x:pr.x,y:pr.y-btl.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04,sz:3+Math.random()*3,col:'#aaddff'});}
          hit=true;break;
        }
      }
      // 바닥 발판 충돌 — 단, 발사 위치로부터 최소 거리 지나야 유효 (내 발판에서 즉발 방지)
      if(!hit){
        const minTravel=pr.radius+12;
        const dxFromStart=Math.abs(pr.x-(pr._startX||pr.x));
        const dyFromStart=Math.abs(pr.y-(pr._startY||pr.y));
        if(Math.sqrt(dxFromStart*dxFromStart+dyFromStart*dyFromStart)>minTravel){
          for(const pl of btl.platforms){
            if(pr.x>pl.x&&pr.x<pl.x+pl.w&&pr.y>=pl.worldY-pr.radius&&pr.y<=pl.worldY+pl.h+pr.radius){
              for(let k=0;k<20;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
                btl.particles.push({x:pr.x,y:pr.y-btl.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.04,sz:3+Math.random()*3,col:'#aaddff'});}
              hit=true;break;
            }
          }
        }
      }
      if(hit){remove.push(i);continue;}
    }
    else if(pr.type==='mochi'){
      // 인절미 끈끈이 떡: 포물선 → 접촉 시 폭발 → 속박 AoE (넉백·기절 없음)
      pr.vy+=pr.gravity*dt;
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist||pr.y-btl.camY>H+50){remove.push(i);continue;}
      let exploded=false;
      // 적 직접 접촉
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<22){
          exploded=true;break;
        }
      }
      // 바닥 발판 접촉 (발사 직후 잠깐은 제외)
      if(!exploded){
        const dxFromStart=Math.abs(pr.x-(pr._startX||pr.x));
        const dyFromStart=Math.abs(pr.y-(pr._startY||pr.y));
        if(Math.sqrt(dxFromStart*dxFromStart+dyFromStart*dyFromStart)>30){
          for(const pl of btl.platforms){
            if(pr.x>pl.x&&pr.x<pl.x+pl.w&&pr.y>=pl.worldY-4&&pr.y<=pl.worldY+pl.h+4){
              exploded=true;break;
            }
          }
        }
      }
      if(exploded){
        // AoE 속박
        for(const tgt of btl.players){
          if(tgt===pr.owner||tgt.hp<=0||tgt.invulTimer>0)continue;
          const dx=pr.x-(tgt.x+tgt.w/2),dy=pr.y-(tgt.worldY+tgt.h/2);
          if(Math.sqrt(dx*dx+dy*dy)<pr.radius){
            tgt.bindTimer=Math.max(tgt.bindTimer,pr.bindDur);
            tgt.vx=0;
            btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#f8a0c0',12);
          }
        }
        // 폭발 파티클 (떡색)
        for(let k=0;k<30;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
          btl.particles.push({x:pr.x,y:pr.y-btl.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,decay:0.03,sz:3+Math.random()*4,col:k%2?'#f8c0d0':'#ffe0e8'});}
        SFX.explode&&SFX.explode();
        remove.push(i);continue;
      }
    }
    else if(pr.type==='head'){
      // 해골 머리 투척 (포물선, 생존 시 투사체 판정 유지)
      if(!pr.landed){
        pr.vy+=pr.gravity*dt;
        pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.abs(pr.vx)*dt;
        // 발판 충돌 → 착지 (머리로 남음)
        for(const pl of btl.platforms){
          if(pr.x>pl.x&&pr.x<pl.x+pl.w&&pr.y>=pl.worldY-4&&pr.y<=pl.worldY+pl.h+4){
            pr.landed=true;pr.vx=0;pr.vy=0;pr.y=pl.worldY-4;pr.landedPlat=pl;break;
          }
        }
        // 적중 판정 (비행 중)
        if(!pr.landed){
          for(const tgt of btl.players){
            if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0||tgt.invulTimer>0)continue;
            if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
              btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
              btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#f0f0f0',10);
              // 머리는 여기서 떨어지지만 사라지진 않음 (순간이동 가능)
              pr.landed=true;pr.vx=0;pr.vy=0;
              break;
            }
          }
        }
      }
      // 머리 생명주기
      pr.life-=dt;
      if(pr.life<=0||pr.y-btl.camY>H+100){
        // 만료: 주인 머리 복구 + 쿨다운 시작 (3초)
        if(pr.owner&&pr.owner.thrownHead===pr){
          pr.owner.thrownHead=null;pr.owner.headless=false;
          pr.owner.specialCooldown=pr.owner.bs.specialCooldown||180;
          pr.owner._teleportUsed=false;
        }
        remove.push(i);continue;
      }
    }
    else if(pr.type==='soul'){
      // 영혼: 가까운 적 유도 → 맞으면 혼란 (좌우 반전)
      pr.life-=dt;
      if(pr.life<=0||pr.dist>pr.maxDist){remove.push(i);continue;}
      // 타겟 유효성 체크
      if(!pr.target||pr.target.hp<=0||pr.target===pr.owner){
        let best=null,bestD=Infinity;
        for(const tgt of btl.players){
          if(tgt===pr.owner||tgt.hp<=0)continue;
          const dx=tgt.x-pr.x,dy=tgt.worldY-pr.y;
          const d=dx*dx+dy*dy;
          if(d<bestD){bestD=d;best=tgt;}
        }
        pr.target=best;
      }
      if(pr.target){
        const tx=pr.target.x+pr.target.w/2,ty=pr.target.worldY+pr.target.h/2;
        const dx=tx-pr.x,dy=ty-pr.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        pr.vx=(dx/d)*pr.speed;pr.vy=(dy/d)*pr.speed;
      }
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
      pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      // 적중
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.invulTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<16&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
          tgt.confuseTimer=Math.max(tgt.confuseTimer||0,pr.confuseDur);
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#cc66ff',15);
          remove.push(i);break;
        }
      }
    }
    else if(pr.type==='whirlwind'){
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist){
        // 최대 거리 도달 → 회오리장 설치
        btl.whirlwindZones.push({x:pr.x,worldY:pr.y,radius:pr.zoneRadius,life:pr.zoneDur,
          pullStr:pr.pullStr,slowDur:pr.slowDur,kb:pr.zoneKb,tickRate:pr.tickRate,_tickT:0,owner:pr.owner});
        SFX.whirlwindHit();
        btlSpawnPt(pr.x,pr.y-btl.camY,'#8ab0e0',15);
        remove.push(i);continue;
      }
      let hit=false;
      for(const tgt of btl.players){
        if(tgt===pr.owner||tgt.hp<=0||tgt.stunTimer>0)continue;
        if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
          // 직접 적중 → 즉시 넉백+기절 + 그 자리에 회오리장 설치
          btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#8ab0e0',12);
          btl.whirlwindZones.push({x:pr.x,worldY:pr.y,radius:pr.zoneRadius,life:pr.zoneDur,
            pullStr:pr.pullStr,slowDur:pr.slowDur,kb:pr.zoneKb,tickRate:pr.tickRate,_tickT:0,owner:pr.owner});
          SFX.whirlwindHit();
          hit=true;break;
        }
      }
      if(hit){remove.push(i);continue;}
    }
  }
  for(let i=remove.length-1;i>=0;i--)btl.projectiles.splice(remove[i],1);

  // 회오리장 업데이트 (점프 불가 플래그 리셋)
  for(const p of btl.players)p.inWhirlwind=false;
  for(const wz of btl.whirlwindZones){
    wz.life-=dt;
    wz._tickT+=dt;
    if(wz._tickT>=wz.tickRate){
      wz._tickT=0;
      SFX.whirlwindZone();
      for(const tgt of btl.players){
        if(tgt===wz.owner||tgt.hp<=0)continue;
        const dx=wz.x-(tgt.x+tgt.w/2),dy=wz.worldY-(tgt.worldY+tgt.h/2);
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<wz.radius&&d>1){
          // 흡입 (중심으로 끌어당기기)
          tgt.vx+=dx/d*wz.pullStr;
          tgt.vy+=dy/d*wz.pullStr;
          tgt.slowTimer=Math.max(tgt.slowTimer,wz.slowDur);
          // 파티클
          btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#8ab0e0',3);
        }
      }
    }
    // 범위 내 적 점프 불가 (폭풍 제외, 매 프레임 체크)
    for(const tgt of btl.players){
      if(tgt.charId==='storm'||tgt.hp<=0)continue;
      const dx=wz.x-(tgt.x+tgt.w/2),dy=wz.worldY-(tgt.worldY+tgt.h/2);
      if(Math.sqrt(dx*dx+dy*dy)<wz.radius)tgt.inWhirlwind=true;
    }
    // 회오리장 파티클 (매 프레임)
    if(Math.random()<0.4){
      const a=Math.random()*Math.PI*2,r=Math.random()*wz.radius;
      btl.particles.push({x:wz.x+Math.cos(a)*r,y:wz.worldY+Math.sin(a)*r-btl.camY,
        vx:Math.cos(a+1.5)*2,vy:Math.sin(a+1.5)*2-1,life:0.8,decay:0.06,sz:2+Math.random()*2,col:'rgba(130,170,220,0.7)'});
    }
  }
  btl.whirlwindZones=btl.whirlwindZones.filter(wz=>wz.life>0);

  // 끈적 함정 업데이트
  for(const tr of btl.traps){
    tr.life-=dt;
    // 파티클
    if(Math.random()<0.3){
      const a=Math.random()*Math.PI*2,r=Math.random()*tr.radius;
      btl.particles.push({x:tr.x+Math.cos(a)*r,y:tr.worldY+Math.sin(a)*r-btl.camY,
        vx:0,vy:-0.5,life:0.6,decay:0.05,sz:2,col:'rgba(212,160,96,0.7)'});
    }
    // 밟은 적에게 슬로우
    for(const tgt of btl.players){
      if(tgt===tr.owner||tgt.hp<=0)continue;
      const dx=tr.x-(tgt.x+tgt.w/2),dy=tr.worldY-(tgt.worldY+tgt.h);
      if(Math.abs(dx)<tr.radius&&Math.abs(dy)<18){
        tgt.slowTimer=Math.max(tgt.slowTimer,tr.slowDur);
        // 바닥 부착 효과: 수직속도 제한 + 점프 시 작게
        if(tgt.vy<-4)tgt.vy=-4;
      }
    }
  }
  btl.traps=btl.traps.filter(tr=>tr.life>0);

  // 위성 업데이트 (우주비행사 특수)
  for(const sat of btl.satellites){
    sat.timer-=dt;
    if(sat.timer<=0&&!sat.fired){
      // 레이저 발사 → 광역 폭발
      sat.fired=true;
      SFX.explode&&SFX.explode();
      for(const tgt of btl.players){
        if(tgt===sat.owner||tgt.hp<=0||tgt.invulTimer>0)continue;
        const dx=(tgt.x+tgt.w/2)-sat.x,dy=(tgt.worldY+tgt.h/2)-sat.worldY;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<sat.radius){
          const angle=Math.atan2(dy,dx);
          const falloff=1-d/sat.radius*0.4;
          btlApplyHit(tgt,angle,sat.kb*falloff,sat.stun);
        }
      }
      // 폭발 파티클
      for(let k=0;k<40;k++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8;
        btl.particles.push({x:sat.x,y:sat.worldY-btl.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.03,sz:3+Math.random()*4,col:k%2?'#ff4444':'#ffdd44'});}
    }
  }
  btl.satellites=btl.satellites.filter(s=>!s.fired||s.timer>-15);

  // 일루미나티 분신 업데이트
  btlUpdateClones(dt);

  // 인절미 grab arm 업데이트
  for(const p of btl.players){
    if(!p.grabArm)continue;
    const arm=p.grabArm;
    // 가장 가까운 적 탐색
    let tgt=null,nearD=Infinity;
    for(const op of btl.players){
      if(op===p||op.hp<=0)continue;
      const dx=op.x+op.w/2-arm.x,dy=op.worldY+op.h/2-arm.y;
      const d=dx*dx+dy*dy;
      if(d<nearD){nearD=d;tgt=op;}
    }
    if(!tgt){p.grabArm=null;continue;}
    if(!arm.returning&&!arm.hit){
      arm.x+=arm.vx*dt;arm.y+=arm.vy*dt;
      arm.dist+=Math.sqrt(arm.vx*arm.vx+arm.vy*arm.vy)*dt;
      if(tgt.stunTimer<=0&&Math.abs(arm.x-(tgt.x+tgt.w/2))<20&&Math.abs(arm.y-(tgt.worldY+tgt.h/2))<22){
        arm.hit=true;arm.target=tgt;SFX.grabHit();
      }
      if(arm.dist>=arm.maxDist)arm.returning=true;
    }else if(arm.hit&&arm.target){
      // 잡은 적을 인절미에게 끌어옴 (나가는 속도와 동일: grabSpeed)
      const px=p.x+p.w/2,py=p.worldY+p.h/2;
      const dx=px-arm.target.x-arm.target.w/2,dy=py-arm.target.worldY-arm.target.h/2;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<20){
        btlApplyHit(arm.target,0,0,p.bs.stun);
        btlSpawnPt(arm.target.x+arm.target.w/2,arm.target.worldY+arm.target.h/2-btl.camY,'#d4c4a0',15);
        p.grabArm=null;continue;
      }
      const pull=p.bs.grabSpeed;
      arm.target.x+=dx/d*pull*dt;arm.target.worldY+=dy/d*pull*dt;
      arm.target.vx=0;arm.target.vy=0;
      arm.x=arm.target.x+arm.target.w/2;arm.y=arm.target.worldY+arm.target.h/2;
    }else if(arm.returning){
      const px=p.x+p.w/2,py=p.worldY+p.h/2;
      const dx=px-arm.x,dy=py-arm.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<15){p.grabArm=null;continue;}
      arm.x+=dx/d*p.bs.grabSpeed*dt;arm.y+=dy/d*p.bs.grabSpeed*dt;
    }
  }
}

function btlExplode(pr){SFX.explode();
  const cx=pr.x,cy=pr.y;
  for(const p of btl.players){
    if(p===pr.owner||p.hp<=0)continue;
    const dx=p.x+p.w/2-cx,dy=p.worldY+p.h/2-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<pr.radius){
      const angle=Math.atan2(dy,dx);
      btlApplyHit(p,angle,pr.kb*(1-d/pr.radius*0.5),pr.stun);
    }
  }
  const sy=cy-btl.camY;
  for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*6;
    btl.particles.push({x:cx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04+Math.random()*0.03,sz:4+Math.random()*4,col:i%2?'#ff6633':'#ffe066'});}
}

function btlDetonateZombie(p){SFX.explode();
  const bs=p.bs;
  const cx=p.x+p.w/2,cy=p.worldY+p.h/2;
  const detKb=bs.detonateKb||40,detStun=bs.detonateStun||120;
  // 광역 넉백+기절
  for(const tgt of btl.players){
    if(tgt===p||tgt.hp<=0)continue;
    if(tgt.invulTimer>0)continue;
    const dx=(tgt.x+tgt.w/2)-cx,dy=(tgt.worldY+tgt.h/2)-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<bs.blastRadius){
      const angle=Math.atan2(dy,dx);
      const falloff=1-d/bs.blastRadius*0.3;
      btlApplyHit(tgt,angle,detKb*falloff,detStun);
    }
  }
  // 대형 폭발 파티클
  const sy=cy-btl.camY;
  for(let i=0;i<50;i++){
    const a=Math.random()*Math.PI*2,s=4+Math.random()*9;
    const col=i%3===0?'#ff3333':(i%3===1?'#ffaa22':'#6a8a5a');
    btl.particles.push({x:cx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.02+Math.random()*0.025,sz:4+Math.random()*5,col});
  }
  btl.hitStop=8;
  // 본인 HP -1 → 죽음 → 부활 (hp 남아있으면)
  if(p.hp>0)p.hp--;
  if(p.hp>0){btlRespawn(p);}
}

function btlCheckFall(p){
  if(p.hp<=0)return;
  if(btl.ship&&btl.ship.boarded===p)return;
  if(btl.testMode){
    if(p.worldY>50){btlRespawn(p);return;}
    return;
  }
  if(p.worldY-btl.camY>H+50){
    p.hp--;SFX.fallKO();
    btlSpawnPt(p.x+p.w/2,H-20,p.color,15);
    if(p.hp>0)btlRespawn(p);
  }
}

function btlRespawn(p){
  const vis=btl.platforms.filter(pl=>pl.worldY-btl.camY>30&&pl.worldY-btl.camY<H*0.35);
  if(vis.length>0){const pl=vis[Math.floor(Math.random()*vis.length)];p.x=pl.x+pl.w/2-p.w/2;p.worldY=pl.worldY-p.h-10;}
  else{p.x=W/2-p.w/2;p.worldY=btl.camY+60;}
  p.vx=0;p.vy=0;p.jumps=p.maxJumps;p.crouching=false;p.crouchTimer=0;p.flying=false;p.flyTimer=0;p.spinAngle=0;p.stunTimer=0;p.knocked=false;p.slowTimer=0;p.floatTimer=0;p.grabArm=null;p.attacking=false;
  // 특수능력 상태 리셋
  p.buffTimer=0;p.dodgeTimer=0;p.dashTimer=0;p.invulTimer=0;p.warmupTimer=0;p.bindTimer=0;p.confuseTimer=0;
  p.charging=false;p.chargeTimer=0;p._teleportUsed=false;p._spHeld=false;
  // 해골 머리 복구
  if(p.thrownHead){
    const idx=btl.projectiles.indexOf(p.thrownHead);
    if(idx>=0)btl.projectiles.splice(idx,1);
    p.thrownHead=null;
  }
  p.headless=false;
  btlSpawnPt(p.x+p.w/2,p.worldY-btl.camY+p.h/2,p.color,15);
}

function btlSpawnPt(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    btl.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.04+Math.random()*0.04,sz:2+Math.random()*3,col});}
}

function btlRender(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a2e');g.addColorStop(1,'#1a1a40');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of btl.stars){ctx.globalAlpha=0.4+0.4*Math.sin(s.tw);ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz);}
  ctx.globalAlpha=1;
  for(const pl of btl.platforms){
    const sy=pl.worldY-btl.camY;
    if(sy>H+20||sy<-30)continue;
    drawPlatform(pl.x,sy,pl.w,pl.h,pl.type);
  }
  for(const pt of btl.particles){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz);}
  ctx.globalAlpha=1;
  // 투사체 렌더
  for(const pr of btl.projectiles){
    if(pr.type==='bomb'){
      const sy=pr.y-btl.camY;
      if(pr.landed){
        const blink=Math.floor(pr.fuse/8)%2;
        ctx.fillStyle=blink?'#ff4':'#a60';ctx.beginPath();ctx.arc(pr.x,sy,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
        ctx.fillText(Math.ceil(pr.fuse/60)+'',pr.x,sy-10);ctx.textAlign='left';
      }else{
        ctx.fillStyle='#8a6020';ctx.beginPath();ctx.arc(pr.x,sy,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#c09030';ctx.beginPath();ctx.arc(pr.x,sy-2,3,0,Math.PI*2);ctx.fill();
      }
    }else if(pr.type==='shard'){
      const sy=pr.y-btl.camY;
      ctx.fillStyle='#aaddff';
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(Math.atan2(pr.vy,pr.vx));
      ctx.fillRect(-6,-3,12,6);ctx.fillStyle='#e0f0ff';ctx.fillRect(-4,-2,4,4);
      ctx.restore();
    }else if(pr.type==='laser'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(Math.atan2(pr.vy,pr.vx));
      ctx.fillStyle='#ff2222';ctx.fillRect(-10,-2,20,4);
      ctx.fillStyle='#ff6666';ctx.fillRect(-8,-1,16,2);
      ctx.fillStyle='rgba(255,100,100,0.3)';ctx.fillRect(-14,-4,28,8);
      ctx.restore();
    }else if(pr.type==='bone'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(Math.atan2(pr.vy,pr.vx)+pr.dist*0.05);
      ctx.fillStyle='#f0f0f0';ctx.fillRect(-7,-3,14,6);
      ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(-7,0,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(7,0,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(pr.type==='eye_beam'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(Math.atan2(pr.vy,pr.vx));
      // 외곽 글로우
      ctx.fillStyle='rgba(255,215,0,0.2)';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
      // 삼각형 투사체
      ctx.fillStyle='#FFD700';
      ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-5,-5);ctx.lineTo(-5,5);ctx.closePath();ctx.fill();
      // 눈 (중심)
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(1,0,1.5,0,Math.PI*2);ctx.fill();
      // 빛 꼬리
      ctx.fillStyle='rgba(255,215,0,0.4)';ctx.fillRect(-16,-2,12,4);
      ctx.fillStyle='rgba(255,215,0,0.2)';ctx.fillRect(-26,-1,12,2);
      ctx.restore();
    }else if(pr.type==='whirlwind'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);
      const spin=btl.time*0.5;
      // 외곽 글로우
      ctx.fillStyle='rgba(130,170,220,0.2)';ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
      // 미니 회오리
      ctx.strokeStyle='rgba(160,200,240,0.7)';ctx.lineWidth=2;
      ctx.beginPath();
      for(let t=0;t<Math.PI*2;t+=0.2){
        const r=3+t*1.5;const a=t+spin*3;
        const px=Math.cos(a)*r*0.6,py=Math.sin(a)*r*0.4;
        if(t===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // 중심
      ctx.fillStyle='#a0c8f0';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(pr.type==='big_ice'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(pr.dist*0.03);
      // 외곽 글로우
      ctx.fillStyle='rgba(170,220,255,0.3)';ctx.beginPath();ctx.arc(0,0,pr.radius+4,0,Math.PI*2);ctx.fill();
      // 얼음 본체 (다각형)
      ctx.fillStyle='#bfe4ff';
      ctx.beginPath();
      for(let k=0;k<6;k++){const a=k/6*Math.PI*2;ctx.lineTo(Math.cos(a)*pr.radius,Math.sin(a)*pr.radius);}
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      // 하이라이트
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath();ctx.arc(-pr.radius*0.3,-pr.radius*0.3,pr.radius*0.25,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(pr.type==='mochi'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(pr.dist*0.04);
      // 외곽 글로우 (분홍)
      ctx.fillStyle='rgba(248,192,208,0.35)';
      ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
      // 떡 본체 (둥글고 탱글)
      ctx.fillStyle='#fff0e8';
      ctx.beginPath();ctx.ellipse(0,0,10,9,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#e8a8b8';ctx.lineWidth=1.5;ctx.stroke();
      // 하이라이트
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath();ctx.arc(-3,-3,3,0,Math.PI*2);ctx.fill();
      // 콩가루 점 몇 개
      ctx.fillStyle='#d8a060';
      ctx.fillRect(-5,2,1,1);ctx.fillRect(3,-1,1,1);ctx.fillRect(1,4,1,1);
      ctx.restore();
    }else if(pr.type==='head'){
      const sy=pr.y-btl.camY;
      ctx.save();ctx.translate(pr.x,sy);
      if(!pr.landed)ctx.rotate(pr.dist*0.08);
      // 머리 (해골)
      ctx.fillStyle='#f0f0f0';
      ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();
      // 눈구멍
      ctx.fillStyle='#222';
      ctx.fillRect(-5,-3,3,3);ctx.fillRect(2,-3,3,3);
      // 이빨
      ctx.fillRect(-3,3,6,2);
      ctx.fillStyle='#000';ctx.fillRect(-2,3,1,2);ctx.fillRect(1,3,1,2);
      ctx.restore();
      // 깜빡임 (수명 얼마 남지 않았을 때)
      if(pr.life<60&&Math.floor(pr.life/8)%2===0){
        ctx.fillStyle='rgba(255,100,100,0.3)';ctx.beginPath();ctx.arc(pr.x,sy,12,0,Math.PI*2);ctx.fill();
      }
    }else if(pr.type==='soul'){
      const sy=pr.y-btl.camY;
      ctx.save();
      // 뒷꼬리 (궤적)
      for(let k=3;k>=1;k--){
        ctx.globalAlpha=0.15*k;
        ctx.fillStyle='#cc66ff';
        ctx.beginPath();ctx.arc(pr.x-pr.vx*k*0.6,sy-pr.vy*k*0.6,6-k,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=0.55+Math.sin(btl.time*0.3)*0.2;
      // 외곽 글로우
      ctx.fillStyle='rgba(200,150,255,0.5)';
      ctx.beginPath();ctx.arc(pr.x,sy,13,0,Math.PI*2);ctx.fill();
      // 영혼 본체 (흰-보라 얼룩)
      ctx.fillStyle='#f0e8ff';
      ctx.beginPath();ctx.arc(pr.x,sy,7,0,Math.PI*2);ctx.fill();
      // 눈 (노란 삼각형 느낌)
      ctx.globalAlpha=1;
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(pr.x-2,sy-1,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(pr.x+2,sy-1,1.5,0,Math.PI*2);ctx.fill();
      // 아래 꼬리 흐물
      ctx.fillStyle='rgba(200,150,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(pr.x-4,sy+3);
      ctx.quadraticCurveTo(pr.x,sy+9+Math.sin(btl.time*0.2)*2,pr.x+4,sy+3);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }
  // 끈적 함정 렌더
  for(const tr of btl.traps){
    const sy=tr.worldY-btl.camY;
    if(sy<-30||sy>H+30)continue;
    const alpha=Math.min(1,tr.life/30)*0.7;
    ctx.save();ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(212,160,96,0.5)';
    ctx.beginPath();ctx.ellipse(tr.x,sy,tr.radius,8,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a07040';ctx.lineWidth=2;ctx.stroke();
    // 물방울 방울방울
    for(let k=0;k<3;k++){
      const a=btl.time*0.05+k*2;
      const px=tr.x+Math.cos(a)*tr.radius*0.5;
      ctx.fillStyle='#d4a060';ctx.beginPath();ctx.arc(px,sy-2,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  // 위성 렌더 (레이저 조준 마커 + 발사 순간)
  for(const sat of btl.satellites){
    const sy=sat.worldY-btl.camY;
    if(sat.fired){
      // 발사 이펙트 (짧게)
      const ft=Math.max(0,15+sat.timer)/15;
      ctx.save();ctx.globalAlpha=ft;
      ctx.strokeStyle='#ff4444';ctx.lineWidth=8;
      ctx.beginPath();ctx.moveTo(sat.x,-20);ctx.lineTo(sat.x,sy);ctx.stroke();
      ctx.fillStyle='rgba(255,220,100,0.5)';
      ctx.beginPath();ctx.arc(sat.x,sy,sat.radius*ft,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else{
      // 조준 마커 (카운트다운)
      const prog=1-sat.timer/sat.maxTimer;
      ctx.save();
      // 원형 조준
      ctx.strokeStyle='#ff4444';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sat.x,sy,sat.radius,0,Math.PI*2);ctx.stroke();
      // 진행도
      ctx.strokeStyle='#ffdd44';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(sat.x,sy,sat.radius,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
      // 중심 십자
      ctx.strokeStyle='#ff4444';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sat.x-10,sy);ctx.lineTo(sat.x+10,sy);
      ctx.moveTo(sat.x,sy-10);ctx.lineTo(sat.x,sy+10);ctx.stroke();
      // 위에서 내려오는 점선
      ctx.strokeStyle='rgba(255,68,68,0.3)';ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(sat.x,-20);ctx.lineTo(sat.x,sy-sat.radius);ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }
  // 회오리장 렌더
  for(const wz of btl.whirlwindZones){
    const sy=wz.worldY-btl.camY;
    if(sy<-wz.radius||sy>H+wz.radius)continue;
    const alpha=Math.min(1,wz.life/20)*0.4;
    const spin=btl.time*0.3;
    // 외곽 원
    ctx.save();ctx.globalAlpha=alpha;
    ctx.strokeStyle='rgba(130,170,220,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(wz.x,sy,wz.radius,0,Math.PI*2);ctx.stroke();
    // 내부 소용돌이 줄무늬
    ctx.strokeStyle='rgba(160,200,240,0.4)';ctx.lineWidth=1.5;
    for(let arm=0;arm<3;arm++){
      ctx.beginPath();
      for(let t=0;t<Math.PI*2.5;t+=0.15){
        const r=5+t/(Math.PI*2.5)*wz.radius*0.85;
        const a=t+spin*2+arm*Math.PI*2/3;
        const px=wz.x+Math.cos(a)*r,py=sy+Math.sin(a)*r*0.7;
        if(t===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    // 중심 글로우
    ctx.fillStyle='rgba(130,180,230,'+alpha*0.8+')';
    ctx.beginPath();ctx.arc(wz.x,sy,8,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  // 우주선 렌더
  if(btl.ship){
    const s=btl.ship;
    const sx=s.x,sy=s.worldY-btl.camY;
    if(sy>-200&&sy<H+200){
      // 황금 발판 위치 하이라이트
      ctx.fillStyle='rgba(255,230,100,0.15)';ctx.fillRect(s.x-75,s.padY-btl.camY-5,150,5);
      // 로켓 본체
      ctx.fillStyle='#ccc';ctx.fillRect(sx-25,sy+20,50,70);
      // 로켓 머리 (삼각형)
      ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-25,sy+25);ctx.lineTo(sx+25,sy+25);ctx.closePath();ctx.fill();
      // 날개
      ctx.fillStyle='#ff4444';
      ctx.beginPath();ctx.moveTo(sx-25,sy+70);ctx.lineTo(sx-40,sy+95);ctx.lineTo(sx-25,sy+90);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(sx+25,sy+70);ctx.lineTo(sx+40,sy+95);ctx.lineTo(sx+25,sy+90);ctx.closePath();ctx.fill();
      // 창문
      ctx.fillStyle='#113';ctx.beginPath();ctx.arc(sx,sy+40,14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#225';ctx.beginPath();ctx.arc(sx,sy+40,12,0,Math.PI*2);ctx.fill();
      // 탑승자 캐릭터 (창문 안)
      const boardedP=typeof s.boarded==='number'?btl.players[s.boarded]:s.boarded;
      if(boardedP){
        ctx.save();ctx.beginPath();ctx.arc(sx,sy+40,11,0,Math.PI*2);ctx.clip();
        const sg2=game,sc2=selectedChar,ss2=selectedSkin;
        game={p:{crouching:false,crouchTimer:0,flying:false,spinAngle:0,onGround:true},char:boardedP.charDef};
        selectedChar=boardedP.charId;selectedSkin=boardedP.skin||'default';
        boardedP.charDef.draw(ctx,sx-11,sy+24,1,0,1000,true,0);
        game=sg2;selectedChar=sc2;selectedSkin=ss2;
        ctx.restore();
        // 카운트다운 표시
        if(s.phase==='boarded'){
          const sec=Math.ceil((300-s.boardTimer)/60);
          ctx.fillStyle='#ffe066';ctx.font='bold 16px "Press Start 2P",monospace';ctx.textAlign='center';
          ctx.fillText(sec>0?sec+'초':'GO!',sx,sy-10);ctx.textAlign='left';
        }
      }else{
        // 빈 창문 하이라이트
        ctx.fillStyle='rgba(100,200,255,0.2)';ctx.beginPath();ctx.arc(sx-3,sy+37,5,0,Math.PI*2);ctx.fill();
      }
      // 발사 중 화염
      if(s.launching){
        for(let i=0;i<3;i++){
          const fx=sx-12+Math.random()*24,fy=sy+90+Math.random()*15;
          ctx.fillStyle=Math.random()>0.5?'#ff6633':'#ffe066';
          ctx.fillRect(fx,fy,6+Math.random()*6,8+Math.random()*10);
        }
      }
    }
  }
  for(const p of btl.players)btlDrawPlayer(p);
  // 일루미나티 분신 렌더
  if(btl.clones&&btl.clones.length){
    const myIdx=btl.online?onlinePlayerIdx:0;
    const myP=btl.players[myIdx];
    for(const cl of btl.clones){
      const sy=cl.worldY-btl.camY,sx=cl.x;
      if(sy<-60||sy>H+60)continue;
      // 실명 가림 (본체 로직과 일치)
      if(btl.online){
        if(myP&&myP.blindTimer>0&&cl.owner!==myP)continue;
      }else{
        const blindedPlayer=btl.players.find(pl=>pl.blindTimer>0&&pl.hp>0);
        if(blindedPlayer&&cl.owner!==blindedPlayer)continue;
      }
      // 본체 로컬 사용자에게만 회색 틴트
      const isMine=myP&&cl.owner===myP;
      ctx.save();
      if(isMine){ctx.filter='grayscale(100%) brightness(0.75)';}
      // charDef.draw는 전역 game/selectedChar 변수 요구 — 임시 대체
      const sg=game,sc=selectedChar,ss=selectedSkin;
      game={p:{crouching:false,crouchTimer:0,flying:false,spinAngle:0,onGround:cl.onGround},char:cl.charDef};
      selectedChar=cl.charId;selectedSkin=cl.skin||'default';
      cl.charDef.draw(ctx,sx,sy,cl.facing,0,1000,cl.onGround,cl.vy);
      game=sg;selectedChar=sc;selectedSkin=ss;
      ctx.restore();
      // 분신 공격 이펙트 (본체 eye_beam과 연동)
      if(cl.attacking){
        const cx=sx+cl.w/2,cy=sy+cl.h/2;
        const prog=cl.attackTimer/12;
        const ext=Math.sin(prog*Math.PI)*70;
        const fx=cx+Math.cos(cl.attackAngle)*ext;
        const fy=cy+Math.sin(cl.attackAngle)*ext;
        ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx,fy);ctx.stroke();
        ctx.fillStyle='#fff8c0';ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill();
      }
      // 자기 분신 식별 표시 (작은 금빛 점, 본인에게만)
      if(isMine){
        ctx.fillStyle='#ffd700';ctx.globalAlpha=0.8;
        ctx.beginPath();ctx.arc(sx+cl.w/2,sy-6,2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
    }
  }
  // 실명 오버레이 효과
  const blindedP=btl.online?btl.players[onlinePlayerIdx]:btl.players.find(pl=>pl.blindTimer>0&&pl.hp>0);
  if(blindedP&&blindedP.blindTimer>0){
    const ba=Math.min(1,blindedP.blindTimer/30);
    ctx.fillStyle=`rgba(255,215,0,${0.08*ba})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(255,215,0,${0.6*ba})`;ctx.font='bold 14px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('👁 실명!',W/2,H/2-40);ctx.textAlign='left';
  }
  btlDrawHP();
  // 높이 표시
  if(!btl.testMode){
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px "Press Start 2P",monospace';
    ctx.fillText(Math.floor(btl.height).toLocaleString()+'m',14,H-28);
  }
  // 우주선 카운트다운/착륙 안내
  if(btl.ship){
    const s=btl.ship;
    if(s.phase==='countdown'){
      const sec=Math.ceil((300-s.countdownTimer)/60);
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W/2-180,H/2-28,360,56);
      ctx.fillStyle='#ffe066';ctx.font='bold 16px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('🚀 우주선 도착까지 '+sec+'초',W/2,H/2+6);ctx.textAlign='left';
    }else if(s.phase==='descending'){
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W/2-130,20,260,36);
      ctx.fillStyle='#adf';ctx.font='12px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('🚀 우주선 착륙 중...',W/2,42);ctx.textAlign='left';
    }else if(s.phase==='ready'){
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W/2-160,20,320,36);
      ctx.fillStyle='#8f8';ctx.font='12px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('✅ 탑승하세요!',W/2,42);ctx.textAlign='left';
    }
  }
  if(btl.state==='countdown'){
    const sec=Math.ceil(btl.countdown/60);
    if(btl._lastCntSec===undefined)btl._lastCntSec=-1;
    if(sec!==btl._lastCntSec){btl._lastCntSec=sec;SFX.countdownTick(sec);}
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffe066';ctx.font='bold 60px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText(sec>0?String(sec):'GO!',W/2,H/2+15);ctx.textAlign='left';
  }else{btl._lastCntSec=-1;}
  if(btl.state==='ended'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    const winPlayer=btl.players?btl.players.find(p=>p.label===btl.winner):null;
    const wc=winPlayer?winPlayer.color:'#ffe066';
    ctx.fillStyle=wc;ctx.font='bold 36px "Press Start 2P",monospace';
    ctx.fillText(btl.winner==='DRAW'?'DRAW!':btl.winner+' WIN!',W/2,H/2-40);
    if(btl._discMsg){ctx.fillStyle='#f88';ctx.font='12px "Press Start 2P",monospace';ctx.fillText(btl._discMsg,W/2,H/2+110);}
    ctx.textAlign='left';
    // HTML 오버레이 버튼 표시 (한 번만)
    if(!btl._endUIShown){
      btl._endUIShown=true;
      setTimeout(()=>{showBtlEndUI();},700);
    }
  }
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='9px "Press Start 2P",monospace';
  if(btl.testMode){ctx.fillText('🧪 TEST MODE',10,H-8);}
  else{ctx.fillText('SPD '+btl.scrollSpeed.toFixed(1),W-90,H-8);}

}

function btlDrawPlayer(p){
  if(p.hp<=0)return;
  if(btl.ship&&btl.ship.boarded===p)return;
  // 실명 효과: 실명 걸린 사람 화면에서만 다른 캐릭터 안 보임
  if(btl.online){
    // 온라인: 내가 실명이면 내 화면에서 나 빼고 전부 숨김
    const me=btl.players[onlinePlayerIdx];
    if(me&&me.blindTimer>0&&p!==me)return;
  }else{
    // 로컬: 실명 걸린 플레이어만 보이고 나머지 숨김
    const blindedPlayer=btl.players.find(pl=>pl.blindTimer>0&&pl.hp>0);
    if(blindedPlayer&&p!==blindedPlayer)return;
  }
  const sy=Math.round(p.worldY-btl.camY),sx=Math.round(p.x);
  if(sy>H+50||sy<-60)return;
  // 좀비 자폭 차지 아우라 (캐릭터 아래에 깔림)
  if(p.charging){
    const cax=sx+p.w/2,cay=sy+p.h/2;
    const min=p.bs.chargeMin||300,max=p.bs.chargeMax||600;
    if(p.chargeTimer>=min){
      const prog=Math.min(1,(p.chargeTimer-min)/(max-min));
      const pulse=Math.sin(p.chargeTimer*0.35)*0.25+0.75;
      const rad=(28+prog*20)*pulse;
      ctx.globalAlpha=0.4+prog*0.3;
      ctx.fillStyle='#ff1a1a';
      ctx.beginPath();ctx.arc(cax,cay,rad,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.9;
      ctx.strokeStyle='#ff5555';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(cax,cay,rad,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#ffdd44';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cax,cay,rad+3,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    }else{
      const pulse=Math.sin(p.chargeTimer*0.2)*0.3+0.6;
      ctx.globalAlpha=0.22*pulse;
      ctx.fillStyle='#7aaa5a';
      ctx.beginPath();ctx.arc(cax,cay,22,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  // 특수능력 아우라 (캐릭터 아래)
  const cax=sx+p.w/2,cay=sy+p.h/2;
  // 토끼 신체강화 아우라 (강력한 붉은 기운 — 다중 링 + 불꽃 파티클)
  if(p.buffTimer>0){
    const pulse=Math.sin(btl.time*0.3)*0.15+0.85;
    // 외곽 큰 원 (불타오르는 느낌)
    ctx.globalAlpha=0.3*pulse;
    ctx.fillStyle='#ff0000';
    ctx.beginPath();ctx.arc(cax,cay,34*pulse,0,Math.PI*2);ctx.fill();
    // 중간 원
    ctx.globalAlpha=0.45*pulse;
    ctx.fillStyle='#ff4422';
    ctx.beginPath();ctx.arc(cax,cay,26,0,Math.PI*2);ctx.fill();
    // 내부 핵심
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#ffaa44';
    ctx.beginPath();ctx.arc(cax,cay,18*pulse,0,Math.PI*2);ctx.fill();
    // 테두리 링
    ctx.globalAlpha=0.9;
    ctx.strokeStyle='#ff2222';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cax,cay,30*pulse,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    // 주변에 솟구치는 불꽃 파티클 (매 프레임 확률적으로)
    if(Math.random()<0.6){
      const a=Math.random()*Math.PI*2;
      btl.particles.push({x:cax+Math.cos(a)*18,y:cay+Math.sin(a)*18,
        vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5-2,life:0.7,decay:0.05,sz:2+Math.random()*3,col:Math.random()<0.5?'#ff3322':'#ffaa44'});
    }
  }
  // 단백질 준비운동 아우라 (황금 원)
  if(p.warmupTimer>0){
    const prog=1-p.warmupTimer/(p.bs.warmupDuration||300);
    ctx.globalAlpha=0.6;
    ctx.strokeStyle='#ffe066';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cax,cay,26,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.25;
    ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(cax,cay,22,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 땀방울
    if(Math.random()<0.3)btl.particles.push({x:cax+(Math.random()-0.5)*16,y:sy,vx:0,vy:1,life:0.6,decay:0.05,sz:2,col:'#aaccff'});
  }
  // 무적 시각효과 (구르기/파도타기 등)
  if(p.invulTimer>0&&p.warmupTimer<=0){
    ctx.globalAlpha=0.5+0.3*Math.sin(btl.time*0.8);
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cax,cay,p.w,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // mock game.p for character draw functions
  const sg=game,sc=selectedChar,ss=selectedSkin;
  game={p:{crouching:p.crouching,crouchTimer:p.crouchTimer,flying:p.flying,spinAngle:p.spinAngle,onGround:p.onGround},char:p.charDef};
  selectedChar=p.charId;selectedSkin=p.skin||'default';
  p.charDef.draw(ctx,sx,sy,p.facing,p.frame,1000,p.onGround,p.vy);
  game=sg;selectedChar=sc;selectedSkin=ss;
  // 해골 머리없음: 두개골 영역을 배경색으로 덮어 숨기고 목/피 표시
  if(p.headless&&p.charId==='skeleton'){
    // 두개골 영역을 게임 배경 그라데이션으로 덮음
    const gbg=ctx.createLinearGradient(0,0,0,H);
    gbg.addColorStop(0,'#0a0a2e');gbg.addColorStop(1,'#1a1a40');
    ctx.fillStyle=gbg;
    ctx.fillRect(sx+3,sy-2,p.w-5,12); // 머리 자리 지우기 (draw에서 sy~sy+10)
    // 목에서 흘러나오는 빨간 피
    ctx.fillStyle='#a01520';
    ctx.fillRect(sx+7,sy+7,8,4);
    ctx.fillStyle='#d82030';
    ctx.fillRect(sx+8,sy+8,6,2);
    // 흘러내리는 작은 핏방울
    if(Math.random()<0.3)btl.particles.push({x:sx+8+Math.random()*6,y:sy+8,vx:0,vy:1.5,life:0.5,decay:0.06,sz:2,col:'#c81830'});
  }
  // 좀비 할퀴기 시각효과 (양손 동시 스윙)
  if(p.attacking&&p.bs.atkType==='claw'){
    const prog=p.attackTimer/14;
    const ext=Math.sin((1-prog)*Math.PI)*(p.bs.clawRange||48);
    const cx=sx+p.w/2,cy=sy+p.h/2;
    ctx.save();
    for(const side of [-1,1]){
      const fx=cx+side*ext,fy=cy;
      ctx.strokeStyle='#aaff66';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx,fy);ctx.stroke();
      // 발톱
      ctx.fillStyle='#ccffcc';
      for(let k=-1;k<=1;k++){
        const cx2=fx+side*4,cy2=fy+k*6;
        ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+side*6,cy2-2);ctx.lineTo(cx2+side*6,cy2+2);ctx.closePath();ctx.fill();
      }
    }
    ctx.restore();
  }
  // 공격 시각효과 (캐릭터별) — claw는 별도 렌더링
  if(p.attacking&&p.bs.atkType!=='claw'){
    const prog=p.attackTimer/(p.bs.atkType==='rapidPunch'?8:p.bs.atkType==='comboPunch'?10:12);
    const ext=Math.sin(prog*Math.PI)*90;
    const cx=sx+p.w/2,cy=sy+p.h/2;
    const fx=cx+Math.cos(p.attackAngle)*ext;
    const fy=cy+Math.sin(p.attackAngle)*ext;
    ctx.strokeStyle=p.color;ctx.lineWidth=p.bs.atkType==='rapidPunch'?2:4;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx,fy);ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fx,fy,p.bs.atkType==='rapidPunch'?4:6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(fx,fy,p.bs.atkType==='rapidPunch'?4:6,0,Math.PI*2);ctx.stroke();
    if(p.bs.atkType==='comboPunch'&&p.comboCount>0){
      ctx.fillStyle='#ffe066';ctx.font='bold 8px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('x'+p.comboCount,sx+p.w/2,sy-14);ctx.textAlign='left';
    }
  }
  // 인절미 grab arm 시각효과
  if(p.grabArm){
    const arm=p.grabArm;
    const ax=arm.x,ay=arm.y-btl.camY;
    const pcx=sx+p.w/2,pcy=sy+p.h/2;
    ctx.strokeStyle='#d4c4a0';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(pcx,pcy);ctx.lineTo(ax,ay);ctx.stroke();
    ctx.fillStyle=arm.hit?'#ff6':'#f5e8d5';ctx.beginPath();ctx.arc(ax,ay,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a07820';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ax,ay,8,0,Math.PI*2);ctx.stroke();
  }
  // 슬로우 인디케이터
  if(p.slowTimer>0){
    ctx.fillStyle='rgba(150,210,255,0.4)';ctx.fillRect(sx-2,sy-2,p.w+4,p.h+4);
    ctx.fillStyle='#aaddff';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText('❄',sx+p.w/2,sy+p.h+10);ctx.textAlign='left';
  }
  ctx.fillStyle=p.color;ctx.font='bold 9px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(p.label,sx+p.w/2,sy-5);ctx.textAlign='left';
  // 토끼 신체강화 텍스트
  if(p.buffTimer>0){
    const pulse=Math.sin(btl.time*0.5)*0.3+0.7;
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffdd22';ctx.font='bold 9px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('⚡POWER⚡',sx+p.w/2,sy-18);ctx.textAlign='left';
    ctx.globalAlpha=1;
  }
  // 혼란 시각효과 (보라 회오리 링)
  if(p.confuseTimer>0){
    ctx.save();
    ctx.globalAlpha=0.6;
    ctx.strokeStyle='#cc66ff';ctx.lineWidth=2;
    const spin=btl.time*0.2;
    for(let k=0;k<3;k++){
      const a=spin+k*Math.PI*2/3;
      ctx.beginPath();
      ctx.arc(sx+p.w/2+Math.cos(a)*12,sy-5+Math.sin(a)*3,4,0,Math.PI*2);ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#cc66ff';ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('?!',sx+p.w/2,sy-12);ctx.textAlign='left';
    ctx.restore();
  }
  // 속박 시각효과 (분홍 쇠사슬 느낌 + 떡 텍스처)
  if(p.bindTimer>0){
    ctx.globalAlpha=0.7;
    ctx.fillStyle='rgba(248,160,192,0.5)';ctx.fillRect(sx-2,sy-2,p.w+4,p.h+4);
    ctx.strokeStyle='#e060a0';ctx.lineWidth=2;
    ctx.setLineDash([3,3]);
    ctx.strokeRect(sx-2,sy-2,p.w+4,p.h+4);
    ctx.setLineDash([]);
    ctx.globalAlpha=1;
    // "속박" 텍스트
    ctx.fillStyle='#ff80c0';ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('BIND',sx+p.w/2,sy+p.h+10);ctx.textAlign='left';
  }
  // 기절 이펙트 (별 회전)
  if(p.stunTimer>0){
    const ang=btl.time*0.15;
    ctx.fillStyle='#ffe066';ctx.font='10px monospace';ctx.textAlign='center';
    for(let i=0;i<3;i++){
      const a=ang+i*Math.PI*2/3;
      ctx.fillText('★',sx+p.w/2+Math.cos(a)*14,sy-2+Math.sin(a)*6);
    }
    ctx.textAlign='left';
  }
  // 물고기 물기둥 렌더링
  if(p.streamTimer>0&&p.charId==='fish'){
    const cx=sx+p.w/2,cy=sy+p.h/2;
    const range=p.bs.streamRange||190;
    const cosA=Math.cos(p.streamAngle),sinA=Math.sin(p.streamAngle);
    const ex=cx+cosA*range,ey=cy+sinA*range;
    // 외곽 글로우
    ctx.save();
    ctx.strokeStyle='rgba(100,180,255,0.25)';ctx.lineWidth=16;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);ctx.stroke();
    // 메인 빔
    ctx.strokeStyle='rgba(68,136,255,0.6)';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);ctx.stroke();
    // 중심 하이라이트
    ctx.strokeStyle='rgba(180,220,255,0.7)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);ctx.stroke();
    // 물방울 파티클 (빔 끝)
    const t=btl.time*0.3;
    for(let i=0;i<4;i++){
      const a=t+i*Math.PI/2;
      const px=ex+Math.cos(a)*8,py=ey+Math.sin(a)*8;
      ctx.fillStyle='rgba(100,200,255,0.5)';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function btlDrawHP(){
  ctx.font='bold 20px "Press Start 2P",monospace';
  // P1 (좌측), P2 (우측) 상단 행
  const p1=btl.players[0],p2=btl.players[1];
  ctx.fillStyle=p1.color;ctx.textAlign='left';ctx.fillText(p1.label,10,32);
  for(let i=0;i<p1.maxHp;i++){ctx.fillStyle=i<p1.hp?'#ff3333':'#333';ctx.fillText('♥',56+i*26,32);}
  // P1 특수 쿨다운 표시 (내 화면 — 온라인 게스트는 players[onlinePlayerIdx])
  const myIdx=btl.online?onlinePlayerIdx:0;
  const me=btl.players[myIdx];
  if(me&&me.bs.specialType&&me.bs.specialType!=='none'){
    const bx=10,by=44,bw=160,bh=10;
    let prog=1,ready=true,msg='특수: 우클릭 준비!',barCol='#ffe066',strokeCol='#ffaa00';
    if(me.charId==='skeleton'&&me.thrownHead){
      // 해골: 머리 떠있는 동안은 "순간이동 가능" (쿨 무시)
      ready=!me._teleportUsed;
      barCol=ready?'#aaff66':'#666';strokeCol=ready?'#66dd22':'#444';
      msg=ready?'머리 투척 중! 재클릭 → 순간이동':'(이미 순간이동 사용됨)';
      prog=1;
    }else if(me.charId==='zombie'&&me.charging){
      // 좀비 차지 중
      const min=me.bs.chargeMin||300,max=me.bs.chargeMax||600;
      prog=Math.min(1,me.chargeTimer/max);
      ready=me.chargeTimer>=min;
      barCol=ready?'#ff3333':'#aa5522';strokeCol=ready?'#ffaa22':'#553311';
      msg=ready?'차지 완료! 떼면 폭발 ('+Math.round(me.chargeTimer/60)+'초)':'차지중... ('+Math.round(me.chargeTimer/60)+'/5초)';
    }else{
      const maxCd=me.bs.specialCooldown||120;
      const cd=Math.max(0,me.specialCooldown||0);
      ready=cd<=0;
      prog=1-cd/maxCd;
      barCol=ready?'#ffe066':'#888';strokeCol=ready?'#ffaa00':'#555';
      msg=ready?'특수: 우클릭 준비!':'특수 충전중...';
    }
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=barCol;ctx.fillRect(bx,by,bw*prog,bh);
    ctx.strokeStyle=strokeCol;ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='left';
    ctx.fillStyle=ready?barCol:'#aaa';
    ctx.fillText(msg,bx,by+bh+10);
  }
  ctx.fillStyle=p2.color;ctx.textAlign='right';ctx.fillText(p2.label,W-10,32);
  for(let i=0;i<p2.maxHp;i++){ctx.fillStyle=i<p2.hp?'#ff3333':'#333';ctx.fillText('♥',W-56-i*26,32);}
  // P3/P4 두 번째 행 (3P/4P일 때)
  if(btl.players.length>2){
    ctx.font='bold 18px "Press Start 2P",monospace';
    const p3=btl.players[2];
    ctx.fillStyle=p3.color;ctx.textAlign='left';ctx.fillText(p3.label,10,56);
    for(let i=0;i<p3.maxHp;i++){ctx.fillStyle=i<p3.hp?'#ff3333':'#333';ctx.fillText('♥',52+i*24,56);}
    if(btl.players.length>3){
      const p4=btl.players[3];
      ctx.fillStyle=p4.color;ctx.textAlign='right';ctx.fillText(p4.label,W-10,56);
      for(let i=0;i<p4.maxHp;i++){ctx.fillStyle=i<p4.hp?'#ff3333':'#333';ctx.fillText('♥',W-52-i*24,56);}
    }
  }
  ctx.textAlign='left';
}
