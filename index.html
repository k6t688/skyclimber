function showBattleCharSelect(testMode){
  ov.style.display='flex';
  btl_testMode=!!testMode;
  const allChars=[
    {id:'human',emoji:'🧑',name:'탐험가'},
    {id:'mochi',emoji:'🍡',name:'인절미'},
    {id:'cockroach',emoji:'🪳',name:'바퀴벌레'},
    {id:'ice',emoji:'❄️',name:'얼음'},
    {id:'rabbit',emoji:'🐰',name:'토끼'},
    {id:'protein_stick',emoji:'🥢',name:'단백질 스틱'},
  ];
  const makeSkinRow=(charId,skinVar)=>{
    if(!SKINS[charId])return '';
    const skins=SKINS[charId].filter(sk=>sk.id==='default'||SAVE.hasSkin(sk.id));
    if(skins.length<=1)return '';
    const curSkin=skinVar==='btlP1Skin'?btlP1Skin:btlP2Skin;
    return '<div style="display:flex;gap:3px;justify-content:center;margin-top:2px">'+skins.map(sk=>
      '<div style="cursor:pointer;padding:1px 4px;font-size:9px;border:1px solid '+(curSkin===sk.id?'#ffe066':'#555')+';border-radius:3px" onclick="event.stopPropagation();'+skinVar+'=\''+sk.id+'\';showBattleCharSelect('+btl_testMode+')">'+sk.emoji+'</div>'
    ).join('')+'</div>';
  };
  const makeCards=(sel,prefix,skinVar)=>allChars.map(c=>{
    const unlocked=SAVE.hasChar(c.id);
    if(!unlocked)return `<div class="char-card locked" style="width:80px;height:100px;padding:4px">
      <div style="font-size:22px">🔒</div>
      <div style="font-size:9px;color:#555;margin-top:4px">${c.name}</div>
    </div>`;
    const cls=sel===c.id?'selected':'unlocked';
    return `<div class="char-card ${cls}" style="width:80px;height:${SKINS[c.id]?'115':'100'}px;padding:4px" onclick="${prefix}='${c.id}';${skinVar}='default';showBattleCharSelect(${btl_testMode})">
      <div style="font-size:28px">${c.emoji}</div>
      <div style="font-size:9px;color:${sel===c.id?'#ffe066':'#aaa'};margin-top:4px">${c.name}</div>
      ${sel===c.id?makeSkinRow(c.id,skinVar):''}
    </div>`;
  }).join('');
  ov.innerHTML=`
    <h1 style="font-size:18px;margin-bottom:14px">캐릭터 선택</h1>
    <div style="display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap;justify-content:center">
      <div style="text-align:center">
        <p style="color:#7ef;font-size:12px;margin-bottom:8px">P1 ←→↑ 좌클릭</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:280px">${makeCards(btlP1Char,'btlP1Char','btlP1Skin')}</div>
      </div>
      <div style="font-size:28px;color:#ffe066;align-self:center">VS</div>
      <div style="text-align:center">
        <p style="color:#f88;font-size:12px;margin-bottom:8px">P2 A/D/W 우클릭</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:280px">${makeCards(btlP2Char,'btlP2Char','btlP2Skin')}</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn-sm" onclick="showBattleMenu()">← 뒤로</button>
      <button class="btn" onclick="startBattle(btl_testMode)">⚔️ 대전 시작!</button>
    </div>
  `;
}

// ─── 배틀 캐릭터 능력치 ──────────────────────
const BTL_STATS={
  human:{hp:3,kb:20,stun:30,cooldown:22,atkType:'punch',desc:'기본 펀치'},
  mochi:{hp:3,kb:0,stun:60,cooldown:50,atkType:'grab',grabRange:200,grabSpeed:18,desc:'늘어나는 팔로 끌어오기'},
  cockroach:{hp:4,kb:18,stun:45,cooldown:70,atkType:'bomb',bombSpeed:10,bombGravity:0.3,bombFuseTime:120,blastRadius:60,desc:'포물선 알 폭탄'},
  ice:{hp:3,kb:12,stun:18,cooldown:30,atkType:'shard',shardSpeed:12,shardRange:150,slowDuration:180,desc:'얼음 투사체+슬로우'},
  rabbit:{hp:3,kb:5,stun:6,cooldown:6,atkType:'rapidPunch',autoFire:true,desc:'초고속 연타 (꾹 누르기)'},
  protein_stick:{hp:3,kb:8,stun:30,cooldown:30,atkType:'comboPunch',comboKbGrow:3,maxComboKb:30,desc:'콤보 펀치 (연타시 넉백↑)'},
};

function btlMakePlayer(charId,x,facing,label,color,skin){
  const c=CHARS[charId];
  const bs=BTL_STATS[charId]||BTL_STATS.human;
  let hitJumps=1;
  if(charId==='rabbit')hitJumps=2;
  if(charId==='cockroach')hitJumps=0;
  return{x,worldY:-50,vx:0,vy:0,w:22,h:32,facing,
    hp:bs.hp,maxHp:bs.hp,maxJumps:c.jumpCount||2,jumps:c.jumpCount||2,jumpForce:c.jumpForce||-14,
    airJumpForce:c.airJumpForce||c.jumpForce||-14,
    onGround:false,frame:0,ft:0,speed:c.speed||5,friction:c.friction||0.8,
    attacking:false,attackAngle:0,attackTimer:0,attackCooldown:0,
    crouching:false,crouchTimer:0,crouchTime:c.crouchTime||0,
    flying:false,flyTimer:0,maxFlyTime:c.maxFlyTime||0,
    spinAngle:0,freezesPlatforms:!!c.freezesPlatforms,
    stunTimer:0,hitJumps,knocked:false,
    slowTimer:0,comboCount:0,
    grabArm:null,_mouseHeld:false,
    skin:skin||'default',
    bs,charId,charDef:c,label,color,_jumpHeld:false};
}

function startBattle(testMode){
  ov.style.display='none';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  const seed=Math.floor(Math.random()*999999);
  btl={
    camY:0,scrollSpeed:testMode?0:0.8,time:0,online:false,seed:seed,platIdx:0,testMode:!!testMode,
    height:0,ship:null,shipSpawned:false,
    platforms:[],particles:[],projectiles:[],
    stars:Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.02+Math.random()*0.04})),
    p1:btlMakePlayer(btlP1Char,W*0.3,1,'P1','#7ef',btlP1Skin),
    p2:btlMakePlayer(btlP2Char,W*0.7,-1,'P2','#f88',btlP2Skin),
    state:'countdown',countdown:180,winner:null,hitStop:0,_endBound:false
  };
  btl.platforms.push({x:0,worldY:0,w:W,h:20,type:'ground'});
  if(testMode){
    btl.platforms.push({x:W*0.1,worldY:-100,w:120,h:14,type:'rock'});
    btl.platforms.push({x:W*0.5,worldY:-100,w:120,h:14,type:'rock'});
    btl.platforms.push({x:W*0.3,worldY:-200,w:140,h:14,type:'rock'});
    btl.platforms.push({x:W*0.05,worldY:-300,w:100,h:14,type:'rock'});
    btl.platforms.push({x:W*0.6,worldY:-300,w:100,h:14,type:'rock'});
    btl.platforms.push({x:W*0.3,worldY:-400,w:160,h:14,type:'rock'});
  }else{
    let wy=-60;
    while(wy>-H*2){btl.platIdx++;const r1=btlHash(seed,btl.platIdx*3),r2=btlHash(seed,btl.platIdx*3+1),r3=btlHash(seed,btl.platIdx*3+2);wy-=45+r1*35;const pw=70+r2*80;btl.platforms.push({x:r3*(W-pw),worldY:wy,w:pw,h:14,type:'rock'});}
  }
  btlRunning=true;btlLastTime=performance.now();
  btlLoopId=requestAnimationFrame(btlLoop);
}

function btlStopLoop(){btlRunning=false;if(btlLoopId){cancelAnimationFrame(btlLoopId);btlLoopId=null;}}

function btlLoop(ts){
  if(!btlRunning)return;
  const dt=Math.min((ts-btlLastTime)/16.67,3);
  btlLastTime=ts;
  btlUpdate(dt);btlRender();
  btlLoopId=requestAnimationFrame(btlLoop);
}

function btlUpdate(dt){
  if(!btl||btl.state==='ended')return;
  if(btl.hitStop>0){btl.hitStop-=dt;return;}
  btl.time+=dt;
  for(const s of btl.stars)s.tw+=s.spd*dt;
  if(btl.state==='countdown'){btl.countdown-=dt;if(btl.countdown<=0)btl.state='playing';return;}
  if(!btl.testMode){
    btl.scrollSpeed=Math.min(2.0,0.8+btl.time*0.0003);
    // 우주선이 화면 중앙에 올 때 카메라 멈춤
    if(btl.ship&&!btl.ship.launching){
      const shipCenterScreen=btl.ship.worldY+btl.ship.h/2-btl.camY;
      if(shipCenterScreen>H*0.4)btl.scrollSpeed=0;
    }
    btl.camY-=btl.scrollSpeed*dt;btl.height+=btl.scrollSpeed*dt*0.27;
  }

  // 우주선: 9800m 도달시 스폰 (카메라 바로 위에 생성)
  if(!btl.testMode&&btl.height>=9800&&!btl.shipSpawned){
    btl.shipSpawned=true;
    const shipWY=btl.camY-H*0.3;
    // 우주선까지 올라가는 발판들
    const topPlat=Math.min(...btl.platforms.map(p=>p.worldY));
    let stepY=topPlat;
    while(stepY>shipWY+80){stepY-=55+Math.random()*30;const pw=80+Math.random()*60;btl.platforms.push({x:Math.random()*(W-pw),worldY:stepY,w:pw,h:14,type:'rock'});}
    // 발사대 (넓은 바닥)
    btl.platforms.push({x:W/2-140,worldY:shipWY,w:280,h:20,type:'star',isShipPad:true});
    // 발사대 양옆 발판
    btl.platforms.push({x:W/2-250,worldY:shipWY+40,w:100,h:14,type:'rock'});
    btl.platforms.push({x:W/2+150,worldY:shipWY+40,w:100,h:14,type:'rock'});
    btl.ship={x:W/2,worldY:shipWY-80,w:80,h:100,boarded:null,boardTimer:0,launching:false,launchVy:0,padY:shipWY};
  }

  // 우주선 탑승 체크
  if(btl.ship&&!btl.ship.boarded&&!btl.ship.launching){
    const s=btl.ship;
    for(const p of[btl.p1,btl.p2]){
      const px=p.x+p.w/2,py=p.worldY+p.h/2;
      if(Math.abs(px-s.x)<50&&Math.abs(py-s.worldY-s.h/2)<60&&p.onGround){
        s.boarded=p;p.vx=0;p.vy=0;break;
      }
    }
  }

  // 우주선 탑승 후 5초 카운트 → 발사
  if(btl.ship&&btl.ship.boarded){
    const s=btl.ship;
    const bp=s.boarded;
    // 탑승자 위치 고정 (우주선 창문)
    bp.x=s.x-bp.w/2;bp.worldY=s.worldY+20;bp.vx=0;bp.vy=0;
    s.boardTimer+=dt;
    // 5초(300프레임) 후 발사
    if(s.boardTimer>=300&&!s.launching){
      s.launching=true;s.launchVy=0;
    }
    if(s.launching){
      s.launchVy-=0.15*dt;
      s.worldY+=s.launchVy*dt;
      bp.x=s.x-bp.w/2;bp.worldY=s.worldY+20;
      // 파티클 (화염)
      for(let i=0;i<3;i++){
        btl.particles.push({x:s.x-15+Math.random()*30,y:s.worldY+s.h-btl.camY+Math.random()*10,
          vx:(Math.random()-0.5)*3,vy:3+Math.random()*4,life:1,decay:0.06+Math.random()*0.04,sz:4+Math.random()*4,col:i%2?'#ff6633':'#ffe066'});
      }
      // 화면 위로 사라지면 종료
      if(s.worldY-btl.camY<-200){
        btl.state='ended';
        btl.winner=s.boarded===btl.p1?'P1':'P2';
      }
    }
  }

  if(btl.online){
    // 온라인: 로컬 플레이어만 조작, 상대는 네트워크에서 수신
    const lp=btl.localIdx===0?btl.p1:btl.p2;
    const rp=btl.localIdx===0?btl.p2:btl.p1;
    btlUpdatePlayer(lp,dt,'ArrowLeft','ArrowRight','ArrowUp');
    // 상대 상태 적용
    if(netOpponentState){
      // 위치: 보간 (lerp) → 부드럽게 따라감
      const t=0.35;
      rp.x+=(netOpponentState.x-rp.x)*t;
      rp.worldY+=(netOpponentState.worldY-rp.worldY)*t;
      rp.vx+=(netOpponentState.vx-rp.vx)*t;
      rp.vy+=(netOpponentState.vy-rp.vy)*t;
      // 즉시 반영하는 값들
      rp.facing=netOpponentState.facing;rp.frame=netOpponentState.frame;
      rp.attacking=netOpponentState.attacking;rp.attackAngle=netOpponentState.attackAngle||0;
      rp.attackTimer=netOpponentState.attackTimer;rp.onGround=netOpponentState.onGround;
      rp.stunTimer=netOpponentState.stunTimer;rp.hp=netOpponentState.hp;
      rp.knocked=netOpponentState.knocked;rp.crouching=netOpponentState.crouching;
      rp.crouchTimer=netOpponentState.crouchTimer;rp.flying=netOpponentState.flying;
      rp.flyTimer=netOpponentState.flyTimer;rp.spinAngle=netOpponentState.spinAngle||0;
    }else{
      // 네트워크 데이터 없을 때 물리 예측
      rp.vy=Math.min(rp.vy+0.55*dt,18);
      rp.x+=rp.vx*dt;rp.worldY+=rp.vy*dt;
    }
    // 로컬 공격 → 상대 피격 감지 → 서버로 전송
    btlCheckHitOnline(lp,rp);
    btlCheckFall(lp);
    // 상태 전송 (~20fps)
    btl.netSendT=(btl.netSendT||0)-dt;
    if(btl.netSendT<=0){btl.netSendT=2;netSendState(lp);}
    // 승패 (로컬 HP 기준)
    if(lp.hp<=0){btl.state='ended';btl.winner=btl.localIdx===0?'P2':'P1';netSend({type:'game_event',event:'win',data:{}});return;}
    if(rp.hp<=0){btl.state='ended';btl.winner=btl.localIdx===0?'P1':'P2';return;}
  }else{
    // 로컬 2P
    btlUpdatePlayer(btl.p1,dt,'ArrowLeft','ArrowRight','ArrowUp');
    btlUpdatePlayer(btl.p2,dt,'KeyA','KeyD','KeyW');
    btlCheckHit(btl.p1,btl.p2);
    btlCheckHit(btl.p2,btl.p1);
    btlCheckFall(btl.p1);
    btlCheckFall(btl.p2);
    if(btl.p1.hp<=0){btl.state='ended';btl.winner='P2';return;}
    if(btl.p2.hp<=0){btl.state='ended';btl.winner='P1';return;}
  }

  // 발판 생성 (시드 기반, 테스트 모드/우주선 스폰 후엔 스킵)
  if(!btl.testMode&&!btl.shipSpawned){
    let topWY=Math.min(...btl.platforms.map(p=>p.worldY));
    while(topWY>btl.camY-H*1.5){
      btl.platIdx++;
      const r1=btlHash(btl.seed,btl.platIdx*3),r2=btlHash(btl.seed,btl.platIdx*3+1),r3=btlHash(btl.seed,btl.platIdx*3+2);
      const gap=45+r1*35;topWY-=gap;
      const pw=70+r2*80;
      btl.platforms.push({x:r3*(W-pw),worldY:topWY,w:pw,h:14,type:'rock'});
    }
  }
  if(!btl.testMode){btl.platforms=btl.platforms.filter(p=>p.isShipPad||p.worldY-btl.camY<H+200);}
  for(const pt of btl.particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.1*dt;pt.life-=pt.decay*dt;}
  btl.particles=btl.particles.filter(pt=>pt.life>0);
  btlUpdateProjectiles(dt);
  // 슬로우/콤보 타이머
  for(const p of[btl.p1,btl.p2]){
    if(p.slowTimer>0)p.slowTimer-=dt;
  }
}

// 시드 기반 해시 (0~1 반환, 결정론적)
function btlHash(seed,idx){
  let h=(seed*2654435761+idx*2246822519)>>>0;
  h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;
  return(h&0x7fffffff)/0x7fffffff;
}

// 온라인 전용 히트 체크 (서버로 이벤트 전송)
function btlCheckHitOnline(atk,tgt){
  if(!atk.attacking||atk.attackTimer>10||atk.attackTimer<2)return;
  if(tgt.stunTimer>0)return;
  const cx=atk.x+atk.w/2,cy=atk.worldY+atk.h/2;
  const reach=30;
  const fistX=cx+Math.cos(atk.attackAngle)*reach;
  const fistY=cy+Math.sin(atk.attackAngle)*reach;
  const dx=(tgt.x+tgt.w/2)-fistX,dy=(tgt.worldY+tgt.h/2)-fistY;
  if(Math.sqrt(dx*dx+dy*dy)<28){
    atk.attacking=false;btl.hitStop=5;
    const hx=tgt.x+tgt.w/2,hy=tgt.worldY+tgt.h/2-btl.camY;
    for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
      btl.particles.push({x:hx,y:hy,vx:Math.cos(atk.attackAngle)*s*2+Math.cos(a)*s*0.5,vy:Math.sin(atk.attackAngle)*s*2+Math.sin(a)*s*0.5,life:1,decay:0.05+Math.random()*0.04,sz:3+Math.random()*3,col:'#ffe066'});}
    // 서버로 피격 이벤트 전송
    netSend({type:'game_event',event:'hit',data:{angle:atk.attackAngle,kb:20}});
  }
}

function btlUpdatePlayer(p,dt,kL,kR,kJ){
  // 우주선 탑승 중이면 업데이트 스킵
  if(btl.ship&&btl.ship.boarded===p)return;
  const hasCrouch=p.crouchTime>0;
  const isCockroach=p.charId==='cockroach';
  const isProtein=p.charId==='protein_stick';

  // 기절 타이머
  if(p.stunTimer>0){
    p.stunTimer-=dt;
    // 기절 중에도 물리만 적용 (조작 불가)
    if(isCockroach&&!p.onGround){p.vy=Math.min(p.vy+0.35*dt,10);}
    else{p.vy=Math.min(p.vy+0.55*dt,18);}
    p.vx*=0.95; // 넉백 감속
    p.x+=p.vx*dt;p.worldY+=p.vy*dt;
    if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;
    // 기절 중 착지 체크
    p.onGround=false;
    for(const pl of btl.platforms){
      if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
      const pBot=p.worldY+p.h,pBotPrev=pBot-p.vy*dt;
      if(pBotPrev<=pl.worldY+2&&pBot>=pl.worldY&&p.vy>0){
        p.worldY=pl.worldY-p.h;p.vy=0;p.onGround=true;
      }
    }
    return;
  }

  // 이동 (웅크림 중엔 느리게, 슬로우 적용)
  const spdMult=p.slowTimer>0?0.5:1;
  if(keys[kL]){if(!p.crouching){p.vx=-p.speed*spdMult;p.facing=-1;}}
  else if(keys[kR]){if(!p.crouching){p.vx=p.speed*spdMult;p.facing=1;}}
  else p.vx*=p.friction;

  // 웅크림 점프 (인절미, 단백질 스틱)
  if(hasCrouch&&p.crouching){
    p.vx*=0.5;
    p.crouchTimer+=dt;
    if(!p.onGround){p.crouching=false;}
    else if(p.crouchTimer>=p.crouchTime){
      p.crouching=false;
      p.vy=p.jumpForce;p.jumps--;
      btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,'#d4c4a0',15);
    }
  }

  // 바퀴벌레 비행
  if(isCockroach){
    const flyKey=keys[kJ];
    if(flyKey&&p.flyTimer<p.maxFlyTime){
      p.vy=Math.max(p.vy-1.0*dt,-7);
      p.flyTimer+=dt;p.flying=true;
    }else{p.flying=false;}
    if(p.onGround){p.flyTimer=0;p.flying=false;}
  }

  // 점프 (캐릭터별 분기) — 바퀴벌레는 비행만 (점프 없음, 싱글모드와 동일)
  if(keys[kJ]&&!p._jumpHeld){
    if(isCockroach){
      // 바퀴벌레: 점프 없음, 비행은 위에서 처리
    }else if(hasCrouch){
      if(p.onGround&&!p.crouching&&!p.knocked){p.crouching=true;p.crouchTimer=0;p._jumpHeld=true;}
      else if(!p.onGround&&p.jumps>0){p.vy=p.airJumpForce;p.jumps--;p._jumpHeld=true;btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,'#d4c4a0',10);}
      else if(p.onGround&&p.knocked&&p.jumps>0){
        // 넉백 상태에서는 웅크림 없이 바로 점프
        p.vy=p.airJumpForce;p.jumps--;p._jumpHeld=true;btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,6);
      }
    }else{
      if(p.jumps>0){p.vy=p.jumpForce;p.jumps--;p._jumpHeld=true;
        if(!p.onGround)btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,10);
        else btlSpawnPt(p.x+p.w/2,p.worldY+p.h-btl.camY,p.color,6);
      }
    }
  }
  if(!keys[kJ])p._jumpHeld=false;

  // 공격 (마우스 클릭으로 트리거됨)
  if(p.attackCooldown>0)p.attackCooldown-=dt;
  if(p.attacking){p.attackTimer-=dt;if(p.attackTimer<=0)p.attacking=false;}
  // 토끼: 마우스 꾹 누르면 자동 연사
  if(p._mouseHeld&&p.bs.autoFire&&!p.attacking&&p.attackCooldown<=0&&p.stunTimer<=0){
    btlTriggerAttack(p,btlMouseX,btlMouseY);
  }

  // 중력 (바퀴벌레는 느린 낙하)
  if(isCockroach&&!p.onGround&&!p.flying){
    p.vy=Math.min(p.vy+0.35*dt,10);
  }else{
    p.vy=Math.min(p.vy+0.55*dt,18);
  }

  p.x+=p.vx*dt;p.worldY+=p.vy*dt;
  if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;

  // 충돌
  p.onGround=false;
  for(const pl of btl.platforms){
    if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
    const pBot=p.worldY+p.h,pBotPrev=pBot-p.vy*dt;
    if(pBotPrev<=pl.worldY+2&&pBot>=pl.worldY&&p.vy>0){
      p.worldY=pl.worldY-p.h;p.vy=0;p.onGround=true;
      // 착지하면 넉백 해제 + 점프 완전 회복
      if(p.knocked){p.knocked=false;p.flyTimer=0;}
      p.jumps=p.maxJumps;
      if(p.freezesPlatforms&&pl.moving&&!pl.frozen){
        pl.frozen=true;pl.moving=false;pl.moveSpeed=0;
        btlSpawnPt(p.x+p.w/2,pl.worldY-btl.camY,'#aaddff',12);
      }
    }
  }

  // 단백질 스틱 공중 회전
  if(isProtein&&!p.onGround){p.spinAngle+=0.25*dt;}
  else{p.spinAngle=0;}

  if(Math.abs(p.vx)>0.5){p.ft+=dt;if(p.ft>7){p.ft=0;p.frame=(p.frame+1)%4;}}else p.frame=0;
}

function btlCheckHit(atk,tgt){
  const bs=atk.bs;
  // 펀치 계열 (human, rabbit, protein_stick)
  if(bs.atkType==='punch'||bs.atkType==='rapidPunch'||bs.atkType==='comboPunch'){
    if(!atk.attacking||atk.attackTimer>8||atk.attackTimer<1)return;
    if(tgt.stunTimer>0)return;
    const cx=atk.x+atk.w/2,cy=atk.worldY+atk.h/2;
    const reach=30;
    const fistX=cx+Math.cos(atk.attackAngle)*reach;
    const fistY=cy+Math.sin(atk.attackAngle)*reach;
    const dx=(tgt.x+tgt.w/2)-fistX,dy=(tgt.worldY+tgt.h/2)-fistY;
    if(Math.sqrt(dx*dx+dy*dy)<28){
      let kb=bs.kb;
      if(bs.atkType==='comboPunch'){atk.comboCount++;kb=Math.min(bs.maxComboKb,bs.kb+atk.comboCount*bs.comboKbGrow);}
      btlApplyHit(tgt,atk.attackAngle,kb,bs.stun);
      atk.attacking=false;btl.hitStop=bs.atkType==='rapidPunch'?2:5;
    }
  }
  // 인절미 grab arm은 btlUpdateProjectiles에서 처리
}

function btlApplyHit(tgt,angle,kb,stun){
  tgt.vx=Math.cos(angle)*kb;tgt.vy=Math.sin(angle)*kb;
  tgt.stunTimer=stun;tgt.crouching=false;tgt.crouchTimer=0;tgt.flying=false;
  tgt.knocked=true;
  if(tgt.charId==='cockroach'){tgt.flyTimer=tgt.maxFlyTime*0.5;tgt.jumps=0;}
  else if(tgt.charId==='rabbit'){tgt.jumps=2;}
  else{tgt.jumps=1;}
  const hx=tgt.x+tgt.w/2,hy=tgt.worldY+tgt.h/2-btl.camY;
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    btl.particles.push({x:hx,y:hy,vx:Math.cos(angle)*s*1.5+Math.cos(a)*s*0.5,vy:Math.sin(angle)*s*1.5+Math.sin(a)*s*0.5,life:1,decay:0.05+Math.random()*0.04,sz:3+Math.random()*3,col:'#ffe066'});}
}

// ─── 투사체 시스템 ───────────────────────────
function btlUpdateProjectiles(dt){
  const remove=[];
  for(let i=0;i<btl.projectiles.length;i++){
    const pr=btl.projectiles[i];
    if(pr.type==='bomb'){
      if(!pr.landed){
        pr.vy+=pr.gravity*dt;
        pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
        // 바닥/발판 충돌
        for(const pl of btl.platforms){
          if(pr.x>pl.x&&pr.x<pl.x+pl.w&&pr.y>=pl.worldY-6&&pr.y<=pl.worldY+pl.h+4){
            pr.landed=true;pr.vx=0;pr.vy=0;pr.y=pl.worldY-6;pr.landedPlat=pl;pr.fuse=pr.fuse>120?120:pr.fuse;break;}
        }
        // 직접 적중 → 즉시 폭발
        if(!pr.landed){
          const tgt=btl.p1===pr.owner?btl.p2:btl.p1;
          if(Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
            btlExplode(pr);remove.push(i);continue;
          }
        }
      }
      pr.fuse-=dt;
      if(pr.fuse<=0){btlExplode(pr);remove.push(i);continue;}
      if(pr.y-btl.camY>H+100){remove.push(i);continue;}
    }
    else if(pr.type==='shard'){
      pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.dist+=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy)*dt;
      if(pr.dist>=pr.maxDist){remove.push(i);continue;}
      const tgt=btl.p1===pr.owner?btl.p2:btl.p1;
      if(tgt.stunTimer<=0&&Math.abs(pr.x-(tgt.x+tgt.w/2))<18&&Math.abs(pr.y-(tgt.worldY+tgt.h/2))<20){
        btlApplyHit(tgt,Math.atan2(pr.vy,pr.vx),pr.kb,pr.stun);
        tgt.slowTimer=pr.slowDur;
        btlSpawnPt(tgt.x+tgt.w/2,tgt.worldY+tgt.h/2-btl.camY,'#aaddff',10);
        remove.push(i);continue;
      }
    }
  }
  for(let i=remove.length-1;i>=0;i--)btl.projectiles.splice(remove[i],1);

  // 인절미 grab arm 업데이트
  for(const p of[btl.p1,btl.p2]){
    if(!p.grabArm)continue;
    const arm=p.grabArm;
    const tgt=btl.p1===p?btl.p2:btl.p1;
    if(!arm.returning&&!arm.hit){
      arm.x+=arm.vx*dt;arm.y+=arm.vy*dt;
      arm.dist+=Math.sqrt(arm.vx*arm.vx+arm.vy*arm.vy)*dt;
      if(tgt.stunTimer<=0&&Math.abs(arm.x-(tgt.x+tgt.w/2))<20&&Math.abs(arm.y-(tgt.worldY+tgt.h/2))<22){
        arm.hit=true;arm.target=tgt;
      }
      if(arm.dist>=arm.maxDist)arm.returning=true;
    }else if(arm.hit&&arm.target){
      // 잡은 적을 인절미에게 끌어옴
      const px=p.x+p.w/2,py=p.worldY+p.h/2;
      const dx=px-arm.target.x-arm.target.w/2,dy=py-arm.target.worldY-arm.target.h/2;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<20){
        btlApplyHit(arm.target,0,0,p.bs.stun);
        btlSpawnPt(arm.target.x+arm.target.w/2,arm.target.worldY+arm.target.h/2-btl.camY,'#d4c4a0',15);
        p.grabArm=null;continue;
      }
      const pull=16;
      arm.target.vx=dx/d*pull;arm.target.vy=dy/d*pull;
      arm.target.x+=arm.target.vx*dt;arm.target.worldY+=arm.target.vy*dt;
      arm.x=arm.target.x+arm.target.w/2;arm.y=arm.target.worldY+arm.target.h/2;
    }else if(arm.returning){
      const px=p.x+p.w/2,py=p.worldY+p.h/2;
      const dx=px-arm.x,dy=py-arm.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<15){p.grabArm=null;continue;}
      arm.x+=dx/d*18*dt;arm.y+=dy/d*18*dt;
    }
  }
}

function btlExplode(pr){
  const cx=pr.x,cy=pr.y;
  for(const p of[btl.p1,btl.p2]){
    if(p===pr.owner)continue;
    const dx=p.x+p.w/2-cx,dy=p.worldY+p.h/2-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<pr.radius){
      const angle=Math.atan2(dy,dx);
      btlApplyHit(p,angle,pr.kb*(1-d/pr.radius*0.5),pr.stun);
    }
  }
  const sy=cy-btl.camY;
  for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*6;
    btl.particles.push({x:cx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04+Math.random()*0.03,sz:4+Math.random()*4,col:i%2?'#ff6633':'#ffe066'});}
}

function btlCheckFall(p){
  if(btl.ship&&btl.ship.boarded===p)return;
  if(btl.testMode){
    // 테스트: 바닥 아래로 떨어지면 리스폰만
    if(p.worldY>50){btlRespawn(p);return;}
    return;
  }
  if(p.worldY-btl.camY>H+50){
    p.hp--;
    if(p.hp>0)btlRespawn(p);
    else{btlSpawnPt(W/2,H/2,'#f44',20);}
  }
}

function btlRespawn(p){
  const vis=btl.platforms.filter(pl=>pl.worldY-btl.camY>30&&pl.worldY-btl.camY<H*0.35);
  if(vis.length>0){const pl=vis[Math.floor(Math.random()*vis.length)];p.x=pl.x+pl.w/2-p.w/2;p.worldY=pl.worldY-p.h-10;}
  else{p.x=W/2-p.w/2;p.worldY=btl.camY+60;}
  p.vx=0;p.vy=0;p.jumps=p.maxJumps;p.crouching=false;p.crouchTimer=0;p.flying=false;p.flyTimer=0;p.spinAngle=0;p.stunTimer=0;p.knocked=false;p.slowTimer=0;p.grabArm=null;p.attacking=false;
  btlSpawnPt(p.x+p.w/2,p.worldY-btl.camY+p.h/2,p.color,15);
}

function btlSpawnPt(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    btl.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.04+Math.random()*0.04,sz:2+Math.random()*3,col});}
}

function btlRender(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a2e');g.addColorStop(1,'#1a1a40');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of btl.stars){ctx.globalAlpha=0.4+0.4*Math.sin(s.tw);ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz);}
  ctx.globalAlpha=1;
  for(const pl of btl.platforms){
    const sy=pl.worldY-btl.camY;
    if(sy>H+20||sy<-30)continue;
    drawPlatform(pl.x,sy,pl.w,pl.h,pl.type);
  }
  for(const pt of btl.particles){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz);}
  ctx.globalAlpha=1;
  // 투사체 렌더
  for(const pr of btl.projectiles){
    if(pr.type==='bomb'){
      const sy=pr.y-btl.camY;
      if(pr.landed){
        const blink=Math.floor(pr.fuse/8)%2;
        ctx.fillStyle=blink?'#ff4':'#a60';ctx.beginPath();ctx.arc(pr.x,sy,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.textAlign='center';
        ctx.fillText(Math.ceil(pr.fuse/60)+'',pr.x,sy-10);ctx.textAlign='left';
      }else{
        ctx.fillStyle='#8a6020';ctx.beginPath();ctx.arc(pr.x,sy,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#c09030';ctx.beginPath();ctx.arc(pr.x,sy-2,3,0,Math.PI*2);ctx.fill();
      }
    }else if(pr.type==='shard'){
      const sy=pr.y-btl.camY;
      ctx.fillStyle='#aaddff';
      ctx.save();ctx.translate(pr.x,sy);ctx.rotate(Math.atan2(pr.vy,pr.vx));
      ctx.fillRect(-6,-3,12,6);ctx.fillStyle='#e0f0ff';ctx.fillRect(-4,-2,4,4);
      ctx.restore();
    }
  }
  // 우주선 렌더
  if(btl.ship){
    const s=btl.ship;
    const sx=s.x,sy=s.worldY-btl.camY;
    if(sy>-200&&sy<H+200){
      // 발사대 불빛
      ctx.fillStyle='rgba(255,230,100,0.3)';ctx.fillRect(sx-50,s.padY-btl.camY-5,100,5);
      // 로켓 본체
      ctx.fillStyle='#ccc';ctx.fillRect(sx-25,sy+20,50,70);
      // 로켓 머리 (삼각형)
      ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-25,sy+25);ctx.lineTo(sx+25,sy+25);ctx.closePath();ctx.fill();
      // 날개
      ctx.fillStyle='#ff4444';
      ctx.beginPath();ctx.moveTo(sx-25,sy+70);ctx.lineTo(sx-40,sy+95);ctx.lineTo(sx-25,sy+90);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(sx+25,sy+70);ctx.lineTo(sx+40,sy+95);ctx.lineTo(sx+25,sy+90);ctx.closePath();ctx.fill();
      // 창문
      ctx.fillStyle='#113';ctx.beginPath();ctx.arc(sx,sy+40,14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#225';ctx.beginPath();ctx.arc(sx,sy+40,12,0,Math.PI*2);ctx.fill();
      // 탑승자 캐릭터 (창문 안)
      if(s.boarded){
        ctx.save();ctx.beginPath();ctx.arc(sx,sy+40,11,0,Math.PI*2);ctx.clip();
        const sg2=game,sc2=selectedChar,ss2=selectedSkin;
        game={p:{crouching:false,crouchTimer:0,flying:false,spinAngle:0,onGround:true},char:s.boarded.charDef};
        selectedChar=s.boarded.charId;selectedSkin=s.boarded.skin||'default';
        s.boarded.charDef.draw(ctx,sx-11,sy+24,1,0,1000,true,0);
        game=sg2;selectedChar=sc2;selectedSkin=ss2;
        ctx.restore();
        // 카운트다운 표시
        if(!s.launching){
          const sec=Math.ceil((300-s.boardTimer)/60);
          ctx.fillStyle='#ffe066';ctx.font='bold 16px "Press Start 2P",monospace';ctx.textAlign='center';
          ctx.fillText(sec>0?sec+'':'GO!',sx,sy-10);ctx.textAlign='left';
        }
      }else{
        // 빈 창문 하이라이트
        ctx.fillStyle='rgba(100,200,255,0.2)';ctx.beginPath();ctx.arc(sx-3,sy+37,5,0,Math.PI*2);ctx.fill();
      }
      // 발사 중 화염
      if(s.launching){
        for(let i=0;i<3;i++){
          const fx=sx-12+Math.random()*24,fy=sy+90+Math.random()*15;
          ctx.fillStyle=Math.random()>0.5?'#ff6633':'#ffe066';
          ctx.fillRect(fx,fy,6+Math.random()*6,8+Math.random()*10);
        }
      }
    }
  }
  btlDrawPlayer(btl.p1);btlDrawPlayer(btl.p2);
  btlDrawHP();
  // 높이 표시
  if(!btl.testMode){
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px "Press Start 2P",monospace';
    ctx.fillText(Math.floor(btl.height).toLocaleString()+'m',14,46);
    if(btl.height>9000){ctx.fillStyle='#ffe066';ctx.fillText('🚀 '+Math.floor(10000-btl.height)+'m',14,62);}
  }
  if(btl.state==='countdown'){
    const sec=Math.ceil(btl.countdown/60);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffe066';ctx.font='bold 60px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText(sec>0?String(sec):'GO!',W/2,H/2+15);ctx.textAlign='left';
  }
  if(btl.state==='ended'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    const wc=btl.winner==='P1'?'#7ef':'#f88';
    ctx.fillStyle=wc;ctx.font='bold 36px "Press Start 2P",monospace';
    ctx.fillText(btl.winner+' WIN!',W/2,H/2-20);
    ctx.fillStyle='#aaa';ctx.font='13px "Press Start 2P",monospace';
    ctx.fillText('아무 키를 눌러 메뉴로',W/2,H/2+30);ctx.textAlign='left';
    if(!btl._endBound){btl._endBound=true;
      setTimeout(()=>{const h=()=>{document.removeEventListener('keydown',h);canvas.removeEventListener('click',h);btlStopLoop();btl=null;showBattleMenu();};
        document.addEventListener('keydown',h);canvas.addEventListener('click',h);},600);}
  }
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='9px "Press Start 2P",monospace';
  if(btl.testMode){ctx.fillText('🧪 TEST MODE',10,H-8);}
  else{ctx.fillText('SPD '+btl.scrollSpeed.toFixed(1),W-90,H-8);}
  if(btl.online){ctx.fillText('PING '+netPing+'ms',W-180,H-8);}
}

function btlDrawPlayer(p){
  // 우주선 탑승 중이면 일반 렌더 스킵
  if(btl.ship&&btl.ship.boarded===p)return;
  const sy=Math.round(p.worldY-btl.camY),sx=Math.round(p.x);
  if(sy>H+50||sy<-60)return;
  // mock game.p for character draw functions
  const sg=game,sc=selectedChar,ss=selectedSkin;
  game={p:{crouching:p.crouching,crouchTimer:p.crouchTimer,flying:p.flying,spinAngle:p.spinAngle,onGround:p.onGround},char:p.charDef};
  selectedChar=p.charId;selectedSkin=p.skin||'default';
  p.charDef.draw(ctx,sx,sy,p.facing,p.frame,1000,p.onGround,p.vy);
  game=sg;selectedChar=sc;selectedSkin=ss;
  // 공격 시각효과 (캐릭터별)
  if(p.attacking){
    const prog=p.attackTimer/(p.bs.atkType==='rapidPunch'?8:p.bs.atkType==='comboPunch'?10:12);
    const ext=Math.sin(prog*Math.PI)*30;
    const cx=sx+p.w/2,cy=sy+p.h/2;
    const fx=cx+Math.cos(p.attackAngle)*ext;
    const fy=cy+Math.sin(p.attackAngle)*ext;
    ctx.strokeStyle=p.color;ctx.lineWidth=p.bs.atkType==='rapidPunch'?2:4;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx,fy);ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fx,fy,p.bs.atkType==='rapidPunch'?4:6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(fx,fy,p.bs.atkType==='rapidPunch'?4:6,0,Math.PI*2);ctx.stroke();
    if(p.bs.atkType==='comboPunch'&&p.comboCount>0){
      ctx.fillStyle='#ffe066';ctx.font='bold 8px "Press Start 2P",monospace';ctx.textAlign='center';
      ctx.fillText('x'+p.comboCount,sx+p.w/2,sy-14);ctx.textAlign='left';
    }
  }
  // 인절미 grab arm 시각효과
  if(p.grabArm){
    const arm=p.grabArm;
    const ax=arm.x,ay=arm.y-btl.camY;
    const pcx=sx+p.w/2,pcy=sy+p.h/2;
    ctx.strokeStyle='#d4c4a0';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(pcx,pcy);ctx.lineTo(ax,ay);ctx.stroke();
    ctx.fillStyle=arm.hit?'#ff6':'#f5e8d5';ctx.beginPath();ctx.arc(ax,ay,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a07820';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ax,ay,8,0,Math.PI*2);ctx.stroke();
  }
  // 슬로우 인디케이터
  if(p.slowTimer>0){
    ctx.fillStyle='rgba(150,210,255,0.4)';ctx.fillRect(sx-2,sy-2,p.w+4,p.h+4);
    ctx.fillStyle='#aaddff';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText('❄',sx+p.w/2,sy+p.h+10);ctx.textAlign='left';
  }
  ctx.fillStyle=p.color;ctx.font='bold 9px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(p.label,sx+p.w/2,sy-5);ctx.textAlign='left';
  // 기절 이펙트 (별 회전)
  if(p.stunTimer>0){
    const ang=btl.time*0.15;
    ctx.fillStyle='#ffe066';ctx.font='10px monospace';ctx.textAlign='center';
    for(let i=0;i<3;i++){
      const a=ang+i*Math.PI*2/3;
      ctx.fillText('★',sx+p.w/2+Math.cos(a)*14,sy-2+Math.sin(a)*6);
    }
    ctx.textAlign='left';
  }
}

function btlDrawHP(){
  ctx.font='13px "Press Start 2P",monospace';
  ctx.fillStyle='#7ef';ctx.fillText('P1',14,26);
  for(let i=0;i<btl.p1.maxHp;i++){ctx.fillStyle=i<btl.p1.hp?'#ff4444':'#333';ctx.fillText('♥',52+i*22,26);}
  ctx.textAlign='right';
  ctx.fillStyle='#f88';ctx.fillText('P2',W-14,26);
  for(let i=0;i<btl.p2.maxHp;i++){ctx.fillStyle=i<btl.p2.hp?'#ff4444':'#333';ctx.fillText('♥',W-52-i*22,26);}
  ctx.textAlign='left';
}

let btlMouseX=0,btlMouseY=0;
canvas.addEventListener('mousemove',e=>{const g=screenToGame(e.clientX,e.clientY);btlMouseX=g.x;btlMouseY=g.y;});

function btlTriggerAttack(p,mx,my){
  if(!btl||btl.state!=='playing')return;
  if(p.stunTimer>0)return;
  const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
  const angle=Math.atan2(my-cy,mx-cx);
  p.facing=Math.cos(angle)>=0?1:-1;

  const bs=p.bs;
  if(bs.atkType==='rapidPunch'){
    // 토끼: 쿨 짧아서 자동연사 가능
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=8;p.attackCooldown=bs.cooldown;
  }else if(bs.atkType==='grab'){
    // 인절미: 늘어나는 팔
    if(p.attacking||p.attackCooldown>0||p.grabArm)return;
    p.attackAngle=angle;p.attackCooldown=bs.cooldown;
    p.grabArm={x:cx,y:cy+btl.camY,vx:Math.cos(angle)*bs.grabSpeed,vy:Math.sin(angle)*bs.grabSpeed,dist:0,maxDist:bs.grabRange,hit:false,returning:false,target:null};
  }else if(bs.atkType==='bomb'){
    // 바퀴벌레: 포물선 알 폭탄
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;
    const spd=bs.bombSpeed;
    btl.projectiles.push({type:'bomb',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,gravity:bs.bombGravity,
      fuse:bs.bombFuseTime,landed:false,radius:bs.blastRadius,stun:bs.stun,kb:bs.kb});
  }else if(bs.atkType==='shard'){
    // 얼음: 짧은 투사체
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;
    btl.projectiles.push({type:'shard',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.shardSpeed,vy:Math.sin(angle)*bs.shardSpeed,
      dist:0,maxDist:bs.shardRange,stun:bs.stun,kb:bs.kb,slowDur:bs.slowDuration});
  }else if(bs.atkType==='comboPunch'){
    // 단백질 스틱: 콤보 펀치
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=10;p.attackCooldown=bs.cooldown;
  }else{
    // human 기본 펀치
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=12;p.attackCooldown=bs.cooldown;
  }
}

canvas.addEventListener('mousedown',e=>{
  if(!btlRunning||!btl)return;
  e.preventDefault();
  const g=screenToGame(e.clientX,e.clientY);
  if(btl.online){
    if(e.button===0){const lp=btl.localIdx===0?btl.p1:btl.p2;lp._mouseHeld=true;btlTriggerAttack(lp,g.x,g.y);}
  }else{
    if(e.button===0){btl.p1._mouseHeld=true;btlTriggerAttack(btl.p1,g.x,g.y);}
    if(e.button===2){btl.p2._mouseHeld=true;btlTriggerAttack(btl.p2,g.x,g.y);}
  }
});
canvas.addEventListener('mouseup',e=>{
  if(!btl)return;
  if(e.button===0){btl.p1._mouseHeld=false;if(btl.online){const lp=btl.localIdx===0?btl.p1:btl.p2;lp._mouseHeld=false;}}
  if(e.button===2){btl.p2._mouseHeld=false;}
});
canvas.addEventListener('contextmenu',e=>{if(btlRunning)e.preventDefault();});

// ══════════════════════════════════════════════════════
//  온라인 배틀
// ══════════════════════════════════════════════════════
const WS_URL='wss://skyclimber-sever-production.up.railway.app';
let netWs=null,netRoom=null,netPlayerIdx=-1,netOpponentChar=null,netOpponentState=null;
let netMyChar='human',netPing=0;

function netConnect(cb){
  if(netWs&&netWs.readyState===1){cb();return;}
  netWs=new WebSocket(WS_URL);
  netWs.onopen=()=>{console.log('WS connected');cb();};
  netWs.onmessage=(e)=>{try{netOnMessage(JSON.parse(e.data));}catch{}};
  netWs.onclose=()=>{console.log('WS closed');netWs=null;};
  netWs.onerror=()=>{alert('서버 연결 실패! 잠시 후 다시 시도해주세요.');netWs=null;};
}
function netSend(msg){if(netWs&&netWs.readyState===1)netWs.send(JSON.stringify(msg));}
function netDisconnect(){if(netWs){netSend({type:'leave_room'});netWs.close();netWs=null;}netRoom=null;netPlayerIdx=-1;netOpponentChar=null;netOpponentState=null;}

function netOnMessage(msg){
  switch(msg.type){
    case 'room_created':
      netRoom=msg.code;netPlayerIdx=0;
      showOnlineWaiting();
      break;
    case 'room_joined':
      netRoom=msg.code;netPlayerIdx=msg.playerIdx;
      break;
    case 'room_ready':
      // 양쪽 다 들어옴 → 내 캐릭터 알려주기
      netSend({type:'game_event',event:'char_select',data:{charId:netMyChar}});
      if(netOpponentChar)startOnlineBattle();
      else showOnlineWaiting('상대 캐릭터 대기 중...');
      break;
    case 'game_event':
      if(msg.event==='char_select'){
        netOpponentChar=msg.data.charId;
        if(netRoom&&netPlayerIdx>=0)startOnlineBattle();
      }
      if(msg.event==='hit'&&btl&&btl.online){
        // 상대에게 맞음 → 내 로컬 플레이어에 넉백 적용
        const lp=btl.localIdx===0?btl.p1:btl.p2;
        const a=msg.data.angle,kb=msg.data.kb||20;
        lp.vx=Math.cos(a)*kb;lp.vy=Math.sin(a)*kb;
        lp.stunTimer=30;lp.crouching=false;lp.crouchTimer=0;lp.flying=false;
        lp.knocked=true;
        if(lp.charId==='cockroach'){lp.flyTimer=lp.maxFlyTime*0.5;lp.jumps=0;}
        else if(lp.charId==='rabbit'){lp.jumps=2;}
        else{lp.jumps=1;}
        btl.hitStop=5;
        btlSpawnPt(lp.x+lp.w/2,lp.worldY+lp.h/2-btl.camY,'#ff6666',12);
      }
      if(msg.event==='win'&&btl&&btl.online){
        btl.state='ended';btl.winner=btl.localIdx===0?'P1':'P2';
      }
      break;
    case 'opponent_state':
      netOpponentState=msg.state;
      break;
    case 'opponent_left':
      if(btl&&btl.online){btl.state='ended';btl.winner='상대 퇴장';btlStopLoop();}
      else{alert('상대가 나갔습니다.');showBattleMenu();}
      break;
    case 'pong':
      netPing=Date.now()-msg.t;
      break;
    case 'error':
      alert(msg.msg);
      break;
  }
}

function netSendState(p){
  netSend({type:'game_state',state:{
    x:p.x,worldY:p.worldY,vx:p.vx,vy:p.vy,facing:p.facing,frame:p.frame,
    attacking:p.attacking,attackAngle:p.attackAngle,attackTimer:p.attackTimer,
    onGround:p.onGround,stunTimer:p.stunTimer,hp:p.hp,knocked:p.knocked,
    crouching:p.crouching,crouchTimer:p.crouchTimer,flying:p.flying,
    flyTimer:p.flyTimer,spinAngle:p.spinAngle
  }});
}

function showOnlineCharSelect(){
  ov.style.display='flex';
  const allChars=[
    {id:'human',emoji:'🧑',name:'탐험가'},{id:'mochi',emoji:'🍡',name:'인절미'},
    {id:'cockroach',emoji:'🪳',name:'바퀴벌레'},{id:'ice',emoji:'❄️',name:'얼음'},
    {id:'rabbit',emoji:'🐰',name:'토끼'},{id:'protein_stick',emoji:'🥢',name:'단백질 스틱'},
  ];
  const cards=allChars.map(c=>{
    if(!SAVE.hasChar(c.id))return `<div class="char-card locked" style="width:80px;height:100px;padding:4px"><div style="font-size:22px">🔒</div><div style="font-size:9px;color:#555;margin-top:4px">${c.name}</div></div>`;
    const cls=netMyChar===c.id?'selected':'unlocked';
    return `<div class="char-card ${cls}" style="width:80px;height:100px;padding:4px" onclick="netMyChar='${c.id}';showOnlineCharSelect()">
      <div style="font-size:28px">${c.emoji}</div>
      <div style="font-size:9px;color:${netMyChar===c.id?'#ffe066':'#aaa'};margin-top:4px">${c.name}</div>
    </div>`;
  }).join('');
  ov.innerHTML=`
    <h1 style="font-size:18px;margin-bottom:14px">🌐 온라인 — 캐릭터 선택</h1>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:320px">${cards}</div>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn-sm" onclick="showBattleMenu()">← 뒤로</button>
      <button class="btn" onclick="showOnlineRoom()">다음 →</button>
    </div>
  `;
}

function showOnlineRoom(){
  ov.style.display='flex';
  ov.innerHTML=`
    <h1 style="font-size:18px;margin-bottom:14px">🌐 온라인 대전</h1>
    <p style="color:#aaa;font-size:11px;margin-bottom:16px">방을 만들거나 코드로 참가하세요</p>
    <button class="btn" onclick="netCreateRoom()" style="background:#66bbff;border-color:#3388cc">🏠 방 만들기</button>
    <div style="margin-top:16px">
      <input id="room-code-input" type="text" maxlength="4" placeholder="코드 입력" style="font-family:'Press Start 2P',monospace;font-size:18px;width:140px;padding:10px;text-align:center;background:#222;color:#fff;border:2px solid #555">
      <button class="btn" onclick="netJoinRoom()" style="margin-left:8px">참가</button>
    </div>
    <button class="btn-sm" onclick="netDisconnect();showOnlineCharSelect()" style="margin-top:16px">← 뒤로</button>
  `;
}

function showOnlineWaiting(msg){
  ov.style.display='flex';
  const txt=msg||'상대를 기다리는 중...';
  ov.innerHTML=`
    <h1 style="font-size:18px;margin-bottom:14px">🌐 대기 중</h1>
    ${netRoom?'<p style="color:#ffe066;font-size:24px;margin-bottom:8px">방 코드: '+netRoom+'</p>':''}
    <p style="color:#aaa;font-size:12px;margin-bottom:8px">이 코드를 상대에게 알려주세요!</p>
    <p style="color:#888;font-size:11px">${txt}</p>
    <button class="btn-sm" onclick="netDisconnect();showOnlineRoom()" style="margin-top:20px">← 취소</button>
  `;
}

function netCreateRoom(){
  netConnect(()=>{netSend({type:'create_room'});});
}

function netJoinRoom(){
  const code=document.getElementById('room-code-input').value.trim();
  if(code.length!==4){alert('4자리 코드를 입력하세요');return;}
  netConnect(()=>{netSend({type:'join_room',code});showOnlineWaiting('연결 중...');});
}

function startOnlineBattle(){
  ov.style.display='none';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  const seed=parseInt(netRoom)||1234;
  const myChar=netMyChar,oppChar=netOpponentChar;
  const isHost=netPlayerIdx===0;
  btl={
    camY:0,scrollSpeed:0.8,time:0,online:true,localIdx:netPlayerIdx,seed:seed,platIdx:0,netSendT:0,
    testMode:false,height:0,ship:null,shipSpawned:false,
    platforms:[],particles:[],projectiles:[],
    stars:Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.02+Math.random()*0.04})),
    p1:btlMakePlayer(isHost?myChar:oppChar,W*0.3,1,'P1',isHost?'#7ef':'#f88'),
    p2:btlMakePlayer(isHost?oppChar:myChar,W*0.7,-1,'P2',isHost?'#f88':'#7ef'),
    state:'countdown',countdown:180,winner:null,hitStop:0,_endBound:false
  };
  // 로컬 플레이어 컬러 항상 파란색
  const lp=isHost?btl.p1:btl.p2;
  const rp=isHost?btl.p2:btl.p1;
  lp.color='#7ef';lp.label='나';
  rp.color='#f88';rp.label='상대';
  btl.platforms.push({x:0,worldY:0,w:W,h:20,type:'ground'});
  let wy=-60;
  while(wy>-H*2){btl.platIdx++;const r1=btlHash(seed,btl.platIdx*3),r2=btlHash(seed,btl.platIdx*3+1),r3=btlHash(seed,btl.platIdx*3+2);wy-=45+r1*35;const pw=70+r2*80;btl.platforms.push({x:r3*(W-pw),worldY:wy,w:pw,h:14,type:'rock'});}
  btlRunning=true;btlLastTime=performance.now();
  // 핑 측정
  setInterval(()=>{if(netWs&&netWs.readyState===1)netSend({type:'ping',t:Date.now()});},3000);
  btlLoopId=requestAnimationFrame(btlLoop);
}

// ══════════════════════════════════════════════════════
//  시작
// ══════════════════════════════════════════════════════
showMainMenu();
</script>
