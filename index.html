<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Climber</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;image-rendering:pixelated;position:absolute;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Press Start 2P',monospace;}
#hud{position:absolute;top:14px;left:14px;color:#fff;font-size:16px;text-shadow:2px 2px #000;line-height:2.2;}
#zone-display{position:absolute;top:14px;right:14px;color:#ffe;font-size:14px;text-shadow:2px 2px #000;text-align:right;}
#zone-announce{position:absolute;left:50%;top:38%;transform:translateX(-50%);font-size:20px;color:#fff;text-shadow:3px 3px #000;text-align:center;white-space:nowrap;opacity:0;transition:opacity 0.4s;pointer-events:none;}
#zone-announce.show{opacity:1;}
#controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.4);white-space:nowrap;}
#char-badge{position:absolute;bottom:28px;right:14px;font-size:13px;color:#ffe066;text-shadow:1px 1px #000;}
#ending-canvas{position:fixed;top:0;left:0;display:none;z-index:100;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);pointer-events:all;font-family:'Press Start 2P',monospace;z-index:50;}
#overlay h1{font-size:28px;color:#ffe066;text-shadow:4px 4px #b8860b;margin-bottom:12px;}
#overlay p{font-size:14px;color:#ccc;margin:5px 0;line-height:2;}
#overlay .final{font-size:22px;color:#7ef;margin:16px 0 4px;}
.btn{margin-top:14px;padding:14px 32px;font-family:'Press Start 2P',monospace;font-size:16px;background:#ffe066;color:#222;border:3px solid #b8860b;cursor:pointer;transition:transform 0.1s;}
.btn:hover{transform:scale(1.06);background:#fff;}
.btn-sm{margin-top:8px;padding:10px 22px;font-family:'Press Start 2P',monospace;font-size:12px;background:#333;color:#aaa;border:2px solid #555;cursor:pointer;}
.btn-sm:hover{background:#444;color:#fff;}
/* 스테이지 선택 */
.stage-grid{display:flex;gap:16px;margin:20px 0;flex-wrap:wrap;justify-content:center;}
.stage-card{width:140px;height:160px;border:3px solid #555;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-family:'Press Start 2P',monospace;transition:transform 0.1s;}
.stage-card.unlocked{border-color:#ffe066;background:rgba(40,30,0,0.8);}
.stage-card.unlocked:hover{transform:scale(1.06);border-color:#fff;}
.stage-card.locked{border-color:#333;background:rgba(10,10,10,0.8);cursor:not-allowed;}
.stage-card .s-num{font-size:16px;color:#ffe066;margin-bottom:6px;}
.stage-card .s-name{font-size:11px;color:#ccc;text-align:center;line-height:1.6;}
.stage-card .s-range{font-size:10px;color:#888;margin-top:4px;}
.stage-card .lock-icon{font-size:32px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.stage-card.locked .s-num,.stage-card.locked .s-name,.stage-card.locked .s-range{opacity:0.2;}
/* 캐릭터 선택 */
.char-grid{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;justify-content:center;}
.char-card{width:150px;height:190px;border:3px solid #555;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-family:'Press Start 2P',monospace;transition:transform 0.1s;padding:8px;}
.char-card.unlocked{border-color:#888;background:rgba(20,20,30,0.9);}
.char-card.selected{border-color:#ffe066;background:rgba(40,35,5,0.9);}
.char-card.unlocked:hover{transform:scale(1.04);border-color:#aaa;}
.char-card.locked{border-color:#222;background:rgba(5,5,10,0.9);cursor:not-allowed;}
.char-card canvas{image-rendering:pixelated;margin-bottom:6px;}
.char-card .c-name{font-size:13px;color:#ffe066;margin-bottom:4px;text-align:center;}
.char-card .c-desc{font-size:10px;color:#aaa;text-align:center;line-height:1.7;}
.char-card .lock-icon{font-size:36px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="ending-canvas"></canvas>
<div id="ui">
  <div id="hud">
    <div id="hud-h">높이: 0m</div>
    <div id="hud-b" style="color:#ffe066">최고: 0m</div>
    <div id="hud-rev" style="color:#ff6666;display:none">🧟 부활 1회</div>
  </div>
  <div id="zone-display">🪨 지하 깊은 곳</div>
  <div id="zone-announce"></div>
  <div id="char-badge"></div>
  <div id="controls">← → 이동 &nbsp;|&nbsp; ↑ / Space 점프 &nbsp;|&nbsp; ESC 메뉴</div>
</div>
<div id="overlay"></div>

<script>
// ══════════════════════════════════════════════════════
//  캔버스
// ══════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const eCanvas=document.getElementById('ending-canvas');
const ectx=eCanvas.getContext('2d');
const GAME_W=900,GAME_H=1200;
let W=canvas.width=eCanvas.width=GAME_W;
let H=canvas.height=eCanvas.height=GAME_H;
let canvasScale=1,canvasOffX=0,canvasOffY=0;
function fitCanvas(){
  const ww=window.innerWidth,wh=window.innerHeight;
  const scale=Math.min(ww/GAME_W,wh/GAME_H);
  canvasScale=scale;
  const cw=GAME_W*scale,ch=GAME_H*scale;
  canvasOffX=(ww-cw)/2;canvasOffY=(wh-ch)/2;
  canvas.style.width=eCanvas.style.width=cw+'px';
  canvas.style.height=eCanvas.style.height=ch+'px';
  canvas.style.marginLeft=eCanvas.style.marginLeft=canvasOffX+'px';
  canvas.style.marginTop=eCanvas.style.marginTop=canvasOffY+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
// 스크린 좌표 → 게임 좌표 변환
function screenToGame(sx,sy){return{x:(sx-canvasOffX)/canvasScale,y:(sy-canvasOffY)/canvasScale};}

// ══════════════════════════════════════════════════════
//  세이브 데이터
// ══════════════════════════════════════════════════════
// 버전 리셋
if(localStorage.getItem('sc_ver')!=='v10'){localStorage.removeItem('sc_chars');localStorage.removeItem('sc_stages');localStorage.removeItem('sc_skins');localStorage.setItem('sc_ver','v10');}
// 테스트용: 전체 해금 (비활성화)
// localStorage.setItem('sc_chars',JSON.stringify(["human","mochi","cockroach","ice","rabbit","protein_stick","astronaut","illuminati","skeleton","fish","storm","zombie"]));
// localStorage.setItem('sc_stages',JSON.stringify([1,2,3]));
// localStorage.setItem('sc_skins',JSON.stringify(["cockroach_crown","rabbit_frozen","rabbit_muscle","protein_shake","fish_tuna","human_thin"]));
const SAVE={
  get stagesCleared(){ try{return JSON.parse(localStorage.getItem('sc_stages')||'[]');}catch{return[];} },
  set stagesCleared(v){ localStorage.setItem('sc_stages',JSON.stringify(v)); SAVE.syncPush&&SAVE.syncPush(); },
  get charsUnlocked(){ try{return JSON.parse(localStorage.getItem('sc_chars')||'["human"]');}catch{return['human'];} },
  set charsUnlocked(v){ localStorage.setItem('sc_chars',JSON.stringify(v)); SAVE.syncPush&&SAVE.syncPush(); },
  get skinsUnlocked(){ try{return JSON.parse(localStorage.getItem('sc_skins')||'[]');}catch{return[];} },
  set skinsUnlocked(v){ localStorage.setItem('sc_skins',JSON.stringify(v)); SAVE.syncPush&&SAVE.syncPush(); },
  clearStage(n){ const a=this.stagesCleared; if(!a.includes(n)){a.push(n);this.stagesCleared=a;} },
  isStageCleared(n){ return this.stagesCleared.includes(n); },
  unlockChar(id){ const a=this.charsUnlocked; if(!a.includes(id)){a.push(id);this.charsUnlocked=a;} },
  hasChar(id){ return this.charsUnlocked.includes(id); },
  unlockSkin(id){ const a=this.skinsUnlocked; if(!a.includes(id)){a.push(id);this.skinsUnlocked=a;} },
  hasSkin(id){ return this.skinsUnlocked.includes(id); },
  // ─── 계정/동기화 ──────────────────────────────────
  get account(){ try{return JSON.parse(localStorage.getItem('sc_account')||'null');}catch{return null;} },
  set account(v){ if(v)localStorage.setItem('sc_account',JSON.stringify(v)); else localStorage.removeItem('sc_account'); },
  isLoggedIn(){ const a=this.account; return !!(a&&a.token); },
  logout(){ this.account=null; },
  getUnlocksSnapshot(){ return {charsUnlocked:this.charsUnlocked, skinsUnlocked:this.skinsUnlocked, stagesCleared:this.stagesCleared}; },
  applyServerUnlocks(u){
    if(!u)return;
    localStorage.setItem('sc_chars',JSON.stringify(u.charsUnlocked||['human']));
    localStorage.setItem('sc_skins',JSON.stringify(u.skinsUnlocked||[]));
    localStorage.setItem('sc_stages',JSON.stringify(u.stagesCleared||[]));
    if(typeof refreshAccountUI==='function')refreshAccountUI();
  },
  _syncTimer:null,
  syncPush(){
    if(!this.isLoggedIn())return;
    if(this._syncTimer)return;
    this._syncTimer=setTimeout(()=>{
      this._syncTimer=null;
      this._flushSync();
    },300);
  },
  _flushSync(){
    if(!this.isLoggedIn())return;
    const payload=JSON.stringify({t:'save_sync', token:this.account.token, unlocks:this.getUnlocksSnapshot()});
    const trySend=()=>{try{authWs.send(payload);}catch(e){}};
    if(typeof authWs!=='undefined'&&authWs&&authWs.readyState===1){
      trySend();
    }else{
      // authWs 끊김 → 재연결 후 전송
      if(typeof openAuthWs==='function')openAuthWs(trySend);
    }
  },
};
const SKINS={
  cockroach:[{id:'default',name:'기본',emoji:'🪳'},{id:'cockroach_crown',name:'왕관',emoji:'👑'}],
  rabbit:[{id:'default',name:'기본',emoji:'🐰'},{id:'rabbit_frozen',name:'얼어붙은',emoji:'🧊'},{id:'rabbit_muscle',name:'근육질',emoji:'💪'}],
  protein_stick:[{id:'default',name:'기본',emoji:'🥢'},{id:'protein_shake',name:'단백질 쉐이크',emoji:'🥤'}],
  fish:[{id:'default',name:'기본',emoji:'🐟'},{id:'fish_tuna',name:'냉동참치',emoji:'🐡'}],
  human:[{id:'default',name:'기본',emoji:'🧑'},{id:'human_thin',name:'삐쩍 마른',emoji:'🦴'}],
};
let selectedSkin='default';

// ══════════════════════════════════════════════════════
//  계정/로그인 시스템
// ══════════════════════════════════════════════════════
const AUTH_WS_URL='wss://skyclimber.duckdns.org';
let authWs=null;
let _authPending=null; // {kind:'login'|'register', onOk, onErr}

function openAuthWs(onOpen,onErr){
  if(authWs&&(authWs.readyState===0||authWs.readyState===1)){
    if(authWs.readyState===1){onOpen&&onOpen();}
    else authWs.addEventListener('open',()=>onOpen&&onOpen(),{once:true});
    return;
  }
  try{
    authWs=new WebSocket(AUTH_WS_URL);
  }catch(e){onErr&&onErr('연결 실패');return;}
  authWs.onopen=()=>onOpen&&onOpen();
  authWs.onerror=()=>{if(onErr)onErr('서버 연결 실패');};
  authWs.onclose=()=>{authWs=null;};
  authWs.onmessage=e=>{try{handleAuthMessage(JSON.parse(e.data));}catch(err){}};
}

function handleAuthMessage(msg){
  if(msg.t==='auth_ok'){
    SAVE.account={user:msg.user,token:msg.token};
    SAVE.applyServerUnlocks(msg.unlocks);
    hideLoginModal();
    showMainMenu();
    if(typeof refreshAccountUI==='function')refreshAccountUI();
    if(_authPending&&_authPending.onOk)_authPending.onOk();
    _authPending=null;
  }else if(msg.t==='auth_err'){
    const codes={bad_user:'아이디 형식이 올바르지 않습니다 (2~16자)',bad_pw:'비밀번호는 4자 이상이어야 합니다',exists:'이미 존재하는 아이디입니다',invalid:'아이디 또는 비밀번호가 틀렸습니다',rate_limit:'잠시 후 다시 시도해주세요'};
    const text=codes[msg.code]||'오류가 발생했습니다';
    const errEl=document.getElementById('login-err');
    if(errEl){errEl.textContent=text;errEl.style.display='block';}
    if(_authPending&&_authPending.onErr)_authPending.onErr(text);
    _authPending=null;
  }else if(msg.t==='save_ok'){
    SAVE.applyServerUnlocks(msg.unlocks);
  }else if(msg.t==='save_err'){
    // 토큰 만료 → 로그아웃 처리
    SAVE.logout();
    if(typeof refreshAccountUI==='function')refreshAccountUI();
  }
}

function doAuth(kind,user,pw){
  _authPending={kind};
  const payload={t:kind==='register'?'auth_register':'auth_login',user,pw};
  openAuthWs(()=>{
    try{authWs.send(JSON.stringify(payload));}
    catch(e){const el=document.getElementById('login-err');if(el){el.textContent='전송 실패';el.style.display='block';}}
  },(errText)=>{
    const el=document.getElementById('login-err');
    if(el){el.textContent=errText||'서버 연결 실패';el.style.display='block';}
  });
}

let _loginAnimOn=false;
function showLoginModal(initialMode){
  let el=document.getElementById('login-modal');
  if(!el){
    el=document.createElement('div');
    el.id='login-modal';
    el.style.cssText='position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:200;font-family:"Press Start 2P",monospace;overflow:hidden;';
    el.innerHTML=`
      <canvas id="login-bg" style="position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;"></canvas>
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0;padding:16px;max-height:100vh;overflow-y:auto;">
        <!-- 게임 타이틀 -->
        <div style="text-align:center;margin-bottom:6px;">
          <div style="font-size:clamp(10px,3vw,14px);color:#7be0ff;letter-spacing:6px;text-shadow:0 0 12px rgba(100,200,255,0.6);margin-bottom:6px;">★  ★  ★</div>
          <h1 id="login-title" style="font-size:clamp(32px,9vw,56px);color:#ffe066;text-shadow:0 0 20px rgba(255,224,102,0.5),0 4px 0 #b8860b,0 5px 0 #8a6508,0 6px 8px rgba(0,0,0,0.8);margin:0;letter-spacing:6px;line-height:1;">SKY</h1>
          <h1 style="font-size:clamp(22px,6vw,38px);color:#ff8844;text-shadow:0 0 16px rgba(255,136,68,0.4),0 3px 0 #aa4400,0 4px 6px rgba(0,0,0,0.8);margin:2px 0 0;letter-spacing:10px;line-height:1;">CLIMBER</h1>
          <div style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;">
            <div style="width:40px;height:2px;background:linear-gradient(to right,transparent,#ffe066);"></div>
            <p style="font-size:clamp(7px,2vw,9px);color:#aad4ff;letter-spacing:3px;margin:0;text-shadow:0 0 8px rgba(120,180,255,0.5);">REACH THE STARS</p>
            <div style="width:40px;height:2px;background:linear-gradient(to left,transparent,#ffe066);"></div>
          </div>
        </div>
        <!-- 게임 프리뷰 -->
        <canvas id="login-preview" width="320" height="140" style="image-rendering:pixelated;border:3px solid rgba(255,224,102,0.4);border-radius:2px;background:#06061a;width:320px;height:140px;box-shadow:0 0 20px rgba(255,224,102,0.1),inset 0 0 30px rgba(0,0,0,0.5);margin:10px 0;"></canvas>
        <!-- 로그인 폼 -->
        <div style="background:rgba(10,10,30,0.85);border:3px solid rgba(255,224,102,0.35);border-radius:3px;padding:16px 20px 12px;display:flex;flex-direction:column;gap:9px;min-width:300px;max-width:340px;box-shadow:0 0 30px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,224,102,0.1);backdrop-filter:blur(4px);">
          <div style="font-size:9px;color:#ffe066;text-align:center;letter-spacing:2px;text-shadow:0 0 8px rgba(255,224,102,0.4);margin-bottom:2px;">▸ PRESS START ◂</div>
          <div style="position:relative;">
            <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10px;color:#556;pointer-events:none;">👤</div>
            <input id="login-user" placeholder="PILOT ID" maxlength="16" autocomplete="off" style="padding:10px 10px 10px 32px;width:100%;background:rgba(8,8,20,0.9);border:2px solid #334;color:#ddeeff;font-family:'Press Start 2P',monospace;font-size:10px;outline:none;letter-spacing:1px;border-radius:2px;transition:border-color 0.2s;" onfocus="this.style.borderColor='#ffe066'" onblur="this.style.borderColor='#334'">
          </div>
          <div style="position:relative;">
            <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:10px;color:#556;pointer-events:none;">🔑</div>
            <input id="login-pw" type="password" placeholder="ACCESS CODE" maxlength="64" style="padding:10px 10px 10px 32px;width:100%;background:rgba(8,8,20,0.9);border:2px solid #334;color:#ddeeff;font-family:'Press Start 2P',monospace;font-size:10px;outline:none;letter-spacing:1px;border-radius:2px;transition:border-color 0.2s;" onfocus="this.style.borderColor='#ffe066'" onblur="this.style.borderColor='#334'">
          </div>
          <div id="login-err" style="display:none;color:#ff6666;font-size:8px;text-align:center;text-shadow:0 0 6px rgba(255,80,80,0.3);line-height:1.6;padding:2px 0;"></div>
          <div style="display:flex;gap:8px;margin-top:2px;">
            <button class="btn" id="login-btn-login" style="flex:1;margin:0;padding:11px 6px;font-size:11px;letter-spacing:1px;background:linear-gradient(180deg,#ffe066,#ddaa22);border:2px solid #b8860b;color:#1a1000;border-radius:2px;box-shadow:0 2px 8px rgba(255,224,102,0.3);">LOGIN</button>
            <button class="btn" id="login-btn-register" style="flex:1;margin:0;padding:11px 6px;font-size:11px;letter-spacing:1px;background:linear-gradient(180deg,#66ddaa,#33aa66);border:2px solid #228855;color:#002a10;border-radius:2px;box-shadow:0 2px 8px rgba(100,220,150,0.2);">JOIN</button>
          </div>
          <button id="login-btn-guest" style="background:none;border:1px solid transparent;color:#667;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;padding:6px 4px 2px;letter-spacing:2px;transition:all 0.2s;border-radius:2px;">⟫ GUEST PLAY ⟪</button>
        </div>
        <p style="font-size:7px;color:#334;letter-spacing:2px;margin:8px 0 0;text-align:center;">© 2026 SKYCLIMBER</p>
      </div>
    `;
    document.body.appendChild(el);
    const uEl=el.querySelector('#login-user'),pEl=el.querySelector('#login-pw');
    el.querySelector('#login-btn-login').onclick=()=>{
      const u=uEl.value.trim(),p=pEl.value;
      if(!u||!p){const er=document.getElementById('login-err');er.textContent='ID/PW를 입력하세요';er.style.display='block';return;}
      doAuth('login',u,p);
    };
    el.querySelector('#login-btn-register').onclick=()=>{
      const u=uEl.value.trim(),p=pEl.value;
      if(!u||!p){const er=document.getElementById('login-err');er.textContent='ID/PW를 입력하세요';er.style.display='block';return;}
      doAuth('register',u,p);
    };
    el.querySelector('#login-btn-guest').onclick=()=>{hideLoginModal();showMainMenu();};
    el.querySelector('#login-btn-guest').onmouseover=function(){this.style.color='#ffe066';this.style.borderColor='rgba(255,224,102,0.3)';};
    el.querySelector('#login-btn-guest').onmouseout=function(){this.style.color='#667';this.style.borderColor='transparent';};
    pEl.addEventListener('keydown',ev=>{if(ev.key==='Enter')el.querySelector('#login-btn-login').click();});
    uEl.addEventListener('keydown',ev=>{if(ev.key==='Enter')pEl.focus();});
  }
  const er=el.querySelector('#login-err');er.style.display='none';er.textContent='';
  el.style.display='flex';
  _startLoginAnim();
  setTimeout(()=>el.querySelector('#login-user').focus(),30);
}
function hideLoginModal(){
  const el=document.getElementById('login-modal');
  if(el)el.style.display='none';
  _loginAnimOn=false;
}
function _startLoginAnim(){
  if(_loginAnimOn)return;
  const bg=document.getElementById('login-bg');
  const pv=document.getElementById('login-preview');
  if(!bg||!pv)return;
  _loginAnimOn=true;
  const bgCtx=bg.getContext('2d');
  const pctx=pv.getContext('2d');
  function resize(){bg.width=bg.clientWidth;bg.height=bg.clientHeight;}
  resize();
  if(!_startLoginAnim._bound){window.addEventListener('resize',()=>{if(_loginAnimOn)resize();});_startLoginAnim._bound=true;}
  // 배경 별 생성
  const stars=[];
  for(let i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),s:Math.random()<0.15?2:1,tw:Math.random()*7,sp:0.3+Math.random()*1.8,vy:0.02+Math.random()*0.12,col:Math.random()<0.1?1:Math.random()<0.05?2:0});
  // 먼 별 (매우 작고 느리게)
  const farStars=[];
  for(let i=0;i<80;i++)farStars.push({x:Math.random(),y:Math.random(),tw:Math.random()*10,sp:0.1+Math.random()*0.5});
  // 유성 타이머
  let meteorTimer=0;
  const meteors=[];
  let t=0;
  // 타이틀 글로우 애니메이션
  const titleEl=document.getElementById('login-title');
  function frame(){
    if(!_loginAnimOn)return;
    t++;
    const bw=bg.width,bh=bg.height;

    // ─── 깊은 우주 배경 ───
    const g=bgCtx.createRadialGradient(bw*0.3,bh*0.2,0,bw*0.5,bh*0.5,bw*0.9);
    g.addColorStop(0,'#0c0828');g.addColorStop(0.3,'#080620');g.addColorStop(0.6,'#050412');g.addColorStop(1,'#010108');
    bgCtx.fillStyle=g;bgCtx.fillRect(0,0,bw,bh);

    // ─── 성운 (nebula glow) ───
    const nebAlpha=0.04+Math.sin(t*0.008)*0.02;
    bgCtx.save();bgCtx.globalAlpha=nebAlpha;
    const n1=bgCtx.createRadialGradient(bw*0.2,bh*0.3,0,bw*0.2,bh*0.3,bw*0.35);
    n1.addColorStop(0,'#4a20aa');n1.addColorStop(0.5,'#2a1080');n1.addColorStop(1,'transparent');
    bgCtx.fillStyle=n1;bgCtx.fillRect(0,0,bw,bh);
    const n2=bgCtx.createRadialGradient(bw*0.75,bh*0.6,0,bw*0.75,bh*0.6,bw*0.3);
    n2.addColorStop(0,'#20408a');n2.addColorStop(0.5,'#102060');n2.addColorStop(1,'transparent');
    bgCtx.fillStyle=n2;bgCtx.fillRect(0,0,bw,bh);
    bgCtx.restore();

    // ─── 먼 별들 (아주 작고 은은) ───
    for(const s of farStars){
      const br=0.15+Math.sin(t*0.02*s.sp+s.tw)*0.15;
      bgCtx.fillStyle=`rgba(180,200,255,${br})`;
      bgCtx.fillRect(Math.floor(s.x*bw),Math.floor(s.y*bh),1,1);
    }

    // ─── 큰 행성 1: 가스 자이언트 (오른쪽 아래, 반만 보이는) ───
    const p1x=bw*0.88,p1y=bh*0.82,p1r=Math.min(bw,bh)*0.22;
    bgCtx.save();
    // 행성 몸체
    const pg=bgCtx.createRadialGradient(p1x-p1r*0.3,p1y-p1r*0.3,p1r*0.1,p1x,p1y,p1r);
    pg.addColorStop(0,'#6a4aaa');pg.addColorStop(0.4,'#4a2a7a');pg.addColorStop(0.7,'#2a1a5a');pg.addColorStop(1,'#0a0a2a');
    bgCtx.fillStyle=pg;bgCtx.beginPath();bgCtx.arc(p1x,p1y,p1r,0,Math.PI*2);bgCtx.fill();
    // 행성 고리 밴드
    bgCtx.globalAlpha=0.25;
    bgCtx.fillStyle='#8a6acc';bgCtx.fillRect(p1x-p1r,p1y-p1r*0.08,p1r*2,p1r*0.04);
    bgCtx.fillStyle='#aa8aee';bgCtx.fillRect(p1x-p1r,p1y+p1r*0.15,p1r*2,p1r*0.03);
    bgCtx.fillStyle='#6a4a99';bgCtx.fillRect(p1x-p1r,p1y+p1r*0.35,p1r*2,p1r*0.05);
    bgCtx.globalAlpha=1;
    // 행성 대기 글로우
    bgCtx.globalAlpha=0.15;
    const atm=bgCtx.createRadialGradient(p1x,p1y,p1r*0.9,p1x,p1y,p1r*1.15);
    atm.addColorStop(0,'transparent');atm.addColorStop(0.5,'#6a5aff');atm.addColorStop(1,'transparent');
    bgCtx.fillStyle=atm;bgCtx.fillRect(p1x-p1r*1.3,p1y-p1r*1.3,p1r*2.6,p1r*2.6);
    bgCtx.restore();

    // ─── 링 행성 (왼쪽 상단, 토성 스타일) ───
    const p2x=bw*0.12,p2y=bh*0.15,p2r=Math.min(bw,bh)*0.08;
    bgCtx.save();
    // 행성
    const pg2=bgCtx.createRadialGradient(p2x-p2r*0.3,p2y-p2r*0.3,0,p2x,p2y,p2r);
    pg2.addColorStop(0,'#ddaa55');pg2.addColorStop(0.5,'#bb7733');pg2.addColorStop(1,'#664422');
    bgCtx.fillStyle=pg2;bgCtx.beginPath();bgCtx.arc(p2x,p2y,p2r,0,Math.PI*2);bgCtx.fill();
    // 밴드
    bgCtx.globalAlpha=0.3;
    bgCtx.fillStyle='#cc9944';bgCtx.fillRect(p2x-p2r,p2y-p2r*0.1,p2r*2,p2r*0.08);
    bgCtx.fillStyle='#aa7733';bgCtx.fillRect(p2x-p2r,p2y+p2r*0.2,p2r*2,p2r*0.06);
    bgCtx.globalAlpha=1;
    // 링
    bgCtx.strokeStyle='rgba(220,180,120,0.35)';bgCtx.lineWidth=2;
    bgCtx.beginPath();bgCtx.ellipse(p2x,p2y,p2r*1.9,p2r*0.35,0.2,0,Math.PI*2);bgCtx.stroke();
    bgCtx.strokeStyle='rgba(200,160,100,0.2)';bgCtx.lineWidth=3;
    bgCtx.beginPath();bgCtx.ellipse(p2x,p2y,p2r*2.3,p2r*0.45,0.2,0,Math.PI*2);bgCtx.stroke();
    bgCtx.restore();

    // ─── 작은 행성 (빨간 화성풍, 오른쪽 상단) ───
    const p3x=bw*0.78,p3y=bh*0.1,p3r=Math.min(bw,bh)*0.035;
    bgCtx.save();
    const pg3=bgCtx.createRadialGradient(p3x-p3r*0.3,p3y-p3r*0.3,0,p3x,p3y,p3r);
    pg3.addColorStop(0,'#dd6644');pg3.addColorStop(0.6,'#aa4422');pg3.addColorStop(1,'#662211');
    bgCtx.fillStyle=pg3;bgCtx.beginPath();bgCtx.arc(p3x,p3y,p3r,0,Math.PI*2);bgCtx.fill();
    bgCtx.restore();

    // ─── 파란 지구풍 행성 (좌하단, 작게) ───
    const p4x=bw*0.08,p4y=bh*0.72,p4r=Math.min(bw,bh)*0.045;
    bgCtx.save();
    const pg4=bgCtx.createRadialGradient(p4x-p4r*0.2,p4y-p4r*0.2,0,p4x,p4y,p4r);
    pg4.addColorStop(0,'#55aadd');pg4.addColorStop(0.5,'#3388bb');pg4.addColorStop(1,'#115577');
    bgCtx.fillStyle=pg4;bgCtx.beginPath();bgCtx.arc(p4x,p4y,p4r,0,Math.PI*2);bgCtx.fill();
    // 대륙 표현
    bgCtx.globalAlpha=0.3;bgCtx.fillStyle='#44bb66';
    bgCtx.beginPath();bgCtx.arc(p4x-p4r*0.2,p4y-p4r*0.1,p4r*0.35,0,Math.PI*2);bgCtx.fill();
    bgCtx.beginPath();bgCtx.arc(p4x+p4r*0.3,p4y+p4r*0.2,p4r*0.25,0,Math.PI*2);bgCtx.fill();
    bgCtx.restore();

    // ─── 별들 (반짝임 + 스크롤) ───
    for(const s of stars){
      s.y+=s.vy/bh;if(s.y>1.02){s.y=-0.02;s.x=Math.random();}
      const br=0.3+Math.sin(t*0.04*s.sp+s.tw)*0.6;
      const a=Math.max(0.08,br);
      if(s.col===1){bgCtx.fillStyle=`rgba(255,200,150,${a})`;}
      else if(s.col===2){bgCtx.fillStyle=`rgba(150,200,255,${a})`;}
      else{bgCtx.fillStyle=`rgba(255,255,255,${a})`;}
      bgCtx.fillRect(Math.floor(s.x*bw),Math.floor(s.y*bh),s.s,s.s);
    }

    // ─── 유성 ───
    meteorTimer++;
    if(meteorTimer>180+Math.random()*200){
      meteorTimer=0;
      meteors.push({x:Math.random()*bw*0.6,y:-10,vx:3+Math.random()*4,vy:2+Math.random()*3,life:40+Math.random()*30});
    }
    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];m.x+=m.vx;m.y+=m.vy;m.life--;
      if(m.life<=0){meteors.splice(i,1);continue;}
      const a=Math.min(1,m.life/15);
      bgCtx.fillStyle=`rgba(255,255,255,${a})`;bgCtx.fillRect(m.x,m.y,2,2);
      bgCtx.fillStyle=`rgba(255,240,180,${a*0.6})`;bgCtx.fillRect(m.x-m.vx,m.y-m.vy,2,1);
      bgCtx.fillStyle=`rgba(255,200,100,${a*0.3})`;bgCtx.fillRect(m.x-m.vx*2,m.y-m.vy*2,3,1);
      bgCtx.fillStyle=`rgba(255,180,80,${a*0.15})`;bgCtx.fillRect(m.x-m.vx*3.5,m.y-m.vy*3.5,4,1);
    }

    // ─── 타이틀 글로우 펄스 ───
    if(titleEl){
      const glow=12+Math.sin(t*0.04)*8;
      titleEl.style.textShadow=`0 0 ${glow}px rgba(255,224,102,0.5),0 4px 0 #b8860b,0 5px 0 #8a6508,0 6px 8px rgba(0,0,0,0.8)`;
    }

    // ─── 미니 게임 프리뷰 캔버스 ───
    pctx.fillStyle='#06061a';pctx.fillRect(0,0,320,140);
    // 배경 별
    for(let i=0;i<35;i++){
      const x=(i*41+Math.floor(t*0.5))%320;
      const y=(i*19)%110;
      const sb=0.3+Math.sin(t*0.05+i)*0.4;
      pctx.fillStyle=`rgba(255,255,255,${sb})`;
      pctx.fillRect(x,y,1,1);
    }
    // 미니 행성
    pctx.fillStyle='#3a2a6a';pctx.beginPath();pctx.arc(280,25,16,0,Math.PI*2);pctx.fill();
    pctx.fillStyle='#5a4a9a';pctx.beginPath();pctx.arc(278,23,13,0,Math.PI*2);pctx.fill();
    pctx.strokeStyle='rgba(140,120,200,0.3)';pctx.lineWidth=1;
    pctx.beginPath();pctx.ellipse(280,25,24,6,0.2,0,Math.PI*2);pctx.stroke();
    // 작은 파란 행성
    pctx.fillStyle='#4488cc';pctx.beginPath();pctx.arc(45,20,8,0,Math.PI*2);pctx.fill();
    pctx.fillStyle='#55aadd';pctx.beginPath();pctx.arc(43,18,6,0,Math.PI*2);pctx.fill();
    // 픽셀 발판들 (우주 스타일)
    function plat(x,y,w){
      pctx.fillStyle='#556688';pctx.fillRect(x,y,w,2);
      pctx.fillStyle='#334466';pctx.fillRect(x,y+2,w,2);
      pctx.fillStyle='#7799bb';pctx.fillRect(x+1,y,w-2,1);
      // 양 끝 발광
      pctx.fillStyle='rgba(100,200,255,0.4)';pctx.fillRect(x,y-1,2,1);pctx.fillRect(x+w-2,y-1,2,1);
    }
    plat(25,110,55);plat(105,88,52);plat(195,66,55);plat(265,48,40);
    // 점프 궤적 (빛나는 점선)
    pctx.fillStyle='rgba(255,224,102,0.3)';
    for(let i=0;i<6;i++){pctx.fillRect(88+i*7,106-i*3,2,2);}
    for(let i=0;i<6;i++){pctx.fillRect(168+i*7,84-i*3,2,2);}
    for(let i=0;i<5;i++){pctx.fillRect(255+i*5,62-i*3,2,2);}
    // 캐릭터 (발판 위 우주비행사)
    const cx2=275,bob2=Math.floor(Math.sin(t*0.1)*1.5);
    const cy2=34+bob2;
    // 헬멧
    pctx.fillStyle='#eee';pctx.fillRect(cx2,cy2,8,7);
    pctx.fillStyle='#ddd';pctx.fillRect(cx2+1,cy2,6,1);
    // 바이저
    pctx.fillStyle='#2244aa';pctx.fillRect(cx2+1,cy2+2,6,3);
    pctx.fillStyle='#55aaff';pctx.fillRect(cx2+1,cy2+2,6,1);
    pctx.fillStyle='#fff';pctx.fillRect(cx2+5,cy2+3,1,1);
    // 몸통
    pctx.fillStyle='#ddd';pctx.fillRect(cx2+1,cy2+7,6,4);
    pctx.fillStyle='#ffe066';pctx.fillRect(cx2+3,cy2+8,2,1);
    // 백팩
    pctx.fillStyle='#777';pctx.fillRect(cx2,cy2+8,1,3);pctx.fillRect(cx2+7,cy2+8,1,3);
    // 다리
    pctx.fillStyle='#bbb';pctx.fillRect(cx2+1,cy2+11,2,2);pctx.fillRect(cx2+5,cy2+11,2,2);
    // 제트팩 불꽃 (반짝)
    if(Math.floor(t/8)%2===0){
      pctx.fillStyle='#ff8844';pctx.fillRect(cx2,cy2+11,1,2);pctx.fillRect(cx2+7,cy2+11,1,2);
      pctx.fillStyle='#ffcc44';pctx.fillRect(cx2,cy2+13,1,1);pctx.fillRect(cx2+7,cy2+13,1,1);
    }
    // 위쪽 화살표 (올라가는 느낌)
    if(Math.floor(t/12)%2===0){
      pctx.fillStyle='#ffe066';
      pctx.fillRect(cx2+3,cy2-6,2,4);
      pctx.fillRect(cx2+2,cy2-5,4,1);
      pctx.fillRect(cx2+1,cy2-4,6,1);
    }
    // 높이 텍스트
    const hVal=Math.floor(t*0.5)%9999;
    pctx.fillStyle='rgba(255,255,255,0.6)';pctx.font='7px "Press Start 2P"';
    pctx.fillText(hVal+'m',8,130);
    // "점프해서 올라가자" 느낌 화살표
    pctx.fillStyle='rgba(255,224,102,0.15)';
    for(let i=0;i<4;i++){
      const ay=125-i*18-((t*0.5)%18);
      if(ay>5&&ay<130){pctx.fillRect(155,ay,3,6);pctx.fillRect(153,ay+2,7,2);}
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function refreshAccountUI(){
  const el=document.getElementById('account-bar');
  if(!el)return;
  if(SAVE.isLoggedIn()){
    const span=el.querySelector('.acct-name');
    if(span)span.textContent=SAVE.account.user;
    el.querySelector('.acct-logged-in').style.display='inline-flex';
    el.querySelector('.acct-logged-out').style.display='none';
  }else{
    el.querySelector('.acct-logged-in').style.display='none';
    el.querySelector('.acct-logged-out').style.display='inline-flex';
  }
}

function doLogout(){
  SAVE.logout();
  localStorage.setItem('sc_chars',JSON.stringify(['human']));
  localStorage.setItem('sc_skins',JSON.stringify([]));
  localStorage.setItem('sc_stages',JSON.stringify([]));
  if(authWs){try{authWs.close();}catch(e){}authWs=null;}
  refreshAccountUI();
}

// 페이지 로드 시 저장된 토큰으로 조용히 동기화 시도
function tryResumeSession(){
  if(!SAVE.isLoggedIn())return;
  openAuthWs(()=>{
    try{authWs.send(JSON.stringify({t:'save_sync',token:SAVE.account.token,unlocks:{charsUnlocked:[],skinsUnlocked:[],stagesCleared:[]}}));}catch(e){}
  });
}

// 페이지 이탈 시 대기 중인 sync를 즉시 전송 (해금 직후 탭 닫아도 저장되도록)
window.addEventListener('beforeunload',()=>{
  if(SAVE._syncTimer){clearTimeout(SAVE._syncTimer);SAVE._syncTimer=null;}
  SAVE._flushSync();
});

// ══════════════════════════════════════════════════════
//  사운드 시스템 (Web Audio API)
// ══════════════════════════════════════════════════════
const SFX=(()=>{
  let ctx=null,master=null,mVol=1;
  function getCtx(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=mVol;master.connect(ctx.destination);}return ctx;}
  function resumeCtx(){const c=getCtx();if(c.state==='suspended')c.resume();}
  function tone(freq,dur,vol=0.15,type='square'){
    const c=getCtx();const o=c.createOscillator();const g=c.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g);g.connect(master);o.start(c.currentTime);o.stop(c.currentTime+dur);
  }
  function noise(dur,vol=0.1){
    const c=getCtx();const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*vol;
    const s=c.createBufferSource();const g=c.createGain();s.buffer=buf;
    g.gain.value=1;g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    s.connect(g);g.connect(master);s.start();s.stop(c.currentTime+dur);
  }
  let lastSfx={};
  function throttle(id,ms=50){const n=Date.now();if(lastSfx[id]&&n-lastSfx[id]<ms)return false;lastSfx[id]=n;return true;}
  return{
    resume:resumeCtx,
    jump(jumpsLeft,maxJumps){if(!throttle('jump'))return;const pitch=220+(maxJumps-jumpsLeft)*80;tone(pitch,0.12,0.12);tone(pitch*1.5,0.08,0.08);},
    land(){if(!throttle('land',80))return;noise(0.06,0.06);tone(100,0.05,0.06,'sine');},
    crouchCharge(prog){if(!throttle('crch',100))return;tone(150+prog*200,0.08,0.06,'sine');},
    crouchRelease(){if(!throttle('crchR'))return;tone(500,0.15,0.15);tone(700,0.1,0.1);},
    fly(){if(!throttle('fly',150))return;tone(180,0.1,0.05,'sine');tone(220,0.08,0.04,'sine');},
    slide(){if(!throttle('slide',200))return;tone(100,0.15,0.04,'sawtooth');},
    freeze(){if(!throttle('frz'))return;tone(800,0.15,0.1);tone(1200,0.1,0.08);},
    waterStream(){if(!throttle('ws',300))return;noise(0.2,0.08);tone(200,0.15,0.05,'sine');},
    stageClear(){tone(523,0.15,0.2);setTimeout(()=>tone(659,0.15,0.2),120);setTimeout(()=>tone(784,0.2,0.2),240);setTimeout(()=>tone(1047,0.3,0.25),400);},
    death(){tone(300,0.15,0.12);setTimeout(()=>tone(200,0.2,0.1),100);setTimeout(()=>tone(100,0.3,0.08),250);},
    unlock(){tone(440,0.1,0.15);setTimeout(()=>tone(554,0.1,0.15),80);setTimeout(()=>tone(659,0.1,0.15),160);setTimeout(()=>tone(880,0.25,0.2),250);},
    endingStart(){tone(440,0.2,0.1,'sine');setTimeout(()=>tone(660,0.3,0.12,'sine'),150);},
    punchSwing(){if(!throttle('psw'))return;noise(0.08,0.08);tone(300,0.06,0.08,'sawtooth');},
    punchHit(){if(!throttle('phit'))return;noise(0.1,0.15);tone(150,0.08,0.12);tone(80,0.1,0.1);},
    explode(){noise(0.25,0.2);tone(60,0.3,0.15,'sawtooth');tone(40,0.4,0.1,'sine');},
    shardHit(){if(!throttle('shrd'))return;tone(1000,0.1,0.1);tone(600,0.08,0.08);},
    laserHit(){if(!throttle('lsr'))return;tone(1500,0.08,0.08,'sine');tone(800,0.12,0.06,'sine');},
    boneHit(){if(!throttle('bone'))return;tone(400,0.08,0.1);tone(200,0.06,0.08);},
    eyeBeamHit(){if(!throttle('eye'))return;tone(1200,0.1,0.08,'sine');tone(600,0.15,0.06,'sine');},
    countdownTick(sec){const f=sec>0?400+sec*100:800;tone(f,sec>0?0.12:0.25,0.18);if(sec<=0)tone(1200,0.15,0.12);},
    ko(){tone(200,0.15,0.15);setTimeout(()=>tone(300,0.15,0.15),120);setTimeout(()=>tone(500,0.2,0.2),240);setTimeout(()=>tone(800,0.3,0.2),400);},
    fallKO(){tone(400,0.15,0.1);setTimeout(()=>tone(200,0.25,0.08),100);},
    uiClick(){if(!throttle('ui'))return;tone(600,0.05,0.08);},
    uiSelect(){if(!throttle('uiS'))return;tone(500,0.06,0.1);tone(700,0.06,0.08);},
    grabHit(){if(!throttle('grab'))return;tone(250,0.1,0.1);noise(0.08,0.08);},
    bombLaunch(){if(!throttle('bmb'))return;tone(200,0.1,0.1,'sawtooth');tone(120,0.08,0.08);},
    shardLaunch(){if(!throttle('shl'))return;tone(900,0.08,0.1);tone(1200,0.06,0.06);},
    boneLaunch(){if(!throttle('bnl'))return;tone(350,0.08,0.08);noise(0.06,0.06);},
    eyeBeamLaunch(){if(!throttle('ebl'))return;tone(800,0.12,0.1,'sine');tone(1100,0.08,0.06,'sine');},
    laserLaunch(){if(!throttle('lsl'))return;tone(1000,0.1,0.08,'sine');tone(1400,0.06,0.06,'sine');},
    whirlwindLaunch(){if(!throttle('wwl'))return;noise(0.15,0.1);tone(250,0.12,0.1,'sawtooth');tone(180,0.15,0.08,'sine');},
    whirlwindHit(){if(!throttle('wwh'))return;noise(0.1,0.12);tone(300,0.1,0.1);tone(150,0.12,0.08);},
    whirlwindZone(){if(!throttle('wwz',400))return;noise(0.08,0.04);tone(120,0.15,0.05,'sine');tone(160,0.1,0.04,'sine');},
    setVol(v){mVol=v;if(master)master.gain.value=v;},
    getVol(){return mVol;},
  };
})();

// ══════════════════════════════════════════════════════
//  BGM 시스템 (Web Audio API 코드 생성)
// ══════════════════════════════════════════════════════
const BGM=(()=>{
  let ctx=null,current=null,gainNode=null,vol=0.07;
  function getCtx(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();gainNode=ctx.createGain();gainNode.gain.value=vol;gainNode.connect(ctx.destination);}return ctx;}

  // 멜로디 시퀀서: notes=[{f,d,t}], tempo=BPM
  function playLoop(notes,tempo,type='sine'){
    const c=getCtx();
    const beatDur=60/tempo;
    const totalDur=notes[notes.length-1].t*beatDur+notes[notes.length-1].d*beatDur;
    let startTime=c.currentTime+0.05;
    const oscs=[];
    for(const n of notes){
      const o=c.createOscillator();const g=c.createGain();
      o.type=type;o.frequency.value=n.f;
      const t0=startTime+n.t*beatDur;
      const dur=n.d*beatDur;
      g.gain.setValueAtTime(0.001,t0);
      g.gain.linearRampToValueAtTime(0.8,t0+0.02);
      g.gain.setValueAtTime(0.8,t0+dur*0.7);
      g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
      o.connect(g);g.connect(gainNode);
      o.start(t0);o.stop(t0+dur);
      oscs.push(o);
    }
    // 베이스 라인 (한 옥타브 아래)
    for(const n of notes){
      if(n.bass===false)continue;
      if(Math.random()>0.4)continue;
      const o=c.createOscillator();const g=c.createGain();
      o.type='triangle';o.frequency.value=n.f/2;
      const t0=startTime+n.t*beatDur;const dur=n.d*beatDur;
      g.gain.setValueAtTime(0.001,t0);g.gain.linearRampToValueAtTime(0.5,t0+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
      o.connect(g);g.connect(gainNode);o.start(t0);o.stop(t0+dur);
      oscs.push(o);
    }
    return{oscs,endTime:startTime+totalDur};
  }

  // 메인 메뉴 BGM: 잔잔한 멜로디
  const menuNotes=[
    {f:330,d:2,t:0},{f:392,d:2,t:2},{f:440,d:2,t:4},{f:392,d:2,t:6},
    {f:330,d:2,t:8},{f:294,d:2,t:10},{f:262,d:2,t:12},{f:294,d:2,t:14},
    {f:330,d:2,t:16},{f:440,d:2,t:18},{f:392,d:2,t:20},{f:330,d:2,t:22},
    {f:294,d:2,t:24},{f:262,d:2,t:26},{f:294,d:2,t:28},{f:330,d:2,t:30},
  ];
  // 싱글 BGM: 경쾌한 상승감
  const singleNotes=[
    {f:262,d:1,t:0},{f:294,d:1,t:1},{f:330,d:1,t:2},{f:392,d:1,t:3},
    {f:440,d:2,t:4},{f:392,d:1,t:6},{f:330,d:1,t:7},
    {f:349,d:1,t:8},{f:392,d:1,t:9},{f:440,d:1,t:10},{f:494,d:1,t:11},
    {f:523,d:2,t:12},{f:494,d:1,t:14},{f:440,d:1,t:15},
    {f:392,d:1,t:16},{f:440,d:1,t:17},{f:494,d:1,t:18},{f:523,d:1,t:19},
    {f:587,d:2,t:20},{f:523,d:1,t:22},{f:494,d:1,t:23},
    {f:440,d:1,t:24},{f:392,d:1,t:25},{f:330,d:1,t:26},{f:294,d:1,t:27},
    {f:262,d:2,t:28},{f:294,d:1,t:30},{f:330,d:1,t:31},
  ];
  // 배틀 BGM: 긴박한 전투감
  const battleNotes=[
    {f:165,d:0.5,t:0},{f:165,d:0.5,t:0.5},{f:196,d:0.5,t:1},{f:165,d:0.5,t:1.5},
    {f:220,d:1,t:2},{f:196,d:0.5,t:3},{f:165,d:0.5,t:3.5},
    {f:165,d:0.5,t:4},{f:165,d:0.5,t:4.5},{f:247,d:0.5,t:5},{f:220,d:0.5,t:5.5},
    {f:196,d:1,t:6},{f:165,d:0.5,t:7},{f:147,d:0.5,t:7.5},
    {f:165,d:0.5,t:8},{f:196,d:0.5,t:8.5},{f:220,d:0.5,t:9},{f:262,d:0.5,t:9.5},
    {f:247,d:1,t:10},{f:220,d:0.5,t:11},{f:196,d:0.5,t:11.5},
    {f:220,d:0.5,t:12},{f:196,d:0.5,t:12.5},{f:165,d:0.5,t:13},{f:147,d:0.5,t:13.5},
    {f:165,d:1,t:14},{f:147,d:0.5,t:15},{f:165,d:0.5,t:15.5},
  ];

  let loopTimer=null;
  function startLoop(notes,tempo,type){
    stop();
    function doLoop(){
      if(ctx&&ctx.state==='suspended')ctx.resume();
      const r=playLoop(notes,tempo,type);
      current=r;
      const dur=(r.endTime-getCtx().currentTime)*1000;
      loopTimer=setTimeout(doLoop,Math.max(100,dur-50));
    }
    doLoop();
  }
  function stop(){
    if(loopTimer){clearTimeout(loopTimer);loopTimer=null;}
    if(current){current.oscs.forEach(o=>{try{o.stop();}catch(e){}});current=null;}
  }
  return{
    menu(){startLoop(menuNotes,100,'sine');},
    single(){startLoop(singleNotes,140,'square');},
    battle(){startLoop(battleNotes,180,'square');},
    stop,
    setVol(v){vol=v;if(gainNode)gainNode.gain.value=v;},
    getVol(){return vol;},
  };
})();

  storm:{
    id:'storm', name:'폭풍',
    desc:'목성의 대폭풍\n바퀴벌레도 날린다\n1단 점프 (높이!)\n느린 낙하',
    jumpForce:-20, jumpCount:1, speed:5, friction:0.8, slowFall:true,
    bodyColor:(h)=>['#556688','#334466'],
    draw(ctx,sx,sy,f,frame,h,onGround,vy){
      const spin=frame*0.2;
      const cx=sx+11,cy=sy+16;
      // 회오리 몸체: 위→아래 점점 넓어지는 깔때기
      // 5단계 타원으로 회오리 표현
      const layers=[
        {y:-10,rx:4,ry:2,c:'rgba(180,200,230,0.95)'},
        {y:-5,rx:6,ry:2.5,c:'rgba(140,170,210,0.9)'},
        {y:1,rx:8,ry:3,c:'rgba(100,140,190,0.85)'},
        {y:7,rx:10,ry:3.5,c:'rgba(70,110,170,0.8)'},
        {y:13,rx:12,ry:4,c:'rgba(50,80,140,0.75)'},
      ];
      for(let i=0;i<layers.length;i++){
        const l=layers[i];
        const ang=spin+i*0.6;
        ctx.fillStyle=l.c;
        ctx.beginPath();ctx.ellipse(cx+Math.sin(ang)*1.5,cy+l.y,l.rx,l.ry,ang*0.3,0,Math.PI*2);ctx.fill();
        // 각 층 하이라이트
        ctx.fillStyle='rgba(220,235,255,0.3)';
        ctx.beginPath();ctx.ellipse(cx+Math.sin(ang)*1.5-l.rx*0.3,cy+l.y-l.ry*0.2,l.rx*0.4,l.ry*0.5,ang*0.3,0,Math.PI*2);ctx.fill();
      }
      // 회오리 소용돌이 줄무늬
      ctx.strokeStyle='rgba(200,220,250,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let t=0;t<Math.PI*3;t+=0.15){
        const r=3+t*2.5;const a=t+spin*2;
        const px=cx+Math.cos(a)*r*0.5;
        const py=cy-12+t*3;
        if(t===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
        if(py>cy+16)break;
      }
      ctx.stroke();
      // 눈 (회오리 윗부분에)
      const ex=f>0?cx+1:cx-5;
      ctx.fillStyle='#fff';ctx.fillRect(ex,cy-9,3,3);ctx.fillRect(ex+5,cy-9,3,3);
      ctx.fillStyle='#112';ctx.fillRect(ex+1,cy-8,2,2);ctx.fillRect(ex+6,cy-8,2,2);
      // 화난 눈썹
      ctx.fillStyle='rgba(40,60,100,0.9)';
      if(f>0){ctx.fillRect(ex-1,cy-11,4,1.5);ctx.fillRect(ex+5,cy-12,4,1.5);}
      else{ctx.fillRect(ex-1,cy-12,4,1.5);ctx.fillRect(ex+5,cy-11,4,1.5);}
      // 주변 파편 파티클 (빙글빙글 도는 작은 조각들)
      ctx.fillStyle='rgba(160,190,230,0.7)';
      for(let i=0;i<5;i++){
        const a=spin*3+i*Math.PI*2/5;
        const dist=14+Math.sin(a*2)*3;
        const px=cx+Math.cos(a)*dist;
        const py=cy+Math.sin(a)*8+i*2-4;
        ctx.fillRect(px-1,py-1,3,2);
      }
      // 바닥 먼지 구름 (착지 시)
      if(onGround){
        ctx.fillStyle='rgba(180,170,150,0.4)';
        ctx.beginPath();ctx.ellipse(cx,cy+17,14,3,0,0,Math.PI*2);ctx.fill();
      }
    }
  },

      ctx.fillStyle='#2a3a1a';ctx.fillRect(sx+7+wobble,sy+8,8,3);

      // 팔 (한쪽은 늘어진 채)

        ctx.fillStyle='rgba(100,200,50,0.15)';

      }
    }
  }

// ══════════════════════════════════════════════════════
//  플랫폼 생성
// ══════════════════════════════════════════════════════
function generateInitialPlatforms(){
  game.platforms=[{x:0,worldY:0,w:W,h:20,type:'ground',solid:true}];
  // 플레이어 바로 아래에 시작 발판
  const startWY=game.p.worldY+game.p.h;
  game.platforms.push({x:W/2-60,worldY:startWY,w:120,h:14,type:game.stageData.getPlatformType(game.height),solid:true,vanish:false,moving:false,vanished:false,vanishTriggered:false});
  // 위로 발판 생성
  let wy=startWY-100;
  for(let i=0;i<30;i++){pushPlatform(wy);wy-=game.stageData.getPlatformGap(game.height);}
}

function pushPlatform(wy){
  if(game.noMorePlatforms)return;
  const h=game.height;
  const sd=game.stageData;
  const pw=sd.getPlatformWidth(h);
  let type=sd.getPlatformType(h);
  const x=Math.random()*Math.max(10,W-pw);

  let vanish=false, moving=false, moveDir=1, moveRange=0;

  // 2스테이지 특수 발판
  if(game.stage===2){
    if(sd.hasVanishing&&sd.hasVanishing(h)){ vanish=true; type='crumble_moon'; }
    if(sd.hasMoving&&sd.hasMoving(h)&&Math.random()<0.35){ moving=true; moveDir=Math.random()<0.5?1:-1; moveRange=40+Math.random()*80; }
    if(sd.hasMixed&&sd.hasMixed(h)){
      const r=Math.random();
      if(r<0.2){ vanish=true; type='crumble_moon'; }
      if(r>=0.2&&r<0.45){ moving=true; moveDir=Math.random()<0.5?1:-1; moveRange=50+Math.random()*70; }
    }
  }

  // 3스테이지 특수 발판
  let icy=false, blink=false, blinkOffset=0;
  if(game.stage===3){
    if(sd.hasIcy&&sd.hasIcy(h)&&Math.random()<0.3){ icy=true; type='ice_asteroid'; }
    if(sd.hasBlink&&sd.hasBlink(h)){
      const r=Math.random();
      if(r<0.2){ icy=true; type='ice_asteroid'; }
      if(r>=0.2&&r<0.55){ blink=true; blinkOffset=Math.random()*180; type='blink'; }
    }
    if(sd.hasMixedS3&&sd.hasMixedS3(h)){
      const r=Math.random();
      if(r<0.3){ blink=true; blinkOffset=Math.random()*180; type='blink'; }
      else if(r<0.6){ icy=true; type='ice_asteroid'; }
      else if(r<0.8){ moving=true; moveDir=Math.random()<0.5?1:-1; moveRange=50+Math.random()*70; }
    }
  }

  game.platforms.push({x,worldY:wy,w:pw,h:14,type,solid:true,
    vanish,vanishTimer:vanish?1:null,vanishAlpha:1,vanished:false,vanishTriggered:false,
    moving,moveDir,moveRange,moveOriginX:x,moveSpeed:(1+Math.random()*1.5)*(moving?1:0),
    icy,blink,
    blinkOn:blinkOffset<120,
    blinkTimer:blinkOffset<120?blinkOffset:blinkOffset-120,
    blinkOnDur:120,
    blinkOffDur:60+Math.random()*60});
}

function insertMoonLanding(){
  if(game.moonLandingInserted)return;
  game.moonLandingInserted=true;
  const topWY=Math.min(...game.platforms.map(pl=>pl.worldY));
  const moonWY=topWY-350;
  game.moonLandingWY=moonWY;
  game.platforms.push({x:0,worldY:moonWY,w:W,h:30,type:'moon_surface',isMoon:true,solid:true,vanish:false,moving:false});
  game.noMorePlatforms=true;
}

//  파티클
// ══════════════════════════════════════════════════════
function spawnPt(x,y,col,n=6){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.04+Math.random()*0.04,sz:2+Math.random()*3,col});
  }
}
function initStars(){stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.25?2:1,tw:Math.random()*Math.PI*2,spd:0.02+Math.random()*0.04}));}
function initClouds(){clouds=Array.from({length:7},()=>({x:Math.random()*W,y:60+Math.random()*(H-120),w:60+Math.random()*100,spd:0.3+Math.random()*0.4,a:0.4+Math.random()*0.45}));}

// ══════════════════════════════════════════════════════
//  메인 루프
// ══════════════════════════════════════════════════════
let loopId=null;
function loop(ts){
  if(!running)return;
  const dt=Math.min((ts-lastTime)/16.67,3);
  lastTime=ts;
  update(dt);render();
  loopId=requestAnimationFrame(loop);
}
function stopLoop(){
  running=false;
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}
}

function update(dt){
  if(game.ended||game.paused)return;
  const p=game.p;
  const char=game.char;
  const sd=game.stageData;

  // 2스테이지 인트로 (절구 안에서 탈출하는 연출)
  if(game.s2intro){
    game.s2introT+=dt;
    if(game.s2introT<60)return; // 처음 1초 대기
    game.s2intro=false;
  }

  // 이동
  const hasCrouch=!!char.crouchTime;
  if(keys['ArrowLeft']||keys['KeyA']){if(!p.crouching){p.vx=-char.speed;p.facing=-1;}}
  else if(keys['ArrowRight']||keys['KeyD']){if(!p.crouching){p.vx=char.speed;p.facing=1;}}
  else p.vx*=char.friction;

  // 웅크림 점프 (인절미/부활 후)
  if(hasCrouch&&p.crouching){
    p.vx*=0.5;
    p.crouchTimer+=dt;
    if(!p.onGround){p.crouching=false;}
    else if(p.crouchTimer>=char.crouchTime){
      p.crouching=false;
      p.vy=char.jumpForce;p.jumps--;SFX.crouchRelease();
      spawnPt(p.x+p.w/2,p.worldY+p.h-game.camY,'#d4c4a0',15);
    }else{SFX.crouchCharge(p.crouchTimer/char.crouchTime);}
  }

  // 바퀴벌레/일루미나티 비행
  if(selectedChar==='cockroach'||selectedChar==='illuminati'){
    const flyKey=keys['Space']||keys['ArrowUp'];
    if(flyKey&&p.flyTimer<(char.maxFlyTime||20)){
      p.vy=Math.max(p.vy-1.0*dt,-7);
      p.flyTimer+=dt;p.flying=true;SFX.fly();
    }else{p.flying=false;}
    if(p.onGround){p.flyTimer=0;p.flying=false;}
  }

  if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;
  // 중력 (바퀴벌레/우주비행사/폭풍은 느린 낙하)
  if((selectedChar==='cockroach'||selectedChar==='illuminati')&&!p.onGround&&!p.flying){
    p.vy=Math.min(p.vy+0.35*dt,10);
  }else if(selectedChar==='astronaut'&&!p.onGround&&p.vy>0){
    p.vy=Math.min(p.vy+0.3*dt,8);
  }else if(selectedChar==='storm'&&!p.onGround&&p.vy>0){
    p.vy=Math.min(p.vy+0.25*dt,6);
  }else{
    p.vy=Math.min(p.vy+0.55*dt,20);
  }
  // 물고기 탱탱볼 바운스
  if(selectedChar==='fish'&&p.onGround&&!keys['ArrowUp']&&!keys[' ']){
    p.vy=-6;p.onGround=false;p._fishLanded=true;
  }
  p.x+=p.vx*dt;p.worldY+=p.vy*dt;

  // 발판 움직임 업데이트
  for(const pl of game.platforms){
    if(pl.moving){
      pl.x+=pl.moveDir*pl.moveSpeed*dt;
      if(Math.abs(pl.x-pl.moveOriginX)>pl.moveRange)pl.moveDir*=-1;
    }
    // 사라지는 발판 타이머
    if(pl.vanish&&pl.vanishTriggered&&!pl.vanished){
      pl.vanishTimer-=dt/60;
      pl.vanishAlpha=Math.max(0.1,pl.vanishTimer/1);
      if(pl.vanishTimer<=0){pl.vanished=true;pl.solid=false;}
    }
    // 깜빡이는 발판 (ON 2초 고정, OFF 1~2초 랜덤)
    if(pl.blink&&!pl.frozen){
      pl.blinkTimer+=dt;
      if(pl.blinkOn){
        if(pl.blinkTimer>=pl.blinkOnDur){pl.blinkTimer-=pl.blinkOnDur;pl.blinkOn=false;pl.blinkOffDur=60+Math.random()*60;}
      }else{
        if(pl.blinkTimer>=pl.blinkOffDur){pl.blinkTimer-=pl.blinkOffDur;pl.blinkOn=true;}
      }
      pl.solid=pl.blinkOn;
    }
    pl.playerOn=false;
  }

  // 충돌
  p.onGround=false;
  for(const pl of game.platforms){
    if(!pl.solid)continue;
    if(p.x+p.w<=pl.x||p.x>=pl.x+pl.w)continue;
    const pBot=p.worldY+p.h,pBotPrev=pBot-p.vy*dt;
    if(pBotPrev<=pl.worldY+2&&pBot>=pl.worldY&&p.vy>0){
      if(p.vy>1){spawnPt(p.x+p.w/2,pl.worldY-game.camY,getPlatformColor(pl.type),4);SFX.land();}
      p.worldY=pl.worldY-p.h;
      p.vy=0;p.onGround=true;p.jumps=p.maxJumps;
      pl.playerOn=true;
      if(pl.vanish&&!pl.vanishTriggered)pl.vanishTriggered=true;
      // 미끄러운 발판: 마찰을 줄여서 미끄럽게
      if(pl.icy&&!pl.frozen){p.vx*=1.14;if(Math.abs(p.vx)>p.speed*2)p.vx=Math.sign(p.vx)*p.speed*2;SFX.slide();}
      // 얼음: 발판 동결 (움직이는/부서지는/깜빡이는 모두)
      if(game.char.freezesPlatforms&&(pl.moving||pl.vanish||pl.blink)&&!pl.frozen){
        pl.frozen=true;pl.moving=false;pl.moveSpeed=0;
        pl.vanish=false;pl.vanishTriggered=false;pl.vanished=false;pl.solid=true;pl.vanishAlpha=1;
        if(pl.blink){pl.blink=false;pl.solid=true;}
        spawnPt(p.x+p.w/2,pl.worldY-game.camY,'#aaddff',12);SFX.freeze();
      }
    }
  }

  // 카메라 (위로만 따라감 — 내려가지 않음)
  const psy=p.worldY-game.camY;
  const thrUp=H*0.40;
  if(psy<thrUp){
    const diff=thrUp-psy;
    game.camY-=diff;
    game.height+=diff*0.225;
    if(!bestH[game.stage]||game.height>bestH[game.stage])bestH[game.stage]=game.height;
  }
  // 카메라가 땅 아래로 내려가지 않게
  if(game.camY>-(H-60))game.camY=-(H-60);

  // 화면 밖으로 떨어지면 사망 (좀비는 1회 부활)
  if(p.worldY-game.camY>H+50&&!game.ended){
    if(game.revivesLeft>0){
      game.revivesLeft--;
      // 화면 상단 근처 발판 중 하나로 부활
      const vis=game.platforms.filter(pl=>pl.worldY-game.camY>30&&pl.worldY-game.camY<H*0.4&&pl.type!=='ground');
      if(vis.length>0){
        const pl=vis[Math.floor(Math.random()*vis.length)];
        p.x=pl.x+pl.w/2-p.w/2;p.worldY=pl.worldY-p.h-10;
      }else{
        p.x=W/2-p.w/2;p.worldY=game.camY+80;
      }
      p.vx=0;p.vy=0;p.jumps=p.maxJumps;p.flying=false;p.flyTimer=0;
      p.crouching=false;p.crouchTimer=0;p.spinAngle=0;
      SFX.unlock();
      // 부활 파티클
      for(let i=0;i<20;i++){
        const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
        particles.push({x:p.x+p.w/2,y:p.worldY+p.h/2-game.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.03+Math.random()*0.03,sz:3+Math.random()*3,col:i%2?'#6a8a5a':'#ffaa33'});
      }
    }else{
      game.ended=true;stopLoop();
      setTimeout(()=>die(),300);return;
    }
  }

  // 스테이지 1: 달 착륙 발판
  if(game.stage===1&&game.height>=9800&&!game.moonLandingInserted)insertMoonLanding();

  // 엔딩 체크
  if(game.height>=sd.endH&&!game.ended){
    game.ended=true;stopLoop();
    SAVE.clearStage(game.stage);SFX.stageClear();
    setTimeout(()=>startEnding(),400);return;
  }

  // 부서진 발판 5초 후 재생성
  for(const pl of game.platforms){
    if(pl.vanished){
      if(!pl.respawnTimer)pl.respawnTimer=0;
      pl.respawnTimer+=dt/60;
      if(pl.respawnTimer>=5){
        pl.vanished=false;pl.solid=true;pl.vanishAlpha=1;pl.vanishTimer=1;pl.vanishTriggered=false;pl.respawnTimer=0;
      }
    }
  }

  // 새 발판 (위로만 생성)
  let topWY=Math.min(...game.platforms.map(pl=>pl.worldY));
  while(topWY-game.camY>-H*0.8){topWY-=sd.getPlatformGap(game.height);pushPlatform(topWY);}
  game.platforms=game.platforms.filter(pl=>pl.type==='ground'||(pl.worldY-game.camY<H+400&&pl.worldY-game.camY>-H*1.5));

  // 구름
  for(const c of clouds){c.x+=c.spd*dt;if(c.x>W+c.w)c.x=-c.w;}
  for(const s of stars)s.tw+=s.spd*dt;

  // 혜성
  if(game.height>3000){
    game.cometTimer-=dt;
    if(game.cometTimer<=0){comets.push({x:W+10,y:Math.random()*H*0.7,vx:-8-Math.random()*6,vy:2+Math.random()*3,life:1});game.cometTimer=70+Math.random()*100;}
    for(const c of comets){c.x+=c.vx*dt;c.y+=c.vy*dt;c.life-=0.007*dt;}
    comets=comets.filter(c=>c.life>0&&c.x>-60);
  }

  for(const pt of particles){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=0.1*dt;pt.life-=pt.decay*dt;}
  particles=particles.filter(pt=>pt.life>0);

  // 구역 알림
  const zone=getZone();
  if(zone&&zone.name!==lastZone){
    lastZone=zone.name;
    const el=document.getElementById('zone-announce');
    el.textContent=zone.name+' 진입!';el.classList.add('show');
    clearTimeout(window._zt);window._zt=setTimeout(()=>el.classList.remove('show'),2400);
    spawnPt(p.x+p.w/2,p.worldY-game.camY,zone.accent||'#fff',22);
  }

  if(Math.abs(p.vx)>0.5){p.ft+=dt;if(p.ft>7){p.ft=0;p.frame=(p.frame+1)%4;}}else p.frame=0;
  // 단백질 스틱 회전
  if(selectedChar==='protein_stick'&&!p.onGround){p.spinAngle+=0.25*dt;}
  else{p.spinAngle=0;}
  updateHUD();
}

function getZone(){
  const zones=game.stageData.zones;
  for(const z of zones)if(game.height>=z.minH&&game.height<z.maxH)return z;
  return zones[zones.length-1];
}

function die(){
  stopLoop();SFX.death();BGM.stop();
  const diff=Math.min(1,(game.height-game.stageData.startH)/(game.stageData.endH-game.stageData.startH));
  const stars='★'.repeat(Math.ceil(diff*5))+'☆'.repeat(5-Math.ceil(diff*5));
  ov.innerHTML=`
    <h1 style="color:#ff6b6b">GAME OVER</h1>
    <p style="margin-top:8px;color:#aaa">최종 높이</p>
    <div class="final">${Math.floor(game.height).toLocaleString()}m</div>
    <p style="color:#ffe066">STAGE ${game.stage} 최고: ${Math.floor(bestH[game.stage]||0).toLocaleString()}m</p>
    <p style="color:#ff8888;margin-top:4px">난이도 ${stars}</p>
    <p style="margin-top:4px;font-size:11px;color:#888">목표: ${game.stageData.endH.toLocaleString()}m</p>
    <button class="btn" onclick="startStage(${game.stage})">다시 도전!</button>
    <button class="btn-sm" onclick="showStageSelect()">스테이지 선택</button>
  `;
  ov.style.display='flex';
}

function updateHUD(){
  const h=Math.floor(game.height);
  const sd=game.stageData;
  const diff=Math.min(1,(game.height-sd.startH)/(sd.endH-sd.startH));
  document.getElementById('hud-h').textContent=`높이: ${h.toLocaleString()}m`;
  document.getElementById('hud-b').textContent=`최고: ${Math.floor(bestH[game.stage]||0).toLocaleString()}m`;
  const rev=document.getElementById('hud-rev');
  if(selectedChar==='zombie'&&game.revivesLeft>0){rev.style.display='block';rev.textContent=`🧟 부활 ${game.revivesLeft}회`;}
  else{rev.style.display='none';}
  const zone=getZone();
  if(zone)document.getElementById('zone-display').textContent=zone.name;
  if(game.height>sd.endH-500)document.getElementById('zone-announce').textContent=`⚠️ 목표까지 ${Math.floor(sd.endH-game.height)}m!`;
}

// ══════════════════════════════════════════════════════
//  렌더
// ══════════════════════════════════════════════════════
function render(){
  const h=game.height;
  const zone=getZone();
  const zones=game.stageData.zones;
  const nz=zones[Math.min(zones.indexOf(zone)+1,zones.length-1)];
  const t=Math.min(1,(h-zone.minH)/Math.max(1,zone.maxH-zone.minH));
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,lerp(zone.sky[0],nz.sky[0],t));
  g.addColorStop(1,lerp(zone.sky[1],nz.sky[1],t));
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // 2스테이지 인트로 오버레이
  if(game.s2intro){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 18px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('STAGE 2 — 달에서 화성까지',W/2,H/2-30);
    ctx.fillStyle='#ccc';ctx.font='13px "Press Start 2P",monospace';
    ctx.fillText('절구 안에서 탈출하라!',W/2,H/2+10);
    const prog=Math.min(1,game.s2introT/60);
    if(prog>0.8){ctx.fillStyle='rgba(255,255,255,'+((prog-0.8)/0.2*0.5)+')';ctx.fillRect(0,0,W,H);}
    ctx.textAlign='left';
    return;
  }

  // 별
  if(h>2500){
    const sa=Math.min(1,(h-2500)/1000);
    for(const s of stars){ctx.globalAlpha=sa*(0.5+0.5*Math.sin(s.tw));ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz);}
    ctx.globalAlpha=1;
  }
  // 구름
  if(h>500&&h<4500){
    const ca=Math.min(1,(h-500)/500)*Math.max(0,1-(h-4000)/500);
    for(const c of clouds){ctx.globalAlpha=c.a*ca;drawCloud(c.x,c.y,c.w);}ctx.globalAlpha=1;
  }
  // 혜성
  for(const c of comets){
    ctx.globalAlpha=c.life*0.8;ctx.strokeStyle='#add8e6';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(c.x-c.vx*6,c.y-c.vy*6);ctx.stroke();
    ctx.fillStyle='#fff';ctx.fillRect(c.x-2,c.y-2,4,4);
  }
  ctx.globalAlpha=1;

  // 발판
  for(const pl of game.platforms){
    const sy=pl.worldY-game.camY;
    if(sy>H+20||sy<-30)continue;
    // 깜빡이는 발판: 켜져있으면 그대로, 꺼져있으면 점선 테두리
    if(pl.blink&&!pl.frozen){
      if(!pl.solid){
        ctx.globalAlpha=0.35;
        ctx.strokeStyle='#cc66ff';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.strokeRect(pl.x,sy,pl.w,pl.h);
        ctx.setLineDash([]);
        ctx.globalAlpha=1;
        continue;
      }else{
        ctx.globalAlpha=1;
      }
    }else{
      ctx.globalAlpha=pl.vanishAlpha||1;
    }
    if(pl.vanished)continue;
    drawPlatform(pl.x,sy,pl.w,pl.h,pl.type);
    // 사라지는 발판 경고
    if(pl.vanish&&!pl.vanished&&pl.vanishTriggered){
      const shake=(Math.random()-0.5)*2;
      ctx.fillStyle=`rgba(255,60,0,${0.7*(1-pl.vanishAlpha)})`;
      ctx.fillRect(pl.x+shake,sy,pl.w,pl.h);
    }
    // 동결된 발판 이펙트
    if(pl.frozen){
      ctx.fillStyle='rgba(150,210,255,0.35)';ctx.fillRect(pl.x,sy,pl.w,pl.h);
      ctx.fillStyle='rgba(200,240,255,0.5)';ctx.fillRect(pl.x+2,sy,3,3);ctx.fillRect(pl.x+pl.w-5,sy+2,3,3);
    }
    // 움직이는 발판 화살표
    if(pl.moving&&!pl.vanished){
      ctx.fillStyle='rgba(100,200,255,0.5)';
      ctx.fillRect(pl.x+(pl.moveDir>0?pl.w-8:0),sy-5,8,4);
    }
    // 미끄러운 발판 이펙트
    if(pl.icy&&!pl.frozen){
      ctx.fillStyle='rgba(200,240,255,0.2)';ctx.fillRect(pl.x,sy,pl.w,pl.h);
    }
    ctx.globalAlpha=1;
  }

  // 파티클
  for(const pt of particles){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;ctx.fillRect(pt.x-pt.sz/2,pt.y-pt.sz/2,pt.sz,pt.sz);}
  ctx.globalAlpha=1;

  // 플레이어
  const p=game.p;
  const sx=Math.round(p.x),sy=Math.round(p.worldY-game.camY);
  game.char.draw(ctx,sx,sy,p.facing,p.frame,game.height,p.onGround,p.vy);

  // 진행 게이지
  const prog=Math.min(1,(game.height-game.stageData.startH)/(game.stageData.endH-game.stageData.startH));
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(W-18,10,10,H-20);
  ctx.fillStyle=game.stage===2?'#ff6633':'#FFD700';
  ctx.fillRect(W-18,10+(H-20)*(1-prog),10,(H-20)*prog);
  ctx.fillStyle='#fff';ctx.font='10px monospace';
  ctx.fillText(game.stage===2?'🔴':'🌕',W-20,16);
  ctx.fillText('🪨',W-20,H-12);
}

// ══════════════════════════════════════════════════════
//  엔딩 씬
// ══════════════════════════════════════════════════════
function startEnding(){SFX.endingStart();BGM.stop();
  const s=game.stage,c=selectedChar;
  if(s===1&&c==='human')startMoonEnding();
  else if(s===1&&c==='mochi')startMochiMoonEnding();
  else if(s===2&&c==='human')startCockroachEnding();
  else if(s===2&&c==='mochi')startIceEnding();
  else if(s===1&&c==='cockroach')startCockroachS1Ending();
  else if(s===2&&c==='cockroach')startCockroachS2Ending();
  else if(s===1&&c==='ice')startIceS1Ending();
  else if(s===1&&c==='rabbit')startRabbitS1Ending();
  else if(s===2&&c==='rabbit')startRabbitS2Ending();
  else if(s===1&&c==='protein_stick')startProteinStickS1Ending();
  else if(s===2&&c==='ice')startIceS2Ending();
  else if(s===1&&c==='astronaut')startAstronautS1Ending();
  else if(s===2&&c==='astronaut')startAstronautS2Ending();
  else if(s===2&&c==='protein_stick')startProteinStickS2Ending();
  else if(s===3&&c==='human')startHumanS3Ending();
  else if(s===3&&c==='mochi')startMochiS3Ending();
  else if(s===3&&c==='cockroach')startCockroachS3Ending();
  else if(s===3&&c==='ice')startIceS3Ending();
  else if(s===3&&c==='rabbit')startRabbitS3Ending();
  else if(s===3&&c==='protein_stick')startProteinS3Ending();
  else if(s===3&&c==='astronaut')startAstronautS3Ending();
  else startDefaultEnding();
}

// ─── 1스테이지 엔딩 (기존 달 토끼 엔딩) ───────────────
function startMoonEnding(){
  eCanvas.style.display='block';
  document.getElementById('ui').style.display='none';
  ending={
    type:'moon',t:0,scene:0,
    playerX:W/2,playerY:H*0.55,playerVy:-12,
    rabbits:[
      {x:W/2-110,y:H*0.62,dir:1,frame:0,ft:0},
      {x:W/2+110,y:H*0.62,dir:-1,frame:0,ft:0},

let endLastTime=0;
function endingLoop(ts){
  if(!ending)return;
  const dt=Math.min((ts-endLastTime)/16.67,3);
  endLastTime=ts;
  if(ending.type==='moon'){updateMoonEnding(dt);renderMoonEnding();}
  else if(ending.type==='mars'){updateMarsEnding(dt);renderMarsEnding();}
  else if(ending.type==='mochi_moon'){updateMochiMoonEnding(dt);renderMochiMoonEnding();}
  else if(ending.type==='cockroach'){updateCockroachEnding(dt);renderCockroachEnding();}
  else if(ending.type==='ice'){updateIceEnding(dt);renderIceEnding();}
  else if(ending.type==='default'){updateDefaultEnding(dt);renderDefaultEnding();}
  else if(ending.type==='cockroach_s1'){updateCockroachS1Ending(dt);renderCockroachS1Ending();}
  else if(ending.type==='cockroach_s2'){updateCockroachS2Ending(dt);renderCockroachS2Ending();}
  else if(ending.type==='ice_s1'){updateIceS1Ending(dt);renderIceS1Ending();}
  else if(ending.type==='rabbit_s1'){updateRabbitS1Ending(dt);renderRabbitS1Ending();}
  else if(ending.type==='rabbit_s2'){updateRabbitS2Ending(dt);renderRabbitS2Ending();}
  else if(ending.type==='protein_s1'){updateProteinStickS1Ending(dt);renderProteinStickS1Ending();}
  else if(ending.type==='ice_s2'){updateIceS2Ending(dt);renderIceS2Ending();}
  else if(ending.type==='astronaut_s1'){updateAstronautS1Ending(ending);renderAstronautS1Ending(ending);}
  else if(ending.type==='astronaut_s2'){updateAstronautS2Ending(ending);renderAstronautS2Ending(ending);}
  else if(ending.type==='protein_s2'){updateProteinStickS2Ending(ending);renderProteinStickS2Ending(ending);}
  else if(ending.type==='human_s3'){updateHumanS3Ending(ending);renderHumanS3Ending(ending);}
  else if(ending.type==='mochi_s3'){updateMochiS3Ending(ending);renderMochiS3Ending(ending);}
  else if(ending.type==='cockroach_s3'){updateCockroachS3Ending(ending);renderCockroachS3Ending(ending);}

// ─── 달 엔딩 업데이트 ─────────────────────────────────
function updateMoonEnding(dt){
  const e=ending;e.t+=dt;
  for(const s of e.stars)s.tw+=s.spd*dt;
  for(const sp of e.sparks){sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.vy+=0.3*dt;if(sp.isBlood&&sp.y>H*0.76){sp.y=H*0.76;sp.vy=0;sp.vx*=0.7;}sp.life-=(sp.decay||0.05)*dt;}
  e.sparks=e.sparks.filter(s=>s.life>0);

  if(e.scene===0){
    e.playerVy+=0.6*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=H*0.6){
      e.playerY=H*0.6;e.playerVy=0;
      for(let i=0;i<12;i++){const a=Math.random()*Math.PI,s=2+Math.random()*4;e.sparks.push({x:e.playerX,y:e.playerY+30,vx:Math.cos(a)*s,vy:-Math.random()*3,life:1,col:'#ffd'});}
      e.scene=1;e.t=0;
    }
  }else if(e.scene===1){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.textLine<2&&e.t>60)e.textLine=1;
    if(e.textLine<3&&e.t>120)e.textLine=2;
    for(const r of e.rabbits){const dx=(r.dir>0?W/2-70:W/2+70)-r.x;if(Math.abs(dx)>4){r.x+=r.dir*2*dt;r.ft+=dt;if(r.ft>8){r.ft=0;r.frame=(r.frame+1)%4;}}}
    if(e.t>160){e.scene=2;e.t=0;e.textLine=3;}
  }else if(e.scene===2){
    e.textAlpha=1;
    if(e.textLine<5&&e.t>40)e.textLine=4;
    if(e.textLine<6&&e.t>90)e.textLine=5;
    const tx=e.mortarX-11,ty=e.mortarY-80;
    e.playerX+=(tx-e.playerX)*0.05*dt;e.playerY+=(ty-e.playerY)*0.05*dt;
    if(e.t>130){e.scene=3;e.t=0;e.textLine=6;e.playerInMortar=true;}
  }else if(e.scene===3){
    e.textAlpha=1;if(e.textLine<7&&e.t>40)e.textLine=6;
    e.playerY+=2*dt;e.playerScale=Math.max(0.1,e.playerScale-0.015*dt);
    if(e.t>70){e.scene=4;e.t=0;e.textLine=7;}
  }else if(e.scene===4){
    e.doughAlpha=Math.min(1,(e.t-20)/40);
    const beat=Math.sin(e.t*0.25)*0.5+0.5;
    e.pestleY=-beat*90;e.pestle2Y=-(1-beat)*90;
    e.sparkTimer-=dt;
    if(beat<0.05&&e.sparkTimer<=0){
      e.shakeX=(Math.random()-0.5)*14;e.shakeY=(Math.random()-0.5)*14;
      e.sparkTimer=8;e.hitCount++;
      for(let i=0;i<10+Math.floor(Math.random()*8);i++){
        const a=-Math.PI*0.2-Math.random()*Math.PI*0.6,s=3+Math.random()*7;
        e.sparks.push({x:e.mortarX+(Math.random()-0.5)*50,y:e.mortarY-15,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.03,sz:2+Math.random()*5,col:Math.random()<0.7?'#cc0000':Math.random()<0.5?'#ff2222':'#880000',isBlood:true});
      }
      for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;e.sparks.push({x:e.mortarX+(Math.random()-0.5)*30,y:e.mortarY-30,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,decay:0.06,sz:3,col:'#fff8aa'});}
    }else{e.shakeX*=0.82;e.shakeY*=0.82;}
    if(e.t>240){e.scene=5;e.t=0;e.textLine=8;e.shakeX=0;e.shakeY=0;}
  }else if(e.scene===5){e.textAlpha=Math.min(1,e.t/30);}
}

// ─── 화성 엔딩 업데이트 ───────────────────────────────
function updateMarsEnding(dt){
  const e=ending;e.t+=dt;
  for(const s of e.stars)s.tw+=s.spd*dt;
  for(const sp of e.sparks){sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.vy+=0.1*dt;sp.life-=0.03*dt;}
  e.sparks=e.sparks.filter(s=>s.life>0);
  if(e.scene===0){
    e.playerVy+=0.5*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=H*0.6){
      e.playerY=H*0.6;e.playerVy=0;
      for(let i=0;i<15;i++){const a=Math.random()*Math.PI,s=2+Math.random()*5;e.sparks.push({x:e.playerX,y:e.playerY+30,vx:Math.cos(a)*s,vy:-Math.random()*4,life:1,col:'#ff6633'});}
      e.scene=1;e.t=0;
    }
  }else if(e.scene===1){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.textLine<2&&e.t>80)e.textLine=1;
    if(e.textLine<3&&e.t>160)e.textLine=2;
    if(e.textLine<4&&e.t>240)e.textLine=3;
    if(e.t>320){e.scene=2;e.t=0;e.textLine=4;}
  }else if(e.scene===2){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>120){
      eCanvas.onclick=()=>endingDone();
      document.onkeydown=(ev)=>{if(ev.code!=='F5'&&ev.code!=='F12')endingDone();};
    }
  }
}

    rabbit:{x:W*0.8,y:H*0.62,dir:-1,frame:0,ft:0},
    stars:Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.03+Math.random()*0.04})),
    sparks:[],textAlpha:0,textLine:0,
    dialogues:['달에 도착한 인절미...','어? 토끼다!','토끼: 어! 인절미다!! 냠냠!','토끼: 맛있다~ 쫄깃쫄깃!','토끼: 억...! 목에...!','토끼: 끄억...!!','...토끼가 인절미에 목이 막혀 죽었다','【토끼 캐릭터 해금!】'],

    char:selectedChar,unlockChar:'rabbit',
  };

function updateMochiMoonEnding(dt){
  const e=ending;e.t+=dt;
  for(const s of e.stars)s.tw+=s.spd*dt;
  for(const sp of e.sparks){sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.vy+=0.2*dt;sp.life-=0.04*dt;}
  e.sparks=e.sparks.filter(s=>s.life>0);
  if(e.scene===0){
    e.playerVy+=0.6*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=H*0.6){e.playerY=H*0.6;e.playerVy=0;e.scene=1;e.t=0;}
  }else if(e.scene===1){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>40)e.textLine=1;
    const r=e.rabbit;
    if(Math.abs(r.x-e.playerX)>40){r.x+=r.dir*2.5*dt;r.ft+=dt;if(r.ft>8){r.ft=0;r.frame=(r.frame+1)%4;}}
    if(e.t>100){e.scene=2;e.t=0;e.textLine=2;}
  }else if(e.scene===2){
    e.textAlpha=1;
    e.eatProgress=Math.min(1,e.t/80);
    e.playerY=H*0.6+e.eatProgress*20;
    if(e.t>40)e.textLine=3;
    if(e.t>100){e.scene=3;e.t=0;e.textLine=4;}
  }else if(e.scene===3){
    e.textAlpha=1;
    e.shakeX=(Math.random()-0.5)*8;e.shakeY=(Math.random()-0.5)*8;
    if(e.t>40)e.textLine=5;
    if(e.t>80){
      for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;e.sparks.push({x:e.rabbit.x+15,y:e.rabbit.y+10,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:'#ff8888'});}
      e.scene=4;e.t=0;e.textLine=6;e.rabbitDead=true;e.shakeX=0;e.shakeY=0;
    }
  }else if(e.scene===4){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>60)e.textLine=7;
    if(e.t>120&&!eCanvas._endingBound){
      eCanvas._endingBound=true;SAVE.unlockChar('rabbit');SFX.unlock();
      eCanvas.onclick=()=>endingDone();
      document.onkeydown=(ev)=>{if(ev.code!=='F5'&&ev.code!=='F12')endingDone();};
    }
  }
}

function renderMochiMoonEnding(){
  const e=ending;

  for(const s of e.stars){ectx.globalAlpha=0.5+0.5*Math.sin(s.tw);ectx.fillStyle='#fff';ectx.fillRect(s.x,s.y,s.sz,s.sz);}

    if(e.textLine>=7){
      ectx.fillStyle='rgba(0,0,0,0.7)';ectx.fillRect(W/2-200,H*0.38-15,400,80);
      ectx.fillStyle='#7ef';ectx.font='bold 20px "Press Start 2P",monospace';ectx.textAlign='center';
      ectx.fillText('🐰 토끼 캐릭터 해금!',W/2,H*0.38+15);
      ectx.fillStyle='#aaa';ectx.font='13px "Press Start 2P",monospace';
      ectx.fillText('인절미의 복수가 완성되었다',W/2,H*0.38+38);
      if(e.t>60){ectx.fillStyle='#ffe066';ectx.fillText('[ 클릭 / 아무 키 ]',W/2,H*0.38+56);}
      ectx.textAlign='left';
    }else{

// ─── S2+탐험가 엔딩 (바퀴벌레 → 바퀴벌레 인간) ──────────
function startCockroachEnding(){
  eCanvas.style.display='block';
  document.getElementById('ui').style.display='none';
  const bugs=[];for(let i=0;i<20;i++)bugs.push({x:Math.random()*W,y:H*0.75+Math.random()*50,tx:0,ty:0,speed:1.5+Math.random()*2.5,sz:14+Math.random()*10,active:false,legFrame:Math.random()*Math.PI*2});
  ending={
    type:'cockroach',t:0,scene:0,
    playerX:W/2,playerY:H*0.5,playerVy:-10,
    bugs:bugs,coverAlpha:0,
    stars:Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.03+Math.random()*0.04})),
    sparks:[],textAlpha:0,textLine:0,
    dialogues:['화성에 착륙했다...','어...? 뭔가 기어다닌다...','바퀴벌레들이 몰려온다!!','으아아아!! 안돼!!','...','???:  나는...바퀴벌레...인간...?','【바퀴벌레 인간 해금!】'],
    shakeX:0,shakeY:0,char:selectedChar,unlockChar:'cockroach',
  };
  requestAnimationFrame(endingLoop);
}

function updateCockroachEnding(dt){
  const e=ending;e.t+=dt;
  for(const s of e.stars)s.tw+=s.spd*dt;
  for(const sp of e.sparks){sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.life-=0.03*dt;}
  e.sparks=e.sparks.filter(s=>s.life>0);
  if(e.scene===0){
    e.playerVy+=0.5*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=H*0.6){e.playerY=H*0.6;e.playerVy=0;e.scene=1;e.t=0;}
  }else if(e.scene===1){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>60)e.textLine=1;
    if(e.t>100){e.scene=2;e.t=0;e.textLine=2;for(const b of e.bugs)b.active=true;}
  }else if(e.scene===2){
    e.textAlpha=1;
    for(const b of e.bugs){
      if(!b.active)continue;
      const dx=e.playerX-b.x,dy=e.playerY+10-b.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){b.x+=dx/d*b.speed*dt;b.y+=dy/d*b.speed*dt;}
    }
    if(e.t>50)e.textLine=3;
    if(e.t>100){e.scene=3;e.t=0;e.textLine=3;e.shakeX=0;e.shakeY=0;}
  }else if(e.scene===3){
    e.coverAlpha=Math.min(1,e.t/60);
    e.shakeX=(Math.random()-0.5)*6*e.coverAlpha;
    e.shakeY=(Math.random()-0.5)*6*e.coverAlpha;
    for(const b of e.bugs){b.x+=((Math.random()-0.5)*3)*dt;b.y+=((Math.random()-0.5)*3)*dt;}
    if(e.t>120){e.scene=4;e.t=0;e.textLine=4;e.shakeX=0;e.shakeY=0;}
  }else if(e.scene===4){
    e.coverAlpha=Math.max(0,1-e.t/40);
    for(const b of e.bugs){const a=Math.atan2(b.y-e.playerY,b.x-e.playerX);b.x+=Math.cos(a)*4*dt;b.y+=Math.sin(a)*4*dt;}
    if(e.t>40)e.textLine=5;
    if(e.t>100){e.scene=5;e.t=0;e.textLine=6;}
  }else if(e.scene===5){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>80&&!eCanvas._endingBound){
      eCanvas._endingBound=true;SAVE.unlockChar('cockroach');SFX.unlock();
      eCanvas.onclick=()=>endingDone();
      document.onkeydown=(ev)=>{if(ev.code!=='F5'&&ev.code!=='F12')endingDone();};
    }
  }
}

function renderCockroachEnding(){
  const e=ending;
  const bg=ectx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0500');bg.addColorStop(0.6,'#3a0a00');bg.addColorStop(1,'#5a1500');
  ectx.fillStyle=bg;ectx.fillRect(0,0,W,H);
  for(const s of e.stars){ectx.globalAlpha=0.4+0.4*Math.sin(s.tw);ectx.fillStyle='#fff';ectx.fillRect(s.x,s.y,s.sz,s.sz);}
  ectx.globalAlpha=1;
  ectx.fillStyle='#8B2500';ectx.fillRect(0,H*0.7,W,H*0.3);
  ectx.fillStyle='#aa3300';ectx.fillRect(0,H*0.7,W,8);
  ectx.save();ectx.translate(e.shakeX||0,e.shakeY||0);
  if(e.scene<5){
    ectx.save();ectx.translate(e.playerX,e.playerY);
    if(e.scene>=3){ectx.globalAlpha=1-e.coverAlpha;}
    drawEndingPlayer(0,0,e.scene>=2,e.char);
    ectx.globalAlpha=1;ectx.restore();
  }else{
    ectx.save();ectx.translate(e.playerX,e.playerY);
    CHARS.cockroach.draw(ectx,0,0,1,0,20000,true,0);
    ectx.restore();
  }
  for(const b of e.bugs){
    if(!b.active)continue;
    b.legFrame=(b.legFrame||0)+0.15;
    const s=b.sz,hx=b.x,hy=b.y;
    // 다리 6개
    ectx.fillStyle='#2a0e00';
    for(let i=0;i<3;i++){
      const lo=Math.sin(b.legFrame+i*1.2)*3;
      ectx.fillRect(hx-s*0.6-4,hy-s*0.15+i*s*0.2+lo,s*0.3,2);
      ectx.fillRect(hx+s*0.3+2,hy-s*0.15+i*s*0.2-lo,s*0.3,2);
    }
    // 몸통
    ectx.fillStyle='#3a1a00';ectx.beginPath();ectx.ellipse(hx,hy,s*0.5,s*0.3,0,0,Math.PI*2);ectx.fill();
    // 등 무늬
    ectx.fillStyle='#5a3200';ectx.beginPath();ectx.ellipse(hx,hy-2,s*0.3,s*0.15,0,0,Math.PI*2);ectx.fill();
    // 머리
    ectx.fillStyle='#2a0e00';ectx.beginPath();ectx.ellipse(hx,hy-s*0.35,s*0.25,s*0.2,0,0,Math.PI*2);ectx.fill();
    // 더듬이
    ectx.strokeStyle='#2a0e00';ectx.lineWidth=1;
    ectx.beginPath();ectx.moveTo(hx-3,hy-s*0.45);ectx.lineTo(hx-s*0.4,hy-s*0.7);ectx.moveTo(hx+3,hy-s*0.45);ectx.lineTo(hx+s*0.4,hy-s*0.7);ectx.stroke();
    // 눈
    ectx.fillStyle='#ff3300';ectx.fillRect(hx-4,hy-s*0.4,3,3);ectx.fillRect(hx+1,hy-s*0.4,3,3);
  }
  if(e.scene>=3&&e.coverAlpha>0){
    ectx.globalAlpha=e.coverAlpha*0.7;ectx.fillStyle='#1a0a00';
    ectx.fillRect(e.playerX-18,e.playerY-5,40,40);

// ─── S2+인절미 엔딩 (얼음 인절미) ────────────────────────
function startIceEnding(){
  eCanvas.style.display='block';
  document.getElementById('ui').style.display='none';
  ending={
    type:'ice',t:0,scene:0,
    playerX:W/2,playerY:H*0.55,playerVy:-10,
    bugX:W*0.8,bugY:H*0.62,bugDir:-1,bugFrame:0,bugFt:0,
    carryOffsetY:0,waterY:H*0.7,
    stars:Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.03+Math.random()*0.04})),
    sparks:[],textAlpha:0,textLine:0,scrollX:0,
    dialogues:['화성에 도착한 인절미...','바퀴벌레가 나타났다!','바퀴벌레가 인절미를 집어 들었다!','바퀴벌레가 어디론가 가고 있다...','...물이 있는 곳에 도착했다','바퀴벌레가 인절미를 물에 던졌다!','...','인절미가 얼어붙어 튀어올랐다!','【얼음 인절미 해금!】'],
    shakeX:0,shakeY:0,frozen:false,bounced:false,freezeAlpha:0,
    char:selectedChar,unlockChar:'ice',
  };
  requestAnimationFrame(endingLoop);
}

function updateIceEnding(dt){
  const e=ending;e.t+=dt;
  for(const s of e.stars)s.tw+=s.spd*dt;
  for(const sp of e.sparks){sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.vy+=0.15*dt;sp.life-=0.03*dt;}
  e.sparks=e.sparks.filter(s=>s.life>0);
  if(e.scene===0){
    e.playerVy+=0.5*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=H*0.55){e.playerY=H*0.55;e.playerVy=0;e.scene=1;e.t=0;}
  }else if(e.scene===1){
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>50)e.textLine=1;
    const dx=e.playerX-e.bugX;
    if(Math.abs(dx)>30){e.bugX+=e.bugDir*2.5*dt;e.bugFt+=dt;if(e.bugFt>8){e.bugFt=0;e.bugFrame=(e.bugFrame+1)%4;}}
    if(e.t>100){e.scene=2;e.t=0;e.textLine=2;}
  }else if(e.scene===2){
    e.textAlpha=1;
    e.playerY+=(e.bugY-20-e.playerY)*0.05*dt;
    e.playerX+=(e.bugX-e.playerX)*0.05*dt;
    if(e.t>50)e.textLine=3;
    if(e.t>100){e.scene=3;e.t=0;e.textLine=3;}
  }else if(e.scene===3){
    e.scrollX+=2*dt;
    e.bugX-=1*dt;e.playerX=e.bugX;e.playerY=e.bugY-25;
    e.bugFt+=dt;if(e.bugFt>8){e.bugFt=0;e.bugFrame=(e.bugFrame+1)%4;}
    if(e.t>120){e.scene=4;e.t=0;e.textLine=4;}
  }else if(e.scene===4){
    e.textAlpha=1;
    if(e.t>50)e.textLine=5;
    if(e.t>100){e.scene=5;e.t=0;e.textLine=5;e.playerVy=0;}
  }else if(e.scene===5){
    e.playerVy+=0.8*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>=e.waterY-10){
      e.playerY=e.waterY-10;
      if(!e.frozen){
        e.frozen=true;e.t=0;e.textLine=6;
        for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;e.sparks.push({x:e.playerX+12,y:e.waterY,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,col:'#aaddff'});}
      }
    }
    e.bugX+=2*dt;
    if(e.frozen){
      e.freezeAlpha=Math.min(1,e.freezeAlpha+0.03*dt);
      if(e.t>60&&!e.bounced){
        e.bounced=true;e.playerVy=-15;e.scene=6;e.t=0;e.textLine=7;
        for(let i=0;i<15;i++){const a=-Math.PI*0.3-Math.random()*Math.PI*0.4,s=3+Math.random()*5;e.sparks.push({x:e.playerX+12,y:e.waterY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:'#c8e8ff'});}
      }
    }
  }else if(e.scene===6){
    e.playerVy+=0.3*dt;e.playerY+=e.playerVy*dt;
    if(e.playerY>e.waterY-10)e.playerY=e.waterY-10;
    e.textAlpha=Math.min(1,e.t/20);
    if(e.t>60)e.textLine=8;
    if(e.t>120&&!eCanvas._endingBound){
      eCanvas._endingBound=true;SAVE.unlockChar('ice');SFX.unlock();
      eCanvas.onclick=()=>endingDone();
      document.onkeydown=(ev)=>{if(ev.code!=='F5'&&ev.code!=='F12')endingDone();};
    }
  }
}

      ectx.fillText('❄️ 얼음 인절미 해금!',W/2,H*0.35+15);

// ─── 우주비행사 ST3 엔딩 (좀비 캐릭터 해금) ────────────
function startAstronautS3Ending(){
  eCanvas.style.display='block';document.getElementById('ui').style.display='none';
  ending={type:'astronaut_s3',t:0,scene:0,char:selectedChar,
    gasAlpha:0,gasParticles:[],
    stars:Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2}))};
  endLastTime=performance.now();requestAnimationFrame(endingLoop);
}
function updateAstronautS3Ending(e){
  e.t+=1;
  // 가스 파티클 추가
  if(e.scene>=1&&e.scene<=2&&Math.random()<0.3){
    e.gasParticles.push({x:Math.random()*W,y:H+10,vx:(Math.random()-0.5)*1.5,vy:-0.5-Math.random()*1.5,
      life:1,decay:0.005+Math.random()*0.005,sz:20+Math.random()*30,col:Math.random()>0.5?'rgba(80,180,40,':'rgba(120,200,60,'});
  }
  for(const g of e.gasParticles){g.x+=g.vx;g.y+=g.vy;g.life-=g.decay;}
  e.gasParticles=e.gasParticles.filter(g=>g.life>0);
  if(e.scene===0&&e.t>360){e.scene=1;e.t=0;}
  if(e.scene===1&&e.t>400){e.scene=2;e.t=0;}
  if(e.scene===2&&e.t>400){e.scene=3;e.t=0;}
  if(e.scene===3&&e.t>400){e.scene=4;e.t=0;SAVE.unlockChar('zombie');SFX.unlock();}
  if(e.scene===4&&e.t>360){endingDone();}
  if(e.scene===4&&e.t>100&&!eCanvas._endingBound){eCanvas._endingBound=true;eCanvas.onclick=()=>endingDone();document.onkeydown=(ev)=>{if(ev.code!=='F5'&&ev.code!=='F12')endingDone();};}
}
function renderAstronautS3Ending(e){
  ectx.textAlign='center';
  for(const s of e.stars){ectx.globalAlpha=0.4+0.3*Math.sin(s.tw+=0.03);ectx.fillStyle='#fff';ectx.fillRect(s.x,s.y,s.sz,s.sz);}ectx.globalAlpha=1;
  if(e.scene===0){
    // 목성에 도착 - 거대한 가스 행성
    ectx.fillStyle='#0a0a1a';ectx.fillRect(0,0,W,H);
    // 목성 (하단에 거대한 곡면)
    const grad=ectx.createLinearGradient(0,H*0.5,0,H);
    grad.addColorStop(0,'#c8a050');grad.addColorStop(0.3,'#a08040');grad.addColorStop(0.6,'#d4a060');grad.addColorStop(1,'#8a6830');
    ectx.fillStyle=grad;ectx.beginPath();ectx.ellipse(W/2,H+80,W*0.8,H*0.5,0,Math.PI,0);ectx.fill();
    // 목성 줄무늬
    for(let i=0;i<5;i++){
      ectx.fillStyle=`rgba(${140+i*15},${80+i*10},${30+i*5},0.3)`;

    // 대적점
    ectx.fillStyle='rgba(180,60,20,0.5)';ectx.beginPath();ectx.ellipse(W*0.65,H*0.7,35,18,0.2,0,Math.PI*2);ectx.fill();
    // 우주비행사 접근
    const px=W/2-11,py=H*0.35-Math.min(e.t*0.15,30);

    ectx.font='13px "Press Start 2P",monospace';ectx.fillStyle='#ffcc66';
    ectx.fillText('드디어 목성에 도착했다!',W/2,40);
    ectx.font='10px "Press Start 2P",monospace';ectx.fillStyle='#aaa';
    if(e.t>150)ectx.fillText('거대한 가스 행성...',W/2,65);
    if(e.t>250)ectx.fillText('가까이 갈수록 이상한 냄새가...',W/2,85);
  }else if(e.scene===1){

    }

    for(const g of e.gasParticles){
      ectx.globalAlpha=g.life*0.4;ectx.fillStyle=g.col+g.life*0.5+')';
      ectx.beginPath();ectx.arc(g.x,g.y,g.sz,0,Math.PI*2);ectx.fill();
    }
    ectx.globalAlpha=1;
    // 녹색 가스 오버레이 (점점 짙어짐)
    const gasIntensity=Math.min(e.t/400,0.4);
    ectx.fillStyle=`rgba(60,160,30,${gasIntensity})`;ectx.fillRect(0,0,W,H);
    // 우주비행사 (고통스러워하는)
    const shk=e.t>200?Math.sin(e.t*0.5)*(e.t-200)*0.01:0;
    CHARS.astronaut.draw(ectx,W/2-11+shk,H*0.55,1,Math.floor(e.t/8)%2,35000,true,0);

    if(e.t>120)ectx.fillText('우주비행사: 크윽... 머리가...',W/2,65);

  }else if(e.scene===2){
