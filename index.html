//  배틀 마우스 입력
// ══════════════════════════════════════════════════════
let btlMouseX=0,btlMouseY=0;

function btlTriggerAttack(p,mx,my){
  if(!btl||btl.state!=='playing')return;
  if(p.stunTimer>0)return;
  const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
  const angle=Math.atan2(my-cy,mx-cx);
  p.facing=Math.cos(angle)>=0?1:-1;

  const bs=p.bs;
  if(bs.atkType==='rapidPunch'){
    // 토끼: 쿨 짧아서 자동연사 가능
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=8;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }else if(bs.atkType==='grab'){
    // 인절미: 늘어나는 팔
    if(p.attacking||p.attackCooldown>0||p.grabArm)return;
    p.attackAngle=angle;p.attackCooldown=bs.cooldown;SFX.punchSwing();
    p.grabArm={x:cx,y:cy+btl.camY,vx:Math.cos(angle)*bs.grabSpeed,vy:Math.sin(angle)*bs.grabSpeed,dist:0,maxDist:bs.grabRange,hit:false,returning:false,target:null};
  }else if(bs.atkType==='bomb'){
    // 바퀴벌레: 포물선 알 폭탄
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.bombLaunch();
    const spd=bs.bombSpeed;
    btl.projectiles.push({type:'bomb',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,gravity:bs.bombGravity,
      fuse:bs.bombFuseTime,landed:false,radius:bs.blastRadius,stun:bs.stun,kb:bs.kb});
  }else if(bs.atkType==='shard'){
    // 얼음: 짧은 투사체
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.shardLaunch();
    btl.projectiles.push({type:'shard',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.shardSpeed,vy:Math.sin(angle)*bs.shardSpeed,
      dist:0,maxDist:bs.shardRange,stun:bs.stun,kb:bs.kb,slowDur:bs.slowDuration});
  }else if(bs.atkType==='laser'){
    // 우주비행사: 레이저 총
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.laserLaunch();
    btl.projectiles.push({type:'laser',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.laserSpeed,vy:Math.sin(angle)*bs.laserSpeed,
      dist:0,maxDist:bs.laserRange,stun:bs.stun,kb:bs.kb,slowDur:bs.slowDuration});
  }else if(bs.atkType==='comboPunch'){
    // 단백질 스틱: 콤보 펀치
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=10;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }else if(bs.atkType==='bone'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.boneLaunch();
    btl.projectiles.push({type:'bone',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.boneSpeed,vy:Math.sin(angle)*bs.boneSpeed,
      gravity:bs.boneGravity,dist:0,maxDist:bs.boneRange,stun:bs.stun,kb:bs.kb});
  }else if(bs.atkType==='water_stream'){
    if(p.attackCooldown>0||p.streamTimer>0)return;
    p.attackCooldown=bs.cooldown;
    p.streamTimer=bs.streamDuration;
    p.streamAngle=angle;SFX.waterStream();
  }else if(bs.atkType==='eye_beam'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.eyeBeamLaunch();
    btl.projectiles.push({type:'eye_beam',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.beamSpeed,vy:Math.sin(angle)*bs.beamSpeed,
      dist:0,maxDist:bs.beamRange,stun:bs.stun,kb:bs.kb,blindDur:bs.blindDuration});
    // 분신도 같은 방향으로 발사
    if(btl.clones){
      for(const cl of btl.clones){
        if(cl.owner!==p)continue;
        cl.facing=Math.cos(angle)>=0?1:-1;
        cl.attacking=true;cl.attackTimer=12;cl.attackAngle=angle;
        btl.projectiles.push({type:'eye_beam',owner:p,
          x:cl.x+cl.w/2,y:cl.worldY+cl.h/2,
          vx:Math.cos(angle)*bs.beamSpeed,vy:Math.sin(angle)*bs.beamSpeed,
          dist:0,maxDist:bs.beamRange,stun:bs.stun,kb:bs.kb,blindDur:bs.blindDuration});
      }
    }
  }else if(bs.atkType==='whirlwind'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.whirlwindLaunch();
    btl.projectiles.push({type:'whirlwind',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.wwSpeed,vy:Math.sin(angle)*bs.wwSpeed,
      dist:0,maxDist:bs.wwRange,stun:bs.stun,kb:bs.kb,
      zoneRadius:bs.wwZoneRadius,zoneDur:bs.wwZoneDur,pullStr:bs.wwPullStrength,
      slowDur:bs.wwSlowDur,zoneKb:bs.wwZoneKb,tickRate:bs.wwZoneTickRate});
  }else if(bs.atkType==='claw'){
    // 좀비: 할퀴기 (양손 광역 근접)
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=14;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }else if(bs.atkType==='detonate'){
    if(p.charging||p.attackCooldown>0)return;
    p.charging=true;p.chargeTimer=0;
  }else{
    // human 기본 펀치
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=12;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }
}

// ─── 특수능력 (우클릭) ─────────────────────────
function btlTriggerSpecial(p,mx,my){
  if(!btl||btl.state!=='playing')return;
  if(!p||p.hp<=0)return;
  if(p.stunTimer>0)return;
  if(p.warmupTimer>0)return; // 준비운동 중엔 취소 불가
  if(p.bindTimer>0)return;   // 속박 중엔 특수 사용 불가
  const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
  const angle=Math.atan2(my-cy,mx-cx);
  const bs=p.bs;
  const st=bs.specialType;
  // 해골 순간이동은 쿨 무시로 허용, 그 외에는 쿨 체크
  if(st!=='throw_head'&&st!=='detonate_charge'&&p.specialCooldown>0)return;
  if(st==='throw_head'&&!p.thrownHead&&p.specialCooldown>0)return;
  p.facing=Math.cos(angle)>=0?1:-1;
  if(st==='dodge'){
    // 탐험가: 구르기 회피 (방향키 우선, 없으면 마우스 방향)
    let dx=0;
    if(keys['ArrowLeft']||keys['KeyA'])dx=-1;
    else if(keys['ArrowRight']||keys['KeyD'])dx=1;
    else dx=p.facing;
    p.dodgeTimer=bs.dodgeDuration;
    p.dodgeVx=dx*bs.dodgeSpeed;p.dodgeVy=0;
    p.invulTimer=bs.dodgeInvul;
    p.specialCooldown=bs.specialCooldown;
    SFX.jump&&SFX.jump(1,1);
    btlSpawnPt(cx,cy,'#7ef',10);
  }else if(st==='buff'){
    // 토끼: 신체 강화
    p.buffTimer=bs.buffDuration;
    p.specialCooldown=bs.specialCooldown;
    btlSpawnPt(cx,cy,'#ff4444',30);
    SFX.punchSwing&&SFX.punchSwing();
  }else if(st==='mochi_throw'){
    // 인절미: 끈끈이 떡 던지기 (포물선 → 접촉 시 폭발 → 속박)
    btl.projectiles.push({type:'mochi',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.mochiSpeed,vy:Math.sin(angle)*bs.mochiSpeed,
      gravity:bs.mochiGravity,dist:0,maxDist:bs.mochiRange,
      radius:bs.mochiBlastRadius,bindDur:bs.bindDuration,_startX:p.x+p.w/2,_startY:p.worldY+p.h/2});
    p.specialCooldown=bs.specialCooldown;
    SFX.punchSwing&&SFX.punchSwing();
    btlSpawnPt(cx,cy,'#f8c0d0',8);
  }else if(st==='bomb_detonate'){
    // 바퀴벌레: 자신이 깔아놓은 모든 폭탄 즉시 폭발
    const myBombs=btl.projectiles.filter(pr=>pr.type==='bomb'&&pr.owner===p&&pr.landed);
    if(myBombs.length===0)return; // 깔린 폭탄 없으면 쿨 소비 안 함
    for(const b of myBombs){
      btlExplode(b);
      const idx=btl.projectiles.indexOf(b);
      if(idx>=0)btl.projectiles.splice(idx,1);
    }
    p.specialCooldown=bs.specialCooldown;
  }else if(st==='big_ice'){
    // 얼음: 거대 얼음 투척 (포물선) — 머리 위에서 생성 (바닥 충돌 방지)
    const sx=p.x+p.w/2, sy=p.worldY-8; // 캐릭터 머리 위
    btl.projectiles.push({type:'big_ice',owner:p,x:sx,y:sy,
      vx:Math.cos(angle)*bs.bigIceSpeed,vy:Math.sin(angle)*bs.bigIceSpeed,
      gravity:bs.bigIceGravity,dist:0,maxDist:bs.bigIceRange,
      kb:bs.bigIceKb,stun:bs.bigIceStun,slowDur:bs.bigIceSlow,radius:22,
      _startX:sx,_startY:sy});
    p.specialCooldown=bs.specialCooldown;
    SFX.shardLaunch&&SFX.shardLaunch();
  }else if(st==='warmup'){
    // 단백질 스틱: 준비운동 (정지 4초 → 콤보 +5)
    p.warmupTimer=bs.warmupDuration;
    p.vx=0;p.vy=0;
    p.specialCooldown=bs.specialCooldown;
    btlSpawnPt(cx,cy,'#ffe066',15);
  }else if(st==='satellite'){
    // 우주비행사: 위성 소환 (지연 레이저)
    btl.satellites.push({x:mx,worldY:my+btl.camY,timer:bs.satDelay,maxTimer:bs.satDelay,
      radius:bs.satRadius,kb:bs.satKb,stun:bs.satStun,owner:p,fired:false});
    p.specialCooldown=bs.specialCooldown;
    btlSpawnPt(mx,my,'#ff4444',10);
    SFX.laserLaunch&&SFX.laserLaunch();
  }else if(st==='throw_head'){
    // 해골: 머리가 없으면 던지기, 있으면 순간이동 (1회만)
    if(p.thrownHead){
      if(p._teleportUsed)return; // 이미 이번 머리로 순간이동함
      const h=p.thrownHead;
      // 머리 위치 기준으로 발판 위 스냅
      let snapY=h.y-p.h/2;
      let snapped=false;
      // 머리가 착지했다면 그 발판에 스냅
      if(h.landed&&h.landedPlat){
        const pl=h.landedPlat;
        p.x=h.x-p.w/2;p.worldY=pl.worldY-p.h;snapped=true;
      }
      if(!snapped){
        // 머리 아래 가장 가까운 발판 찾기
        let bestPl=null,bestDy=Infinity;
        for(const pl of btl.platforms){
          if(h.x<pl.x||h.x>pl.x+pl.w)continue;
          const dy=pl.worldY-h.y;
          if(dy>=-6&&dy<bestDy){bestDy=dy;bestPl=pl;}
        }
        if(bestPl){p.x=h.x-p.w/2;p.worldY=bestPl.worldY-p.h;snapped=true;}
      }
      if(!snapped){p.x=h.x-p.w/2;p.worldY=snapY;}
      p.vx=0;p.vy=0;p.jumps=p.maxJumps;
      p.headless=false;p.thrownHead=null;p._teleportUsed=true;
      // 머리 제거
      const idx=btl.projectiles.indexOf(h);
      if(idx>=0)btl.projectiles.splice(idx,1);
      btlSpawnPt(p.x+p.w/2,p.worldY+p.h/2-btl.camY,'#f0f0f0',20);
      p.specialCooldown=bs.specialCooldown; // 3초 쿨 시작
    }else{
      // 머리 투척 (쿨 중이면 이미 위에서 return됨)
      const head={type:'head',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
        vx:Math.cos(angle)*bs.headSpeed,vy:Math.sin(angle)*bs.headSpeed,
        gravity:bs.headGravity,dist:0,maxDist:bs.headRange,life:bs.headLife,
        kb:bs.headKb,stun:bs.headStun,landed:false,landedPlat:null};
      btl.projectiles.push(head);
      p.thrownHead=head;
      p.headless=true;
      p._teleportUsed=false;
      // 쿨다운은 머리가 사라질 때 시작됨 (지금은 설정 X)
      btlSpawnPt(p.x+p.w/2,p.worldY+p.h/2-btl.camY,'#f0f0f0',10);
      SFX.boneLaunch&&SFX.boneLaunch();
    }
  }else if(st==='wave_dash'){
    // 물고기: 파도타기 (클릭 방향 대시, 무적 없음)
    p.dashTimer=bs.dashDuration;
    p.dashVx=Math.cos(angle)*bs.dashSpeed;
    p.dashVy=Math.sin(angle)*bs.dashSpeed;
    p._dashKb=bs.dashKb;p._dashStun=bs.dashStun;
    p.specialCooldown=bs.specialCooldown;
    SFX.waterStream&&SFX.waterStream();
    btlSpawnPt(cx,cy,'#4488ff',15);
  }else if(st==='detonate_charge'){
    // 좀비: 차지 시작 (누르고 있어야 유지, 5초 이상 후 떼면 폭발 / 10초면 자동)
    if(p.charging)return; // 이미 차지 중
    if(p.specialCooldown>0)return;
    p.charging=true;p.chargeTimer=0;
    SFX.punchSwing&&SFX.punchSwing();
  }else if(st==='clone_split'){
    // 일루미나티: 분열 분신 (사용할 때마다 분신 추가, 죽을 때까지 누적)
    const dd=bs.cloneDashDist||55;
    // 본체는 클릭 방향으로 짧게 이동
    p.x+=Math.cos(angle)*dd;p.worldY+=Math.sin(angle)*dd*0.4;
    // 분신 1개: 본체 반대 방향
    const cx2=-Math.cos(angle)*dd,cy2=-Math.sin(angle)*dd*0.4;
    btl.clones.push({
      owner:p,ownerIdx:btl.players.indexOf(p),
      x:p.x+cx2,worldY:p.worldY+cy2,
      w:p.w,h:p.h,vx:0,vy:0,facing:p.facing,
      onGround:false,
      charId:p.charId,charDef:p.charDef,skin:p.skin
    });
    p.specialCooldown=bs.specialCooldown;
    SFX.eyeBeamLaunch&&SFX.eyeBeamLaunch();
    // 분열 파티클 (금빛 폭발)
    for(let k=0;k<30;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
      btl.particles.push({x:p.x+p.w/2,y:p.worldY+p.h/2-btl.camY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04,sz:3+Math.random()*3,col:k%2?'#ffd700':'#fff8c0'});}
  }
}

canvas.addEventListener('mousedown',e=>{
  if(!btlRunning||!btl)return;
  e.preventDefault();
  const g=screenToGame(e.clientX,e.clientY);
  // 게임 끝난 상태에서는 공격 무시
  if(btl.state==='ended')return;
  if(btl.online){
    if(onlineRole==='host'){
      if(e.button===0&&btl.players[0]){btl.players[0]._mouseHeld=true;btlTriggerAttack(btl.players[0],g.x,g.y);}
      if(e.button===2&&btl.players[0]){btl.players[0]._spHeld=true;btlTriggerSpecial(btl.players[0],g.x,g.y);}
    }else{
      if(e.button===0){
        const p=btl.players[onlinePlayerIdx];
        if(p){const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
          btl._netAtkAngle=Math.atan2(g.y-cy,g.x-cx);
          btl._netAtkTriggered=true;btl._netMouseHeld=true;}
      }
      if(e.button===2){
        const p=btl.players[onlinePlayerIdx];
        if(p){const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
          btl._netSpAngle=Math.atan2(g.y-cy,g.x-cx);
          btl._netSpTriggered=true;btl._netSpHeld=true;}
      }
    }
  }else{
    // 로컬: P1 전용 (좌=기본, 우=특수)
    if(e.button===0&&btl.players[0]){btl.players[0]._mouseHeld=true;btlTriggerAttack(btl.players[0],g.x,g.y);}
    if(e.button===2&&btl.players[0]){btl.players[0]._spHeld=true;btlTriggerSpecial(btl.players[0],g.x,g.y);}
  }
});
canvas.addEventListener('mousemove',e=>{
  const g=screenToGame(e.clientX,e.clientY);btlMouseX=g.x;btlMouseY=g.y;
  if(btl&&btl.online&&onlineRole==='guest'){
    const p=btl.players[onlinePlayerIdx];
    if(p&&(btl._netMouseHeld||p.streamTimer>0)){const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;btl._netAtkAngle=Math.atan2(g.y-cy,g.x-cx);}
  }
});
canvas.addEventListener('mouseup',e=>{
  if(!btl)return;
  if(e.button===0){
    if(btl.online&&onlineRole==='host'&&btl.players[0])btl.players[0]._mouseHeld=false;
    else if(btl.online&&onlineRole==='guest')btl._netMouseHeld=false;
    else if(btl.players[0])btl.players[0]._mouseHeld=false;
  }
  if(e.button===2){
    if(btl.online&&onlineRole==='host'&&btl.players[0])btl.players[0]._spHeld=false;
    else if(btl.online&&onlineRole==='guest')btl._netSpHeld=false;
    else if(btl.players[0])btl.players[0]._spHeld=false;
  }
});
canvas.addEventListener('contextmenu',e=>{if(btlRunning)e.preventDefault();});

// ══════════════════════════════════════════════════════
//  온라인 멀티플레이

function showOnlineMenu(){
  stopLoop();btlStopLoop();btl=null;
  if(ws){ws.close();ws=null;}
  ov.style.display='flex';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  if(!window._onChar)window._onChar='human';
  if(!window._onSkin)window._onSkin='default';
  ov.innerHTML=`<h1 style="font-size:18px;margin-bottom:12px">🌐 온라인 멀티플레이</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px">
      <button class="btn" onclick="showOnlineCreateMenu()">🏠 방 만들기</button>
      <button class="btn" onclick="showOnlineJoinMenu()" style="background:#88cc66;border-color:#559933">🚪 방 입장</button>
    </div>
    <button class="btn-sm" onclick="showBattleMenu()">← 뒤로</button>`;
}

function showOnlineCreateMenu(){
  ov.innerHTML=`<h1 style="font-size:16px;margin-bottom:12px">🏠 방 만들기</h1>
    <p style="color:#aaa;font-size:11px;margin-bottom:12px">인원 수를 선택하세요</p>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn" onclick="createOnlineRoom(2)">2P</button>
      <button class="btn" onclick="createOnlineRoom(3)" style="background:#88cc44;border-color:#558822">3P</button>
      <button class="btn" onclick="createOnlineRoom(4)" style="background:#ffaa44;border-color:#cc7711">4P</button>
    </div>
    <button class="btn-sm" onclick="showOnlineMenu()">← 뒤로</button>`;
}

function showOnlineJoinMenu(){
  ov.innerHTML=`<h1 style="font-size:16px;margin-bottom:12px">🚪 방 입장</h1>
    <p style="color:#aaa;font-size:11px;margin-bottom:10px">방 코드를 입력하세요</p>
    <input id="roomCodeInput" type="text" maxlength="4" style="font-family:'Press Start 2P',monospace;font-size:24px;width:160px;text-align:center;background:#111;color:#ffe066;border:3px solid #ffe066;padding:8px;text-transform:uppercase" placeholder="XXXX">
    <br><br>
    <button class="btn" onclick="joinOnlineRoom(document.getElementById('roomCodeInput').value.toUpperCase())">입장하기</button>
    <br><button class="btn-sm" onclick="showOnlineMenu()" style="margin-top:10px">← 뒤로</button>`;
  setTimeout(()=>{const i=document.getElementById('roomCodeInput');if(i)i.focus();},50);
}

function showOnlineLobby(){
  if(!onlineRoomInfo)return;
  ov.style.display='flex';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  const info=onlineRoomInfo;
  const isHost=onlineRole==='host';
  const pColors=['#7ef','#f88','#8f8','#fb4'];
  const _emojis={human:'🧑',mochi:'🍡',cockroach:'🪳',ice:'❄️',rabbit:'🐰',protein_stick:'🥢',astronaut:'🧑‍🚀',illuminati:'🔺',skeleton:'💀',fish:'🐟',storm:'🌪️',zombie:'🧟'};
  const allChars=Object.keys(CHARS).map(id=>({id,emoji:_emojis[id]||'❓',name:CHARS[id].name}));
  const charEmojis={};const charNames={};for(const c of allChars){charEmojis[c.id]=c.emoji;charNames[c.id]=c.name;}
  const myPlayer=info.players.find(p=>p.idx===onlinePlayerIdx);
  const myChar=myPlayer?myPlayer.char:(window._onChar||'human');
  const myReady=myPlayer?!!myPlayer.ready:false;
  const mySkin=myPlayer?myPlayer.skin||'default':(window._onSkin||'default');
  const charCards=allChars.filter(c=>SAVE.hasChar(c.id)).map(c=>{
    const sel=myChar===c.id;
    return`<div onclick="onlineSwitchChar('${c.id}')" style="width:44px;height:${sel&&SKINS[c.id]?'70':'54'}px;border:2px solid ${sel?'#ffe066':'#444'};background:${sel?'rgba(40,35,0,0.9)':'rgba(15,15,20,0.9)'};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer${myReady?';pointer-events:none;opacity:0.5':''}"><div style="font-size:16px">${c.emoji}</div><div style="font-size:6px;color:${sel?'#ffe066':'#888'};margin-top:1px">${c.name}</div>${sel&&SKINS[c.id]?SKINS[c.id].filter(sk=>sk.id==='default'||SAVE.hasSkin(sk.id)).map(sk=>'<span onclick="event.stopPropagation();onlineSwitchSkin(\''+sk.id+'\')" style="cursor:pointer;font-size:8px;padding:0 2px;border:1px solid '+(mySkin===sk.id?'#ffe066':'#444')+';border-radius:2px;margin:1px">'+sk.emoji+'</span>').join(''):''}
    </div>`;
  }).join('');
  const slots=Array.from({length:info.max},(_, i)=>{
    const p=info.players.find(p=>p.idx===i);
    if(!p)return`<div style="color:#555;font-size:11px;margin:4px 0">P${i+1} ⌛ 대기 중...</div>`;
    const em=charEmojis[p.char]||'🧑';
    const cn=charNames[p.char]||p.char;
    const readyMark=p.ready?'✅ 준비완료':'⏳ 선택 중...';
    const readyColor=p.ready?'#8f8':'#aaa';
    const skinLabel=p.skin&&p.skin!=='default'&&SKINS[p.char]?SKINS[p.char].find(s=>s.id===p.skin):null;
    return`<div style="color:${pColors[i]};font-size:11px;margin:4px 0">P${i+1} ${em} ${cn}${skinLabel?' <span style="font-size:8px;color:#aaa">['+skinLabel.name+']</span>':''}${i===onlinePlayerIdx?' (나)':''} <span style="color:${readyColor};font-size:9px">${readyMark}</span></div>`;
  }).join('');
  const allReady=info.players.length>=2&&info.players.every(p=>p.ready);
  const readyBtnLabel=myReady?'❌ 준비 취소':'✅ 준비 완료';
  const readyBtnStyle=myReady?'background:#f66;border-color:#c33':'background:#4c4;border-color:#292';
  ov.innerHTML=`<h1 style="font-size:15px;margin-bottom:6px">대기실</h1>
    <div style="background:rgba(255,224,102,0.1);border:2px solid #ffe066;padding:10px 28px;margin:4px 0;font-size:30px;color:#ffe066;letter-spacing:10px;font-family:'Press Start 2P',monospace">${info.code}</div>
    <p style="color:#888;font-size:9px;margin-bottom:8px">이 코드를 친구에게 알려주세요</p>
    <p style="color:#aaa;font-size:9px;margin-bottom:4px">내 캐릭터${myReady?' (준비 취소 후 변경 가능)':''}</p>
    <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:340px;margin-bottom:10px">${charCards}</div>
    <div style="margin-bottom:12px">${slots}</div>
    <button class="btn" onclick="onlineToggleReady()" style="${readyBtnStyle};margin-bottom:6px">${readyBtnLabel}</button>
    ${isHost?`<button class="btn" id="startOnlineBtn" onclick="startOnlineRequest()" ${allReady?'':'disabled style="opacity:0.4;cursor:not-allowed"'}>⚔️ 게임 시작!</button>`:''}
    <button class="btn-sm" onclick="leaveOnlineRoom()" style="margin-top:10px">← 나가기</button>`;
}
function onlineSwitchChar(charId){
  if(!ws||ws.readyState!==1||!onlineRoomInfo)return;
  const me=onlineRoomInfo.players.find(p=>p.idx===onlinePlayerIdx);
  if(me&&me.ready)return; // 준비 상태에서는 캐릭터 변경 불가
  window._onChar=charId;window._onSkin='default';
  if(me){me.char=charId;me.skin='default';}
  ws.send(JSON.stringify({t:'char_update',char:charId,skin:'default'}));
  showOnlineLobby();
}
function onlineSwitchSkin(skinId){
  if(!ws||ws.readyState!==1||!onlineRoomInfo)return;
  const me=onlineRoomInfo.players.find(p=>p.idx===onlinePlayerIdx);
  if(me&&me.ready)return;
  window._onSkin=skinId;
  if(me)me.skin=skinId;
  ws.send(JSON.stringify({t:'char_update',char:window._onChar||'human',skin:skinId}));
  showOnlineLobby();
}
function onlineToggleReady(){
  if(!ws||ws.readyState!==1||!onlineRoomInfo)return;
  const me=onlineRoomInfo.players.find(p=>p.idx===onlinePlayerIdx);
  if(!me)return;
  me.ready=!me.ready;
  ws.send(JSON.stringify({t:'ready',ready:me.ready}));
  showOnlineLobby();
}

function createOnlineRoom(maxP){
  ov.innerHTML=`<p style="color:#aaa;font-size:14px">서버에 연결 중...</p>`;
  connectWs(()=>ws.send(JSON.stringify({t:'create',max:maxP,char:window._onChar||'human',skin:window._onSkin||'default'})));
}

function joinOnlineRoom(code){
  if(!code||code.length!==4){showOnlineError('코드는 4자리여야 합니다');return;}
  ov.innerHTML=`<p style="color:#aaa;font-size:14px">연결 중...</p>`;
  connectWs(()=>ws.send(JSON.stringify({t:'join',code,char:window._onChar||'human',skin:window._onSkin||'default'})));
}

function connectWs(onOpen){
  if(ws){ws.close();ws=null;}
  ws=new WebSocket('wss://skyclimber.duckdns.org');
  ws.onopen=onOpen;
  ws.onerror=()=>showOnlineError('서버 연결 실패');
  ws.onclose=()=>{if(btlRunning||onlineRole)onWsClose();};
  ws.onmessage=e=>{try{handleWsMessage(JSON.parse(e.data));}catch(err){console.warn(err);}};
}

function showOnlineError(msg){
  ov.innerHTML=`<p style="color:#f88;font-size:14px;margin-bottom:16px">${msg}</p>
    <button class="btn-sm" onclick="showOnlineMenu()">← 뒤로</button>`;
}

function startOnlineRequest(){
  if(!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({t:'start'}));
}

function leaveOnlineRoom(){
  removeBtlEndUI();
  if(_onlineEndKeyHandler){document.removeEventListener('keydown',_onlineEndKeyHandler);canvas.removeEventListener('click',_onlineEndKeyHandler);_onlineEndKeyHandler=null;}
  if(ws){ws.close();ws=null;}
  if(btlRunning){btlStopLoop();btl=null;keys={};}
  onlineRole=null;onlineRoomInfo=null;onlinePlayerIdx=0;pendingInputs=[null,null,null,null];
  showBattleMenu();
}

function onWsClose(){
  removeBtlEndUI();
  if(btlRunning&&btl&&btl.online){
    btl._discMsg='상대방 연결이 끊어졌습니다';
    setTimeout(()=>{removeBtlEndUI();btlStopLoop();btl=null;keys={};onlineRole=null;onlineRoomInfo=null;showBattleMenu();},2500);
  }else if(onlineRole&&!btlRunning){
    showOnlineError('연결이 끊어졌습니다');
    onlineRole=null;onlineRoomInfo=null;
  }
}

function handleWsMessage(msg){
  if(msg.t==='room_ok'){
    onlineRole='host';onlinePlayerIdx=0;
    onlineRoomInfo={code:msg.code,max:msg.max,players:msg.players||[]};
    showOnlineLobby();
  }else if(msg.t==='joined'){
    onlineRole='guest';onlinePlayerIdx=msg.idx;
    onlineRoomInfo={code:msg.code||'????',max:msg.max,players:msg.players||[]};
    showOnlineLobby();
  }else if(msg.t==='player_in'){
    if(onlineRoomInfo){
      onlineRoomInfo.players=onlineRoomInfo.players.filter(p=>p.idx!==msg.idx);
      onlineRoomInfo.players.push({idx:msg.idx,char:msg.char,skin:msg.skin,ready:!!msg.ready});
      showOnlineLobby();
    }
  }else if(msg.t==='player_out'){
    if(onlineRoomInfo){
      onlineRoomInfo.players=onlineRoomInfo.players.filter(p=>p.idx!==msg.idx);
      if(btlRunning&&btl&&btl.online){if(btl.players[msg.idx])btl.players[msg.idx].hp=0;}
      else showOnlineLobby();
    }
  }else if(msg.t==='char_update'){
    if(onlineRoomInfo){
      const p=onlineRoomInfo.players.find(p=>p.idx===msg.idx);
      if(p){p.char=msg.char;p.skin=msg.skin;p.ready=false;}
      if(!btlRunning)showOnlineLobby();
    }
  }else if(msg.t==='ready'){
    if(onlineRoomInfo){
      const p=onlineRoomInfo.players.find(p=>p.idx===msg.idx);
      if(p)p.ready=!!msg.ready;
      if(!btlRunning)showOnlineLobby();
    }
  }else if(msg.t==='host_left'){
    if(ws){ws.close();ws=null;}
    onlineRole=null;onlineRoomInfo=null;
    if(btlRunning){btlStopLoop();btl=null;keys={};}
    showOnlineError('방장이 방을 나갔습니다');
  }else if(msg.t==='lobby_return'){
    removeBtlEndUI();
    if(_onlineEndKeyHandler){document.removeEventListener('keydown',_onlineEndKeyHandler);canvas.removeEventListener('click',_onlineEndKeyHandler);_onlineEndKeyHandler=null;}
    if(onlineRoomInfo&&msg.players){
      onlineRoomInfo.players=msg.players;
    }
    btlStopLoop();btl=null;keys={};
    ov.style.display='flex';
    showOnlineLobby();
  }else if(msg.t==='game_start'){
    startOnlineGame(msg);
  }else if(msg.t==='st'){
    if(msg.lr){
      // 호스트가 로비 복귀 신호를 보냄
      removeBtlEndUI();
      if(btlRunning){btlStopLoop();}
      btl=null;keys={};
      if(onlineRoomInfo&&msg.pl){onlineRoomInfo.players=msg.pl;}
      ov.style.display='flex';
      showOnlineLobby();
      return;
    }
    if(btl&&btl.online&&onlineRole==='guest')btl._pendingState=msg;
  }else if(msg.t==='in'){
    if(btl&&btl.online&&onlineRole==='host'&&msg.idx>=1&&msg.idx<=3)pendingInputs[msg.idx]=msg;
  }else if(msg.t==='err'){
    showOnlineError(msg.reason||'오류가 발생했습니다');
  }
}

function startOnlineGame(msg){
  if(_onlineEndKeyHandler){document.removeEventListener('keydown',_onlineEndKeyHandler);canvas.removeEventListener('click',_onlineEndKeyHandler);_onlineEndKeyHandler=null;}
  btlStopLoop();keys={};
  ov.style.display='none';
  document.getElementById('ui').style.display='none';
  eCanvas.style.display='none';
  const seed=msg.seed;
  const pData=msg.players;
  const pColors=['#7ef','#f88','#8f8','#fb4'];
  const spawnXs=[W*0.2,W*0.8,W*0.4,W*0.6];
  const spawnFacings=[1,-1,1,-1];
  const btlPlayers=pData.map(pd=>btlMakePlayer(pd.char,spawnXs[pd.idx],spawnFacings[pd.idx],'P'+(pd.idx+1),pColors[pd.idx],pd.skin));
  btl={
    camY:-H/2,scrollSpeed:1.0,time:0,online:true,seed,platIdx:0,testMode:false,
    height:0,ship:null,shipSpawned:false,
    platforms:[],particles:[],projectiles:[],whirlwindZones:[],traps:[],satellites:[],clones:[],
    stars:Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()<0.3?2:1,tw:Math.random()*Math.PI*2,spd:0.02+Math.random()*0.04})),
    players:btlPlayers,
    get p1(){return this.players[0];},get p2(){return this.players[1];},
    playerCount:pData.length,
    state:'countdown',countdown:180,winner:null,hitStop:0,_endBound:false,
    _pendingState:null,_netAtkTriggered:false,_netMouseHeld:false,_netAtkAngle:0,_netSpTriggered:false,_netSpHeld:false,_netSpAngle:0,_discMsg:null
  };
  btl.platforms.push({x:0,worldY:0,w:W,h:20,type:'ground'});
  let wy=-60;
  while(wy>-H*2){
    btl.platIdx++;
    const r1=btlHash(seed,btl.platIdx*3),r2=btlHash(seed,btl.platIdx*3+1),r3=btlHash(seed,btl.platIdx*3+2),r4=btlHash(seed,btl.platIdx*3+77);
    wy-=70+r1*50;const pw=70+r2*80;
    btl.platforms.push({x:r3*(W-pw),worldY:wy,w:pw,h:14,type:btlGetPlatType(r4)});
  }
  pendingInputs=[null,null,null,null];
  btlRunning=true;btlLastTime=performance.now();BGM.battle();
  btlLoopId=requestAnimationFrame(btlLoop);
}

function sendOnlineInput(){
  if(!ws||ws.readyState!==1||!btl)return;
  ws.send(JSON.stringify({t:'in',
    l:keys['ArrowLeft']||keys['KeyA']?1:0,
    r:keys['ArrowRight']||keys['KeyD']?1:0,
    j:keys['ArrowUp']||keys['KeyW']||keys['Space']?1:0,
    a:btl._netAtkTriggered?1:0,
    ah:btl._netMouseHeld?1:0,
    ag:+(btl._netAtkAngle||0).toFixed(3),
    mg:+(btl._netAtkAngle||0).toFixed(3),
    s:btl._netSpTriggered?1:0,
    sh:btl._netSpHeld?1:0,
    sg:+(btl._netSpAngle||0).toFixed(3)
  }));
  btl._netAtkTriggered=false;
  btl._netSpTriggered=false;
}

function sendOnlineState(){
  if(!ws||ws.readyState!==1||!btl)return;
  const shipData=btl.ship?{
    x:Math.round(btl.ship.x),wy:Math.round(btl.ship.worldY),
    twy:Math.round(btl.ship.targetWY),ph:btl.ship.phase,
    ct:Math.round(btl.ship.countdownTimer||0),
    bt:Math.round(btl.ship.boardTimer||0),
    bi:btl.ship.boardedIdx,lv:+(btl.ship.launchVy||0).toFixed(2),
    py:Math.round(btl.ship.padY||0)
  }:null;
  const projData=btl.projectiles.map(pr=>({
    tp:pr.type,x:+pr.x.toFixed(1),y:+pr.y.toFixed(1),
    vx:+pr.vx.toFixed(1),vy:+pr.vy.toFixed(1),
    f:Math.round(pr.fuse||0),ld:pr.landed?1:0,r:pr.radius||0,
    d:Math.round(pr.dist||0),md:pr.maxDist||0,
    lf:Math.round(pr.life||0)
  }));
  const trapData=(btl.traps||[]).map(tr=>({
    x:+tr.x.toFixed(1),wy:+tr.worldY.toFixed(1),r:tr.radius,l:Math.round(tr.life)
  }));
  const satData=(btl.satellites||[]).map(s=>({
    x:+s.x.toFixed(1),wy:+s.worldY.toFixed(1),r:s.radius,
    t:Math.round(s.timer),mt:Math.round(s.maxTimer),fd:s.fired?1:0
  }));
  const cloneData=(btl.clones||[]).map(cl=>({
    oi:cl.ownerIdx,x:+cl.x.toFixed(1),wy:+cl.worldY.toFixed(1),
    fa:cl.facing,og:cl.onGround?1:0,
    atk:cl.attacking?1:0,at:Math.round(cl.attackTimer||0),aa:+(cl.attackAngle||0).toFixed(3),
    lf:Math.round(cl.life||0),ci:cl.charId,sk:cl.skin||'default'
  }));
  ws.send(JSON.stringify({t:'st',
    cam:Math.round(btl.camY),spd:+btl.scrollSpeed.toFixed(2),
    h:Math.round(btl.height),pi:btl.platIdx,
    st:btl.state,winner:btl.winner||null,
    cntd:Math.round(btl.countdown||0),
    hs:btl.hitStop>0?Math.round(btl.hitStop):0,
    ss:btl.shipSpawned?1:0,
    ship:shipData,proj:projData,
    trp:trapData,sat:satData,cln:cloneData,
    wz:btl.whirlwindZones.map(z=>({x:+z.x.toFixed(1),wy:+z.worldY.toFixed(1),r:z.radius,l:Math.round(z.life),ps:+z.pullStr.toFixed(1),sd:z.slowDur,kb:z.kb,tr:z.tickRate})),
    p:btl.players.map(p=>{
      const pd={
        x:+p.x.toFixed(1),y:+p.worldY.toFixed(1),
        vx:+p.vx.toFixed(1),vy:+p.vy.toFixed(1),
        hp:p.hp,fa:p.facing,og:p.onGround?1:0,
        su:Math.round(p.stunTimer||0),
        atk:p.attacking?1:0,aa:+(p.attackAngle||0).toFixed(3),
        at:Math.round(p.attackTimer||0),ac:Math.round(p.attackCooldown||0),
        cr:p.crouching?1:0,fl:p.flying?1:0,
        sa:+(p.spinAngle||0).toFixed(2),
        sl:Math.round(p.slowTimer||0),
        ft:Math.round(p.floatTimer||0),
        cc:p.comboCount||0,
        fr:p.frame||0,
        bt:Math.round(p.blindTimer||0),
        sm:Math.round(p.streamTimer||0),
        sg:+(p.streamAngle||0).toFixed(3),
        chg:p.charging?1:0,
        ch:Math.round(p.chargeTimer||0),
        bf:Math.round(p.buffTimer||0),
        dg:Math.round(p.dodgeTimer||0),
        dgx:+(p.dodgeVx||0).toFixed(1),
        ds:Math.round(p.dashTimer||0),
        dsx:+(p.dashVx||0).toFixed(1),
        dsy:+(p.dashVy||0).toFixed(1),
        wm:Math.round(p.warmupTimer||0),
        iv:Math.round(p.invulTimer||0),
        bd:Math.round(p.bindTimer||0),
        hl:p.headless?1:0,
        sc:Math.round(p.specialCooldown||0),
        cf:Math.round(p.confuseTimer||0)
      };
      if(p.grabArm){pd.ga={x:+p.grabArm.x.toFixed(1),y:+p.grabArm.y.toFixed(1),h:p.grabArm.hit?1:0,r:p.grabArm.returning?1:0};}
      return pd;
    })
  }));
}

function applyGuestInput(p,idx,dt){
  const inp=pendingInputs[idx]||{l:0,r:0,j:0,a:0,ah:0,ag:0,s:0,sh:0,sg:0};
  const lk='_ol'+idx,rk='_or'+idx,jk='_oj'+idx;
  keys[lk]=!!inp.l;keys[rk]=!!inp.r;keys[jk]=!!inp.j;
  p._mouseHeld=false;
  p._spHeld=!!inp.sh; // 우클릭 홀드 (좀비 차지)
  btlUpdatePlayer(p,dt,lk,rk,jk,null);
  delete keys[lk];delete keys[rk];delete keys[jk];
  if((inp.a||(inp.ah&&p.bs&&p.bs.autoFire))&&!p.attacking&&p.attackCooldown<=0&&p.stunTimer<=0)
    btlTriggerAttackByAngle(p,inp.ag||0);
  // 특수능력 트리거 (게스트)
  if(inp.s&&p.stunTimer<=0&&p.warmupTimer<=0&&p.bindTimer<=0){
    const cx=p.x+p.w/2,cy=p.worldY+p.h/2-btl.camY;
    const mx=cx+Math.cos(inp.sg||0)*100,my=cy+Math.sin(inp.sg||0)*100;

    const savedL=keys['ArrowLeft'],savedR=keys['ArrowRight'],savedU=keys['ArrowUp'];
    keys['ArrowLeft']=!!inp.l;keys['ArrowRight']=!!inp.r;keys['ArrowUp']=!!inp.j;
    btlTriggerSpecial(p,mx,my);

}

function applyHostState(st){

      btl.ship.phase=sd.ph;btl.ship.countdownTimer=sd.ct;

  }else{btl.ship=null;}
  // 투사체 동기화 전 이전 상태 저장 (폭발 감지용)

  const prevProjMochis=(btl.projectiles||[]).filter(pr=>pr.type==='mochi').map(pr=>({x:pr.x,y:pr.y}));
  // 투사체 동기화

      type:pr.tp,x:pr.x,y:pr.y,vx:pr.vx,vy:pr.vy,

    const newByType={};for(const pr of newProj)(newByType[pr.type]=(newByType[pr.type]||0)+1);

  // 위성 동기화 (우주비행사)
  if(st.sat){
    const prevSats=(btl.satellites||[]).map(s=>({x:s.x,worldY:s.worldY,fired:s.fired}));
    btl.satellites=st.sat.map(s=>({x:s.x,worldY:s.wy,radius:s.r,

    if(d.su>0&&prevStun<=0){
      SFX.punchHit();
      const hx=d.x+p.w/2,hy=d.y+p.h/2-btl.camY;
      const hitAngle=d.aa||0;
      for(let k=0;k<12;k++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;

    if(!d.og&&!prevOg&&d.vy<-3&&prevVy>0){

      btlSpawnPt(d.x+p.w/2,d.y+p.h-btl.camY,p.color,10);
    }

    // 비행 (바퀴벌레/일루미나티)
    if(d.fl&&!prevFl)SFX.fly();

    // 리스폰 감지 (HP 감소 후 위치가 크게 바뀜)
    if(d.hp<prevHp&&d.hp>0){
      const dx=d.x-prevX,dy=d.y-prevY;

    const s=btl.ship;

function btlTriggerAttackByAngle(p,angle){
  if(!btl||btl.state!=='playing'||p.stunTimer>0)return;
  const bs=p.bs;
  p.facing=Math.cos(angle)>=0?1:-1;
  if(bs.atkType==='rapidPunch'){
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=8;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }else if(bs.atkType==='grab'){
    if(p.attacking||p.attackCooldown>0||p.grabArm)return;
    p.attackAngle=angle;p.attackCooldown=bs.cooldown;SFX.punchSwing();
    const cx=p.x+p.w/2,cy=p.worldY+p.h/2;
    p.grabArm={x:cx,y:cy,vx:Math.cos(angle)*bs.grabSpeed,vy:Math.sin(angle)*bs.grabSpeed,dist:0,maxDist:bs.grabRange,hit:false,returning:false,target:null};
  }else if(bs.atkType==='bomb'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.bombLaunch();
    btl.projectiles.push({type:'bomb',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,vx:Math.cos(angle)*bs.bombSpeed,vy:Math.sin(angle)*bs.bombSpeed,gravity:bs.bombGravity,fuse:bs.bombFuseTime,landed:false,radius:bs.blastRadius,stun:bs.stun,kb:bs.kb});
  }else if(bs.atkType==='shard'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.shardLaunch();
    btl.projectiles.push({type:'shard',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,vx:Math.cos(angle)*bs.shardSpeed,vy:Math.sin(angle)*bs.shardSpeed,dist:0,maxDist:bs.shardRange,stun:bs.stun,kb:bs.kb,slowDur:bs.slowDuration});
  }else if(bs.atkType==='laser'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.laserLaunch();
    btl.projectiles.push({type:'laser',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,vx:Math.cos(angle)*bs.laserSpeed,vy:Math.sin(angle)*bs.laserSpeed,dist:0,maxDist:bs.laserRange,stun:bs.stun,kb:bs.kb,slowDur:bs.slowDuration});
  }else if(bs.atkType==='comboPunch'){
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=10;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }else if(bs.atkType==='bone'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.boneLaunch();
    btl.projectiles.push({type:'bone',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,vx:Math.cos(angle)*bs.boneSpeed,vy:Math.sin(angle)*bs.boneSpeed,gravity:bs.boneGravity,dist:0,maxDist:bs.boneRange,stun:bs.stun,kb:bs.kb});
  }else if(bs.atkType==='water_stream'){
    if(p.attackCooldown>0||p.streamTimer>0)return;
    p.attackCooldown=bs.cooldown;
    p.streamTimer=bs.streamDuration;
    p.streamAngle=angle;SFX.waterStream();
  }else if(bs.atkType==='eye_beam'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.eyeBeamLaunch();
    btl.projectiles.push({type:'eye_beam',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,vx:Math.cos(angle)*bs.beamSpeed,vy:Math.sin(angle)*bs.beamSpeed,dist:0,maxDist:bs.beamRange,stun:bs.stun,kb:bs.kb,blindDur:bs.blindDuration});
  }else if(bs.atkType==='whirlwind'){
    if(p.attackCooldown>0)return;
    p.attackCooldown=bs.cooldown;SFX.whirlwindLaunch();
    btl.projectiles.push({type:'whirlwind',owner:p,x:p.x+p.w/2,y:p.worldY+p.h/2,
      vx:Math.cos(angle)*bs.wwSpeed,vy:Math.sin(angle)*bs.wwSpeed,
      dist:0,maxDist:bs.wwRange,stun:bs.stun,kb:bs.kb,
      zoneRadius:bs.wwZoneRadius,zoneDur:bs.wwZoneDur,pullStr:bs.wwPullStrength,
      slowDur:bs.wwSlowDur,zoneKb:bs.wwZoneKb,tickRate:bs.wwZoneTickRate});
  }else if(bs.atkType==='detonate'){
    if(p.charging||p.attackCooldown>0)return;
    p.charging=true;p.chargeTimer=0;
  }else{
    if(p.attacking||p.attackCooldown>0)return;
    p.attackAngle=angle;p.attacking=true;p.attackTimer=12;p.attackCooldown=bs.cooldown;SFX.punchSwing();
  }
}

// ══════════════════════════════════════════════════════
//  시작
// ══════════════════════════════════════════════════════
if(SAVE.isLoggedIn()){
  showMainMenu();
  tryResumeSession();
}else{
  showLoginModal();
}
</script>
